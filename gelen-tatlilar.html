<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gelen Tatlılar</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --accent:  #f59e0b;
            --acc-dim: rgba(245,158,11,0.12);
            --acc-brd: rgba(245,158,11,0.22);
            --bg:      #070d1a;
            --glass:   rgba(255,255,255,0.035);
            --border:  rgba(255,255,255,0.07);
            --text:    #f0f4ff;
            --muted:   rgba(255,255,255,0.35);
        }

        html { height: 100%; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ── Arka plan ── */
        .bg-grid {
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none; z-index: 0;
        }

        .bg-orb-1 {
            position: fixed;
            top: -20%; left: -15%;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(245,158,11,0.13) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none; z-index: 0;
            animation: drift1 16s ease-in-out infinite alternate;
        }

        .bg-orb-2 {
            position: fixed;
            bottom: -10%; right: -10%;
            width: 380px; height: 380px;
            background: radial-gradient(circle, rgba(96,165,250,0.08) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none; z-index: 0;
            animation: drift2 20s ease-in-out infinite alternate;
        }

        @keyframes drift1 { 0% { transform: translate(0,0); } 100% { transform: translate(30px,40px); } }
        @keyframes drift2 { 0% { transform: translate(0,0); } 100% { transform: translate(-25px,-35px); } }

        /* ── Topbar ── */
        .topbar {
            position: sticky; top: 0; z-index: 50;
            display: flex; align-items: center; gap: 14px;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(16px);
            background: rgba(7,13,26,0.8);
            animation: fadeDown 0.4s ease both;
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .back-btn {
            display: flex; align-items: center; gap: 6px;
            padding: 8px 14px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--muted);
            font-size: 13px; font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.07);
            color: var(--text);
            border-color: rgba(255,255,255,0.12);
        }

        .topbar-info { flex: 1; min-width: 0; }

        .topbar-title {
            font-size: 16px; font-weight: 700;
            letter-spacing: -0.02em;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .topbar-sub {
            font-size: 11px; color: var(--muted);
            font-weight: 500; letter-spacing: 0.02em;
            margin-top: 1px;
        }

        .topbar-badge {
            display: flex; align-items: center; gap: 5px;
            padding: 5px 12px;
            background: var(--acc-dim);
            border: 1px solid var(--acc-brd);
            border-radius: 20px;
            font-size: 11px; font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.04em;
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* ── İçerik ── */
        .content {
            flex: 1;
            position: relative; z-index: 1;
            padding: 20px 18px 140px;
            max-width: 560px;
            width: 100%;
            margin: 0 auto;
        }

        /* ── Tatlı listesi ── */
        .dessert-list {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .dessert-row {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.045);
            opacity: 0;
            animation: rowIn 0.5s cubic-bezier(0.16,1,0.3,1) both;
        }

        .dessert-row:last-child { border-bottom: none; }

        /* stagger */
        .dessert-row:nth-child(1)  { animation-delay: 0.08s; }
        .dessert-row:nth-child(2)  { animation-delay: 0.14s; }
        .dessert-row:nth-child(3)  { animation-delay: 0.20s; }
        .dessert-row:nth-child(4)  { animation-delay: 0.26s; }
        .dessert-row:nth-child(5)  { animation-delay: 0.32s; }
        .dessert-row:nth-child(6)  { animation-delay: 0.38s; }
        .dessert-row:nth-child(7)  { animation-delay: 0.44s; }
        .dessert-row:nth-child(8)  { animation-delay: 0.50s; }
        .dessert-row:nth-child(9)  { animation-delay: 0.56s; }
        .dessert-row:nth-child(10) { animation-delay: 0.62s; }

        @keyframes rowIn {
            from { opacity: 0; transform: translateX(-12px); filter: blur(4px); }
            to   { opacity: 1; transform: translateX(0);     filter: blur(0);   }
        }

        .dessert-emoji {
            font-size: 28px; flex-shrink: 0;
            width: 44px; height: 44px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
        }

        .dessert-name {
            flex: 1;
            font-size: 15px; font-weight: 600;
            letter-spacing: -0.01em;
            min-width: 0;
        }

        /* Sayı inputu */
        .num-input {
            width: 80px;
            height: 48px;
            background: var(--acc-dim);
            border: 1.5px solid var(--acc-brd);
            border-radius: 12px;
            color: var(--text);
            font-size: 20px; font-weight: 700;
            text-align: center;
            outline: none;
            transition: all 0.2s;
            flex-shrink: 0;
            font-variant-numeric: tabular-nums;
            -webkit-appearance: none;
            -moz-appearance: textfield;
        }

        .num-input::-webkit-inner-spin-button,
        .num-input::-webkit-outer-spin-button { -webkit-appearance: none; }

        .num-input:focus {
            background: rgba(245,158,11,0.18);
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(245,158,11,0.1), 0 0 24px rgba(245,158,11,0.15);
            transform: scale(1.04);
        }

        /* ── Toplam ── */
        .total-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 22px;
            background: linear-gradient(135deg, rgba(245,158,11,0.1), rgba(245,158,11,0.04));
            border: 1px solid var(--acc-brd);
            border-radius: 16px;
            margin-bottom: 14px;
            opacity: 0;
            animation: fadeUp 0.6s ease 0.55s both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); filter: blur(4px); }
            to   { opacity: 1; transform: translateY(0);    filter: blur(0);   }
        }

        .total-label {
            font-size: 12px; font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .total-value {
            font-size: 40px; font-weight: 800;
            color: var(--accent);
            letter-spacing: -0.04em;
            font-variant-numeric: tabular-nums;
            transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
        }

        .total-value.bump { transform: scale(1.12); }

        /* ── Kaydet butonu (sabit alt) ── */
        .save-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            padding: 16px 18px calc(16px + env(safe-area-inset-bottom));
            background: linear-gradient(to top, rgba(7,13,26,0.98) 70%, transparent);
            z-index: 40;
        }

        .save-btn {
            width: 100%;
            max-width: 560px;
            display: block;
            margin: 0 auto;
            padding: 17px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border: none;
            border-radius: 16px;
            color: #0d0d0d;
            font-size: 16px; font-weight: 800;
            cursor: pointer;
            letter-spacing: 0.01em;
            box-shadow: 0 8px 28px rgba(245,158,11,0.35);
            transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
            touch-action: manipulation;
            opacity: 0;
            animation: fadeUp 0.6s ease 0.7s forwards;
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 36px rgba(245,158,11,0.48);
        }

        .save-btn:active {
            transform: scale(0.98);
            transition-duration: 0.1s;
        }

        /* ── Skeleton ── */
        .skel {
            background: rgba(255,255,255,0.06);
            border-radius: 8px;
            animation: shimmer 1.5s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { opacity: 0.4; }
            50%       { opacity: 0.9; }
        }

        /* ── Overlay & Toast ── */
        #loadingOverlay {
            display: none; position: fixed; inset: 0;
            background: rgba(7,13,26,0.75); z-index: 9999;
            align-items: center; justify-content: center;
            backdrop-filter: blur(6px);
        }

        #loadingOverlay.active { display: flex; }

        .spinner {
            width: 42px; height: 42px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #toastContainer {
            position: fixed; bottom: 90px; left: 50%;
            transform: translateX(-50%);
            z-index: 10000; pointer-events: none;
        }

        @media (max-width: 400px) {
            .dessert-row { padding: 13px 14px; gap: 10px; }
            .dessert-emoji { width: 38px; height: 38px; font-size: 22px; }
            .dessert-name { font-size: 14px; }
            .num-input { width: 70px; height: 44px; font-size: 18px; }
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>
    <div class="bg-orb-1"></div>
    <div class="bg-orb-2"></div>

    <!-- Topbar -->
    <nav class="topbar">
        <button class="back-btn" onclick="window.location.href='branch-menu.html'">‹ Geri</button>
        <div class="topbar-info">
            <div class="topbar-title">Gelen Tatlılar</div>
            <div class="topbar-sub" id="branchLabel">Yükleniyor…</div>
        </div>
        <div class="topbar-badge">📦 GELEN</div>
    </nav>

    <!-- İçerik -->
    <div class="content">
        <!-- Tatlı Listesi -->
        <div class="dessert-list" id="dessertList">
            <div class="dessert-row" style="opacity:1;animation:none;">
                <div class="skel" style="width:44px;height:44px;border-radius:12px;flex-shrink:0;"></div>
                <div class="skel" style="flex:1;height:18px;"></div>
                <div class="skel" style="width:80px;height:48px;border-radius:12px;flex-shrink:0;"></div>
            </div>
            <div class="dessert-row" style="opacity:1;animation:none;">
                <div class="skel" style="width:44px;height:44px;border-radius:12px;flex-shrink:0;"></div>
                <div class="skel" style="flex:1;height:18px;"></div>
                <div class="skel" style="width:80px;height:48px;border-radius:12px;flex-shrink:0;"></div>
            </div>
            <div class="dessert-row" style="opacity:1;animation:none;">
                <div class="skel" style="width:44px;height:44px;border-radius:12px;flex-shrink:0;"></div>
                <div class="skel" style="flex:1;height:18px;"></div>
                <div class="skel" style="width:80px;height:48px;border-radius:12px;flex-shrink:0;"></div>
            </div>
        </div>

        <!-- Toplam -->
        <div class="total-card">
            <span class="total-label">Toplam Gelen</span>
            <span class="total-value" id="totalValue">0</span>
        </div>
    </div>

    <!-- Kaydet -->
    <div class="save-bar">
        <button class="save-btn" onclick="saveGelenData()">Kaydet</button>
    </div>

    <div id="loadingOverlay"><div class="spinner"></div></div>
    <div id="toastContainer"></div>

    <script src="supabase-client.js"></script>
    <script>
        const branchId   = localStorage.getItem('branchId');
        const branchName = localStorage.getItem('branchName');
        const today      = getTodayDate();

        if (!branchId) window.location.href = 'index.html';

        document.getElementById('branchLabel').textContent = branchName + ' · ' + formatDateTurkish(today);

        function updateTotal() {
            let total = 0;
            document.querySelectorAll('.num-input').forEach(inp => total += parseInt(inp.value) || 0);
            const el = document.getElementById('totalValue');
            el.textContent = total;
            el.classList.add('bump');
            setTimeout(() => el.classList.remove('bump'), 200);
        }

        async function loadDesserts() {
            const [activeDesserts, existing] = await Promise.all([
                getActiveDesserts(),
                getDailyEntriesByBranch(branchId, today)
            ]);

            const list = document.getElementById('dessertList');
            list.innerHTML = '';

            if (!activeDesserts || activeDesserts.length === 0) {
                list.innerHTML = '<div style="padding:40px;text-align:center;color:rgba(255,255,255,0.3);font-size:14px;">Tatlı bulunamadı.</div>';
                return;
            }

            activeDesserts.forEach((dessert, i) => {
                const entry  = (existing || []).find(e => e.dessert_id === dessert.id);
                const val    = entry?.received_amount ?? 0;
                const kalan  = entry?.remaining_amount ?? 0;

                const row = document.createElement('div');
                row.className = 'dessert-row';
                row.style.animationDelay = `${0.08 + i * 0.06}s`;
                row.innerHTML = `
                    <div class="dessert-emoji">${dessert.emoji || '🍰'}</div>
                    <span class="dessert-name">${dessert.name}</span>
                    <input type="number" class="num-input"
                           value="${val}" min="0"
                           data-id="${dessert.id}"
                           data-remaining="${kalan}"
                           inputmode="numeric"
                           oninput="updateTotal()">
                `;
                list.appendChild(row);
            });

            updateTotal();
        }

        async function saveGelenData() {
            const inputs = document.querySelectorAll('.num-input');
            if (inputs.length === 0) return;

            toggleLoading(true);
            let successCount = 0;

            for (const input of inputs) {
                const result = await saveDailyEntry(
                    branchId,
                    input.dataset.id,
                    today,
                    parseInt(input.value) || 0,
                    parseInt(input.dataset.remaining) || 0,
                    0, ''
                );
                if (result.success) successCount++;
            }

            toggleLoading(false);

            if (successCount > 0) {
                showToast(`✅ ${successCount} tatlı kaydedildi!`, 'success');
                setTimeout(() => window.location.href = 'branch-menu.html', 1400);
            } else {
                showToast('❌ Kayıt başarısız!', 'error');
            }
        }

        loadDesserts();
    </script>
</body>
</html>
