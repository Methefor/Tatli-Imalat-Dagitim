<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="theme-color" content="#f59e0b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Tatlı Takip">
    <title>Şubem</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>!function(){var t=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t)}()</script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --amber:  #f59e0b;
            --blue:   #3b82f6;
            --green:  #10b981;
            --red:    #ef4444;
            --bg:     #070d1a;
            --glass:  rgba(255,255,255,0.035);
            --border: rgba(255,255,255,0.07);
            --text:   #f0f4ff;
            --muted:  rgba(255,255,255,0.35);
        }

        html { height: 100%; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex;
            flex-direction: column; overflow-x: hidden;
        }

        /* ── Arka plan ── */
        .bg-grid {
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none; z-index: 0;
        }

        .bg-orb-1 {
            position: fixed; top: -15%; left: -10%;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(245,158,11,0.11) 0%, transparent 70%);
            border-radius: 50%; filter: blur(90px);
            pointer-events: none; z-index: 0;
            animation: drift1 16s ease-in-out infinite alternate;
        }

        .bg-orb-2 {
            position: fixed; bottom: -10%; right: -10%;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(16,185,129,0.1) 0%, transparent 70%);
            border-radius: 50%; filter: blur(80px);
            pointer-events: none; z-index: 0;
            animation: drift2 20s ease-in-out infinite alternate;
        }

        .bg-orb-3 {
            position: fixed; bottom: 30%; left: -5%;
            width: 320px; height: 320px;
            background: radial-gradient(circle, rgba(59,130,246,0.07) 0%, transparent 70%);
            border-radius: 50%; filter: blur(70px);
            pointer-events: none; z-index: 0;
            animation: drift1 24s ease-in-out infinite alternate-reverse;
        }

        @keyframes drift1 { 0% { transform: translate(0,0); } 100% { transform: translate(35px,40px); } }
        @keyframes drift2 { 0% { transform: translate(0,0); } 100% { transform: translate(-28px,-36px); } }

        /* ── Topbar ── */
        .topbar {
            position: sticky; top: 0; z-index: 50;
            display: flex; align-items: center; gap: 14px;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(16px);
            background: rgba(7,13,26,0.8);
            animation: fadeDown 0.4s ease both;
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .back-btn {
            display: flex; align-items: center;
            padding: 8px 14px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 10px; color: var(--muted);
            font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
            touch-action: manipulation; white-space: nowrap; flex-shrink: 0;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.07);
            color: var(--text); border-color: rgba(255,255,255,0.12);
        }

        .topbar-info { flex: 1; min-width: 0; }

        .topbar-title {
            font-size: 16px; font-weight: 700; letter-spacing: -0.02em;
        }

        .topbar-sub {
            font-size: 11px; color: var(--muted); font-weight: 500; margin-top: 1px;
        }

        .refresh-btn {
            display: flex; align-items: center; gap: 6px;
            padding: 7px 14px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 10px; color: var(--muted);
            font-size: 12px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
            touch-action: manipulation; flex-shrink: 0;
        }

        .refresh-btn:hover {
            background: rgba(255,255,255,0.07);
            color: var(--text); border-color: rgba(255,255,255,0.12);
        }

        .refresh-btn.spinning .refresh-icon { animation: spin 0.7s linear infinite; }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── İçerik ── */
        .content {
            flex: 1; position: relative; z-index: 1;
            padding: 20px 18px 40px;
            max-width: 600px; width: 100%; margin: 0 auto;
        }

        /* ── Ay Navigatörü ── */
        .month-nav {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 14px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px; margin-bottom: 16px;
            opacity: 0; animation: fadeUp 0.5s ease 0.06s both;
        }

        .month-nav-btn {
            flex-shrink: 0;
            width: 38px; height: 38px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 10px; color: var(--text);
            font-size: 20px; font-weight: 700;
            cursor: pointer; transition: all 0.18s;
            touch-action: manipulation; line-height: 1;
        }

        .month-nav-btn:hover:not(:disabled) {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.15);
        }

        .month-nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }

        .month-nav-center { flex: 1; text-align: center; }

        .month-display {
            font-size: 15px; font-weight: 700; letter-spacing: -0.01em;
        }

        .month-display-sub {
            font-size: 10px; color: var(--muted);
            font-weight: 500; letter-spacing: 0.05em; margin-top: 2px;
        }

        /* ── Stat kartları ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px; margin-bottom: 20px;
        }
        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .stat-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px; padding: 18px 14px;
            text-align: center; position: relative; overflow: hidden;
            opacity: 0; animation: fadeUp 0.55s cubic-bezier(0.16,1,0.3,1) both;
        }

        .stat-card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0;
            height: 3px; border-radius: 16px 16px 0 0;
        }
        .card-amber { border-color: rgba(245,158,11,0.25); }
        .card-green { border-color: rgba(16,185,129,0.25); }
        .card-blue  { border-color: rgba(59,130,246,0.25); }
        .card-red   { border-color: rgba(239,68,68,0.25);  }

        .stat-card:nth-child(1) { animation-delay: 0.1s; }
        .stat-card:nth-child(2) { animation-delay: 0.18s; }
        .stat-card:nth-child(3) { animation-delay: 0.26s; }
        .stat-card:nth-child(4) { animation-delay: 0.34s; }

        .card-amber::before { background: var(--amber); }
        .card-green::before { background: var(--green); }
        .card-blue::before  { background: var(--blue);  }
        .card-red::before   { background: var(--red);   }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); filter: blur(4px); }
            to   { opacity: 1; transform: translateY(0);    filter: blur(0);   }
        }

        .stat-icon { font-size: 24px; margin-bottom: 10px; line-height: 1; }

        .stat-value {
            font-size: 30px; font-weight: 800;
            letter-spacing: -0.04em; font-variant-numeric: tabular-nums;
            margin-bottom: 4px; line-height: 1;
        }

        .card-amber .stat-value { color: var(--amber); }
        .card-green .stat-value { color: var(--green); }
        .card-blue  .stat-value { color: var(--blue);  }
        .card-red   .stat-value { color: var(--red);   }

        .stat-label {
            font-size: 10px; font-weight: 700; color: var(--muted);
            text-transform: uppercase; letter-spacing: 0.07em;
        }
        .stat-sub {
            font-size: 10px; font-weight: 600; color: var(--muted);
            margin-top: 6px; opacity: 0.7;
        }

        /* ── Özet tablosu ── */
        .summary-panel {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px; overflow: hidden;
            opacity: 0; animation: fadeUp 0.55s cubic-bezier(0.16,1,0.3,1) 0.34s both;
        }

        .summary-head {
            display: grid;
            grid-template-columns: 1fr 56px 56px 56px 56px;
            gap: 6px; padding: 12px 18px;
            border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,0.02);
        }

        .head-cell {
            font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.08em;
            color: var(--muted); text-align: center;
        }

        .head-cell:first-child { text-align: left; }

        .head-amber { color: rgba(245,158,11,0.7) !important; }
        .head-green { color: rgba(16,185,129,0.7)  !important; }
        .head-blue  { color: rgba(59,130,246,0.7)  !important; }
        .head-red   { color: rgba(239,68,68,0.7)   !important; }

        .dessert-row {
            display: grid;
            grid-template-columns: 1fr 56px 56px 56px 56px;
            gap: 6px; padding: 14px 18px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            align-items: center; opacity: 0;
            animation: rowSlide 0.45s cubic-bezier(0.16,1,0.3,1) both;
        }

        .dessert-row:last-child { border-bottom: none; }

        @keyframes rowSlide {
            from { opacity: 0; transform: translateX(-10px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        .row-name { display: flex; align-items: center; gap: 10px; min-width: 0; }

        .row-emoji {
            font-size: 22px; flex-shrink: 0;
            width: 36px; height: 36px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
        }

        .row-text {
            font-size: 14px; font-weight: 600; letter-spacing: -0.01em;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .row-val {
            font-size: 16px; font-weight: 700;
            text-align: center; font-variant-numeric: tabular-nums;
        }

        .val-amber { color: var(--amber); }
        .val-green { color: var(--green); }
        .val-blue  { color: var(--blue);  }
        .val-red   { color: var(--red);   }
        .val-zero  { color: rgba(255,255,255,0.18) !important; }

        /* ── Boş durum ── */
        .empty-state { padding: 56px 20px; text-align: center; }
        .empty-icon  { font-size: 48px; margin-bottom: 14px; opacity: 0.4; }
        .empty-title { font-size: 16px; font-weight: 700; color: rgba(255,255,255,0.4); margin-bottom: 6px; }
        .empty-sub   { font-size: 13px; color: rgba(255,255,255,0.2); }

        /* ── Toast ── */
        #toastContainer {
            position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%);
            z-index: 10000; pointer-events: none;
        }

        /* ── Skeleton ── */
        .skel {
            background: rgba(255,255,255,0.06); border-radius: 8px;
            animation: shimmer 1.5s ease-in-out infinite;
        }

        @keyframes shimmer { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.9; } }

        @media (max-width: 400px) {
            .stats-grid { gap: 8px; }
            .stat-card { padding: 14px 8px; }
            .stat-value { font-size: 24px; }
            .stat-label { font-size: 9px; }
            .summary-head, .dessert-row { padding: 11px 12px; }
            .row-text { font-size: 13px; }
            .row-val { font-size: 14px; }
            .head-cell { font-size: 10px; }
        }

        /* ── TEMA ─────────────────────────── */
        .theme-toggle-btn { background:transparent; border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:16px; cursor:pointer; padding:5px 9px; line-height:1; flex-shrink:0; }
        [data-theme="light"] {
            --bg: #eef2fa;
            --glass: #ffffff;
            --border: rgba(15,23,42,0.1);
            --text: #0f172a;
            --muted: #64748b;
            --accent: #7c3aed;
            --acc-dim: rgba(124,58,237,0.08);
            --acc-brd: rgba(124,58,237,0.22);
        }
        [data-theme="light"] body { background: #eef2fa; }
        [data-theme="light"] .topbar { background: rgba(238,242,250,0.95) !important; border-bottom: 1px solid rgba(0,0,0,0.1); }
        [data-theme="light"] .bg-grid {
            background-image:
                linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
        }
        [data-theme="light"] .bg-orb { background: radial-gradient(circle, rgba(124,58,237,0.07) 0%, transparent 70%); }
        [data-theme="light"] .num-input { background: #f8fafc; color: #0f172a; border-color: rgba(0,0,0,0.12); }
        [data-theme="light"] .dessert-row { border-bottom-color: rgba(0,0,0,0.06); }
    </style>
</head>
<body>

    <div class="bg-grid"></div>
    <div class="bg-orb-1"></div>
    <div class="bg-orb-2"></div>
    <div class="bg-orb-3"></div>

    <nav class="topbar">
        <button class="back-btn" onclick="window.location.href='branch-menu.html'">‹ Geri</button>
        <div class="topbar-info">
            <div class="topbar-title">Şubem</div>
            <div class="topbar-sub" id="branchLabel">Yükleniyor…</div>
        </div>
        <button class="refresh-btn" onclick="refresh(this)">
            <span class="refresh-icon">↻</span>
            <span>Yenile</span>
        </button>
        <button id="themeToggleBtn" class="theme-toggle-btn" onclick="toggleTheme()" title="Tema">☀️</button>
    </nav>

    <div class="content">

        <!-- Ay Navigatörü -->
        <div class="month-nav">
            <button class="month-nav-btn" id="prevMonthBtn" onclick="changeMonth(-1)">‹</button>
            <div class="month-nav-center">
                <div class="month-display" id="monthDisplay">—</div>
                <div class="month-display-sub">Aylık özet</div>
            </div>
            <button class="month-nav-btn" id="nextMonthBtn" onclick="changeMonth(1)">›</button>
        </div>

        <!-- Stat kartları -->
        <div class="stats-grid">
            <div class="stat-card card-amber">
                <div class="stat-icon">📦</div>
                <div class="stat-value" id="totalGelen">—</div>
                <div class="stat-label">Bu Ay Gelen</div>
                <div class="stat-sub" id="subGelen">—</div>
            </div>
            <div class="stat-card card-green">
                <div class="stat-icon">✅</div>
                <div class="stat-value" id="totalSatilan">—</div>
                <div class="stat-label">Bu Ay Satılan</div>
                <div class="stat-sub" id="subSatilan">—</div>
            </div>
            <div class="stat-card card-blue">
                <div class="stat-icon">📊</div>
                <div class="stat-value" id="totalKalan">—</div>
                <div class="stat-label">Şu An Kalan</div>
                <div class="stat-sub" id="subKalan">aktif stok</div>
            </div>
            <div class="stat-card card-red">
                <div class="stat-icon">⚠️</div>
                <div class="stat-value" id="totalZayiat">—</div>
                <div class="stat-label">Bu Ay Zayiat</div>
                <div class="stat-sub" id="subZayiat">—</div>
            </div>
        </div>

        <!-- Özet tablosu -->
        <div class="summary-panel" id="summaryPanel">
            <div class="summary-head">
                <div class="head-cell">Tatlı</div>
                <div class="head-cell head-amber">Gelen</div>
                <div class="head-cell head-green">Satılan</div>
                <div class="head-cell head-blue">Kalan</div>
                <div class="head-cell head-red">Zayiat</div>
            </div>
            <!-- Skeleton -->
            <div class="dessert-row" style="opacity:1;animation:none;">
                <div class="row-name">
                    <div class="skel" style="width:36px;height:36px;border-radius:9px;flex-shrink:0;"></div>
                    <div class="skel" style="flex:1;height:16px;"></div>
                </div>
                <div class="skel" style="height:18px;border-radius:6px;"></div>
                <div class="skel" style="height:18px;border-radius:6px;"></div>
                <div class="skel" style="height:18px;border-radius:6px;"></div>
                <div class="skel" style="height:18px;border-radius:6px;"></div>
            </div>
            <div class="dessert-row" style="opacity:1;animation:none;">
                <div class="row-name">
                    <div class="skel" style="width:36px;height:36px;border-radius:9px;flex-shrink:0;"></div>
                    <div class="skel" style="flex:1;height:16px;"></div>
                </div>
                <div class="skel" style="height:18px;border-radius:6px;"></div>
                <div class="skel" style="height:18px;border-radius:6px;"></div>
                <div class="skel" style="height:18px;border-radius:6px;"></div>
                <div class="skel" style="height:18px;border-radius:6px;"></div>
            </div>
        </div>

    </div>

    <div id="toastContainer"></div>

    <script src="supabase-client.js"></script>
    <script>
        const branchId   = localStorage.getItem('branchId');
        const branchName = localStorage.getItem('branchName');

        if (!branchId) window.location.href = 'index.html';

        document.getElementById('branchLabel').textContent = branchName;

        const MONTHS_TR = [
            'Ocak','Şubat','Mart','Nisan','Mayıs','Haziran',
            'Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'
        ];

        const now = new Date();
        let selectedYear  = now.getFullYear();
        let selectedMonth = now.getMonth() + 1;

        function updateMonthUI() {
            const curYear  = new Date().getFullYear();
            const curMonth = new Date().getMonth() + 1;
            document.getElementById('monthDisplay').textContent =
                MONTHS_TR[selectedMonth - 1] + ' ' + selectedYear;
            document.getElementById('nextMonthBtn').disabled =
                selectedYear > curYear ||
                (selectedYear === curYear && selectedMonth >= curMonth);
        }

        function changeMonth(delta) {
            let m = selectedMonth + delta;
            let y = selectedYear;
            if (m < 1)  { m = 12; y--; }
            if (m > 12) { m = 1;  y++; }
            const curYear  = new Date().getFullYear();
            const curMonth = new Date().getMonth() + 1;
            if (y > curYear || (y === curYear && m > curMonth)) return;
            selectedMonth = m;
            selectedYear  = y;
            updateMonthUI();
            loadData();
        }

        function getMonthRange(year, month) {
            const startDate = `${year}-${String(month).padStart(2,'0')}-01`;
            const lastDay   = new Date(year, month, 0).getDate();
            const endDate   = `${year}-${String(month).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;
            return { startDate, endDate };
        }

        async function loadData() {
            const { startDate, endDate } = getMonthRange(selectedYear, selectedMonth);

            // latestStock: ay filtresinden bağımsız, gerçek güncel stok
            const [activeDesserts, entries, latestStock] = await Promise.all([
                getActiveDesserts(),
                getBranchEntriesDateRange(branchId, startDate, endDate),
                getBranchLatestStock(branchId)
            ]);

            // Dönem öncesi devir stok (inline sorgu — SW cache bypass)
            const osFrom = new Date(startDate); osFrom.setDate(osFrom.getDate() - 60);
            const osFromStr = `${osFrom.getFullYear()}-${String(osFrom.getMonth()+1).padStart(2,'0')}-${String(osFrom.getDate()).padStart(2,'0')}`;
            const { data: osEntries } = await window.supabaseInstance
                .from('daily_entries')
                .select('dessert_id, remaining_amount')
                .eq('branch_id', branchId)
                .lt('entry_date', startDate)
                .gte('entry_date', osFromStr)
                .not('remaining_amount', 'is', null)
                .order('entry_date', { ascending: false })
                .limit(200);
            const openingByDessert = {};
            (osEntries || []).forEach(e => {
                if (!(e.dessert_id in openingByDessert)) openingByDessert[e.dessert_id] = e.remaining_amount;
            });

            if (!activeDesserts || activeDesserts.length === 0) {
                showEmpty('Tatlı bulunamadı.');
                return;
            }

            let totalG = 0, totalS = 0, totalK = 0, totalZ = 0;
            const rows = [];

            activeDesserts.forEach(dessert => {
                const dessertEntries = (entries || []).filter(e => e.dessert_id === dessert.id);

                // Aylık toplam gelen
                const monthlyGelen = dessertEntries.reduce(
                    (s, e) => s + (e.received_amount || 0), 0
                );

                // Güncel kalan: ay filtresinden bağımsız, gerçek son stok
                const currentKalan = latestStock[dessert.id] ?? 0;

                // Aylık toplam zayiat
                const monthlyZayiat = dessertEntries.reduce(
                    (s, e) => s + (e.waste_amount || 0), 0
                );

                // Satılan = Devir + Gelen - Kalan - Zayiat
                const openingKalan   = openingByDessert[dessert.id] ?? 0;
                const monthlySatilan = Math.max(0, openingKalan + monthlyGelen - currentKalan - monthlyZayiat);

                totalG += monthlyGelen;
                totalK += currentKalan;
                totalZ += monthlyZayiat;
                totalS += monthlySatilan;
                rows.push({ dessert, gelen: monthlyGelen, kalan: currentKalan, satilan: monthlySatilan, zayiat: monthlyZayiat });
            });

            animCount('totalGelen',   totalG);
            animCount('totalSatilan', totalS);
            animCount('totalKalan',   totalK);
            animCount('totalZayiat',  totalZ);

            // Stat alt bilgileri
            const openingTotal = Object.values(openingByDessert).reduce((s, v) => s + v, 0);
            const base = openingTotal + totalG;
            const satisOrani = base > 0 ? ((totalS / base) * 100).toFixed(0) : 0;
            const fireOrani  = base > 0 ? ((totalZ / base) * 100).toFixed(1) : 0;
            const subGelen   = document.getElementById('subGelen');
            const subSatilan = document.getElementById('subSatilan');
            const subZayiat  = document.getElementById('subZayiat');
            if (subGelen)   subGelen.textContent   = openingTotal > 0 ? `+ ${openingTotal} devir stok` : 'bu dönem giriş';
            if (subSatilan) subSatilan.textContent = `% ${satisOrani} satış oranı`;
            if (subZayiat)  subZayiat.textContent  = totalZ > 0 ? `% ${fireOrani} fire oranı` : 'fire yok';

            const panel = document.getElementById('summaryPanel');
            panel.innerHTML = `
                <div class="summary-head">
                    <div class="head-cell">Tatlı</div>
                    <div class="head-cell head-amber">Gelen</div>
                    <div class="head-cell head-green">Satılan</div>
                    <div class="head-cell head-blue">Kalan</div>
                    <div class="head-cell head-red">Zayiat</div>
                </div>
            `;

            if (rows.every(r => r.gelen === 0 && r.kalan === 0 && r.zayiat === 0)) {
                panel.innerHTML += `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <div class="empty-title">Bu ay için veri girilmemiş</div>
                        <div class="empty-sub">Gelen Tatlılar veya Kalan Tatlılar bölümünden başla</div>
                    </div>`;
                return;
            }

            rows.forEach(({ dessert, gelen, kalan, satilan, zayiat }, i) => {
                const row = document.createElement('div');
                row.className = 'dessert-row';
                row.style.animationDelay = `${0.38 + i * 0.06}s`;
                row.innerHTML = `
                    <div class="row-name">
                        <div class="row-emoji">${dessert.emoji || '🍰'}</div>
                        <span class="row-text">${dessert.name}</span>
                    </div>
                    <span class="row-val val-amber ${gelen===0?'val-zero':''}">${gelen}</span>
                    <span class="row-val val-green ${satilan===0?'val-zero':''}">${satilan}</span>
                    <span class="row-val val-blue  ${kalan===0?'val-zero':''}">${kalan}</span>
                    <span class="row-val val-red   ${zayiat===0?'val-zero':''}">${zayiat}</span>
                `;
                panel.appendChild(row);
            });
        }

        const _animRAF = {};
        function animCount(id, target) {
            const el = document.getElementById(id);
            if (!el) return;
            if (target === 0) { el.textContent = '0'; return; }
            if (_animRAF[id]) cancelAnimationFrame(_animRAF[id]);
            const dur  = 700;
            const from = parseFloat(el.textContent) || 0;
            const start = performance.now();
            function tick(now) {
                const p = Math.min((now - start) / dur, 1);
                const ease = 1 - Math.pow(1 - p, 3);
                el.textContent = Math.round(from + (target - from) * ease);
                if (p < 1) _animRAF[id] = requestAnimationFrame(tick);
                else delete _animRAF[id];
            }
            _animRAF[id] = requestAnimationFrame(tick);
        }

        function showEmpty(msg) {
            ['totalGelen','totalSatilan','totalKalan','totalZayiat'].forEach(id => {
                document.getElementById(id).textContent = '0';
            });
            document.getElementById('summaryPanel').innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">📭</div>
                    <div class="empty-title">${msg}</div>
                </div>`;
        }

        async function refresh(btn) {
            btn.classList.add('spinning');
            await loadData();
            btn.classList.remove('spinning');
        }

        initTheme();
        updateMonthUI();
        loadData();
        initPullToRefresh(() => loadData());
    </script>
    <script>if("serviceWorker"in navigator){navigator.serviceWorker.register("/sw.js");navigator.serviceWorker.addEventListener("message",e=>{if(e.data?.type==="SW_UPDATED")window.location.reload();});}</script>
</body>
</html>
