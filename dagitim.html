<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tatlı Takip">
    <title>🚚 Dağıtım Paneli</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:      #0f172a;
            --surface: #1e293b;
            --border:  rgba(255,255,255,0.08);
            --primary: #3b82f6;
            --text:    #f1f5f9;
            --muted:   #64748b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ─── PIN EKRANI ─── */
        #pinOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        #pinOverlay.active { display: flex; }

        .pin-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 32px;
            text-align: center;
            width: 90%;
            max-width: 320px;
        }

        .pin-icon  { font-size: 60px; margin-bottom: 16px; display: block; }
        .pin-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
        .pin-sub   { font-size: 13px; color: var(--muted); margin-bottom: 28px; }

        .pin-inputs { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }

        .pin-digit {
            width: 58px; height: 66px;
            font-size: 26px; font-weight: 700;
            text-align: center;
            background: rgba(255,255,255,0.07);
            border: 2px solid rgba(255,255,255,0.14);
            border-radius: 12px;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .pin-digit:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }

        .pin-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            touch-action: manipulation;
        }
        .pin-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(59,130,246,0.4); }

        .pin-error {
            font-size: 13px;
            color: #ef4444;
            margin-top: 12px;
            min-height: 18px;
        }

        .pin-back {
            margin-top: 14px;
            background: transparent;
            border: none;
            color: var(--muted);
            font-size: 13px;
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        /* ─── PANEL ─── */
        #panel { display: flex; flex-direction: column; min-height: 100vh; }

        /* Üst bar */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(15,23,42,0.97);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            padding: 8px 14px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            color: var(--text);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            touch-action: manipulation;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .back-btn:hover { background: rgba(255,255,255,0.14); }

        .topbar-title {
            flex: 1;
            font-size: 17px;
            font-weight: 700;
        }

        .topbar-date {
            font-size: 12px;
            color: var(--primary);
            font-weight: 600;
            background: rgba(59,130,246,0.1);
            border: 1px solid rgba(59,130,246,0.25);
            border-radius: 20px;
            padding: 5px 12px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .refresh-btn {
            padding: 8px 14px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            color: var(--text);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s;
            touch-action: manipulation;
            flex-shrink: 0;
        }
        .refresh-btn:hover { background: rgba(255,255,255,0.12); }

        .print-btn {
            padding: 8px 14px;
            background: rgba(59,130,246,0.1);
            border: 1px solid rgba(59,130,246,0.25);
            border-radius: 8px;
            color: #93c5fd;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s;
            touch-action: manipulation;
            flex-shrink: 0;
        }
        .print-btn:hover { background: rgba(59,130,246,0.18); }

        /* ─── İÇERİK ─── */
        .content {
            padding: 24px 16px 48px;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }

        /* Bölüm başlığı */
        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
        }

        .section-line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ─── TOPLAM STOK ─── */
        .stock-summary {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 12px;
        }

        .stock-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            text-align: center;
        }

        .stock-card-emoji { font-size: 28px; line-height: 1; }
        .stock-card-name  { font-size: 12px; font-weight: 600; color: var(--muted); }
        .stock-card-value {
            font-size: 36px; font-weight: 800;
            letter-spacing: -0.04em;
            font-variant-numeric: tabular-nums;
            color: var(--text); line-height: 1;
        }
        .stock-card-value.zero { color: rgba(255,255,255,0.2); }

        .grand-total-bar {
            background: linear-gradient(135deg, rgba(59,130,246,0.12), rgba(59,130,246,0.06));
            border: 1px solid rgba(59,130,246,0.25);
            border-radius: 14px;
            padding: 16px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }

        .grand-total-label {
            font-size: 13px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.08em;
            color: rgba(59,130,246,0.8);
        }

        .grand-total-value {
            font-size: 32px; font-weight: 800;
            letter-spacing: -0.04em; color: var(--primary);
        }

        /* ─── ŞUBE BAZLI ─── */
        .branches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 12px;
            margin-bottom: 32px;
        }

        .branch-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            overflow: hidden;
        }

        .branch-card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,0.02);
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }
        .branch-card-header:hover { background: rgba(255,255,255,0.04); }

        .branch-chevron {
            font-size: 14px;
            color: rgba(255,255,255,0.3);
            transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
            flex-shrink: 0; margin-left: 2px;
        }
        .branch-card.open .branch-chevron { transform: rotate(180deg); }

        .branch-card-emoji { font-size: 22px; line-height: 1; }

        .branch-card-name {
            font-size: 15px; font-weight: 700; flex: 1;
        }

        .branch-card-total {
            font-size: 18px; font-weight: 800;
            color: var(--primary);
            font-variant-numeric: tabular-nums;
        }

        .branch-dessert-list {
            overflow: hidden; max-height: 0;
            transition: max-height 0.35s cubic-bezier(0.16,1,0.3,1);
        }
        .branch-card.open .branch-dessert-list { max-height: 800px; }
        .branch-dessert-inner { padding: 10px 0; }

        .branch-dessert-row {
            display: flex; align-items: center; gap: 10px;
            padding: 9px 18px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .branch-dessert-row:last-child { border-bottom: none; }
        .branch-dessert-emoji { font-size: 18px; width: 26px; text-align: center; flex-shrink: 0; }
        .branch-dessert-name  { flex: 1; font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.75); }
        .branch-dessert-value { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; min-width: 32px; text-align: right; }
        .branch-dessert-value.zero { color: rgba(255,255,255,0.18); }

        /* ─── DAĞITIM PLANI ─── */
        .plan-wrap {
            overflow-x: auto;
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .plan-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 500px;
        }

        .plan-table th {
            padding: 10px 14px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,0.02);
            white-space: nowrap;
        }

        .plan-table th:first-child {
            text-align: left;
            padding-left: 18px;
        }

        .plan-table th:not(:first-child) { text-align: center; }

        .plan-table td {
            padding: 10px 14px;
            font-size: 13px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            vertical-align: middle;
        }

        .plan-table tr:last-child td { border-bottom: none; }

        .plan-table td:first-child {
            padding-left: 18px;
            font-weight: 700;
            white-space: nowrap;
        }

        .plan-table td:not(:first-child) { text-align: center; }

        .plan-table tr.needs-delivery {
            background: rgba(239,68,68,0.04);
        }

        .plan-table tr.needs-delivery td:first-child {
            color: var(--text);
        }

        /* Hücre renk kodları */
        .dt-critical {
            display: inline-block;
            padding: 3px 8px;
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 6px;
            color: #fca5a5;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.04em;
        }

        .dt-low {
            display: inline-block;
            padding: 3px 8px;
            background: rgba(245,158,11,0.12);
            border: 1px solid rgba(245,158,11,0.25);
            border-radius: 6px;
            color: #fcd34d;
            font-size: 13px;
            font-weight: 700;
        }

        .dt-ok {
            color: rgba(255,255,255,0.15);
            font-size: 16px;
        }

        /* Eşik bilgisi */
        .threshold-note {
            margin-top: 12px;
            font-size: 11px;
            color: var(--muted);
            line-height: 1.6;
        }

        .threshold-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 10px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: rgba(255,255,255,0.5);
        }

        /* Yükleniyor */
        .loading-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
            font-size: 15px;
        }

        /* Skeleton */
        .skel {
            background: rgba(255,255,255,0.06);
            border-radius: 8px;
            animation: shimmer 1.4s ease-in-out infinite;
        }

        @keyframes shimmer { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.85; } }

        /* ─── MOBİL ─── */
        @media (max-width: 600px) {
            .topbar-date { display: none; }
            .topbar-title { font-size: 15px; }
            .stock-summary { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; }
            .stock-card { padding: 14px 10px; }
            .stock-card-value { font-size: 28px; }
            .branches-grid { grid-template-columns: 1fr; }
            .print-btn { display: none; }
        }

        /* ─── BUGÜN GELEN GİRİŞLERİ TABLOSU ─── */
        .gelen-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 480px;
        }

        .gelen-table th {
            padding: 10px 12px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,0.02);
            white-space: nowrap;
        }

        .gelen-table th:first-child {
            text-align: left;
            padding-left: 18px;
        }

        .gelen-table th:not(:first-child) { text-align: center; }

        .gelen-table td {
            padding: 10px 12px;
            font-size: 13px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            vertical-align: middle;
        }

        .gelen-table tr:last-child td { border-bottom: none; }

        .gelen-table td:first-child {
            padding-left: 18px;
            font-weight: 700;
            white-space: nowrap;
        }

        .gelen-table td:not(:first-child) { text-align: center; }

        /* Hücre renk kodları */
        .gt-ok {
            display: inline-block;
            padding: 3px 10px;
            background: rgba(34,197,94,0.12);
            border: 1px solid rgba(34,197,94,0.25);
            border-radius: 6px;
            color: #86efac;
            font-size: 13px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .gt-zero {
            color: rgba(255,255,255,0.2);
            font-size: 16px;
        }

        .gt-none {
            display: inline-block;
            padding: 3px 8px;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.22);
            border-radius: 6px;
            color: #fca5a5;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.04em;
        }

        .gt-total {
            display: inline-block;
            padding: 3px 10px;
            background: rgba(59,130,246,0.12);
            border: 1px solid rgba(59,130,246,0.25);
            border-radius: 6px;
            color: #93c5fd;
            font-size: 13px;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
        }

        .gt-status-ok {
            display: inline-block;
            padding: 3px 10px;
            background: rgba(34,197,94,0.1);
            border: 1px solid rgba(34,197,94,0.2);
            border-radius: 20px;
            color: #86efac;
            font-size: 11px;
            font-weight: 700;
        }

        .gt-status-none {
            display: inline-block;
            padding: 3px 10px;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 20px;
            color: #fca5a5;
            font-size: 11px;
            font-weight: 700;
        }

        .gelen-table tr.row-none {
            background: rgba(239,68,68,0.03);
        }

        /* Masaüstü: tablo görünür, kartlar gizli */
        .gelen-table-wrap  { display: block; }
        .gelen-cards-wrap  { display: none; }

        /* ─── MOBİL: Kart düzeni ─── */
        @media (max-width: 700px) {
            .gelen-table-wrap { display: none; }
            .gelen-cards-wrap { display: block; margin-bottom: 32px; }

            .gc-grid {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }

            .gc-card {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 16px;
                overflow: hidden;
            }

            .gc-card.gc-missing {
                border-color: rgba(239,68,68,0.25);
                background: rgba(239,68,68,0.04);
            }

            .gc-header {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 13px 16px;
                cursor: pointer;
                user-select: none;
                transition: background 0.2s;
            }
            .gc-header:active { background: rgba(255,255,255,0.04); }

            .gc-card.gc-missing .gc-header {
                border-bottom-color: rgba(239,68,68,0.15);
            }

            .gc-chevron {
                font-size: 13px;
                color: rgba(255,255,255,0.3);
                transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
                flex-shrink: 0;
            }
            .gc-card.open .gc-chevron { transform: rotate(180deg); }

            .gc-branch-name {
                flex: 1;
                font-size: 15px;
                font-weight: 700;
            }

            .gc-collapsible {
                overflow: hidden;
                max-height: 0;
                transition: max-height 0.35s cubic-bezier(0.16,1,0.3,1);
                border-top: 1px solid transparent;
            }
            .gc-card.open .gc-collapsible {
                max-height: 1000px;
                border-top-color: var(--border);
            }
            .gc-card.gc-missing.open .gc-collapsible {
                border-top-color: rgba(239,68,68,0.15);
            }

            .gc-body {
                padding: 8px 0;
            }

            .gc-row {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 8px 16px;
                border-bottom: 1px solid rgba(255,255,255,0.04);
            }

            .gc-row:last-child { border-bottom: none; }

            .gc-dessert-name {
                flex: 1;
                font-size: 14px;
                color: rgba(255,255,255,0.7);
            }

            .gc-amt-ok {
                font-size: 16px;
                font-weight: 700;
                color: #86efac;
                font-variant-numeric: tabular-nums;
                min-width: 32px;
                text-align: right;
            }

            .gc-amt-zero {
                font-size: 16px;
                color: rgba(255,255,255,0.2);
                min-width: 32px;
                text-align: right;
            }

            .gc-footer {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 10px 16px;
                border-top: 1px solid rgba(255,255,255,0.06);
                background: rgba(255,255,255,0.02);
            }

            .gc-total-label {
                font-size: 12px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.06em;
                color: var(--muted);
            }

            .gc-missing-notice {
                text-align: center;
                padding: 18px 16px;
                color: #fca5a5;
                font-size: 13px;
                font-weight: 600;
            }
        }

        /* ─── BASKIYA ÖZEL ─── */
        @media print {
            body { background: white; color: black; }
            #pinOverlay, .topbar, .back-btn, .refresh-btn, .print-btn { display: none !important; }
            .content { padding: 0; max-width: 100%; }
            .stock-summary { display: none; }
            .grand-total-bar { display: none; }
            .branches-grid { display: none; }
            .plan-table { border: 1px solid #ccc; }
            .plan-table th { background: #f5f5f5; color: #333; border-bottom: 1px solid #ccc; }
            .plan-table td { border-bottom: 1px solid #eee; color: #111; }
            .dt-critical { background: #fee2e2; color: #dc2626; border: 1px solid #fca5a5; }
            .dt-low      { background: #fef3c7; color: #d97706; border: 1px solid #fcd34d; }
            .dt-ok       { color: #ccc; }
            .grand-total-bar, .threshold-note, .threshold-legend { color: #555; }
            .plan-wrap { border: 1px solid #ccc; }
            .section-line { background: #ddd; }
            .section-title { color: #555; }
        }
    </style>
</head>
<body>

    <!-- ─── PIN ─── -->
    <div id="pinOverlay" class="active">
        <div class="pin-box">
            <span class="pin-icon">🚚</span>
            <h2 class="pin-title">Dağıtım Paneli</h2>
            <p class="pin-sub">Şifrenizi girin</p>
            <div class="pin-inputs">
                <input type="password" class="pin-digit" maxlength="1" id="pd1" inputmode="numeric">
                <input type="password" class="pin-digit" maxlength="1" id="pd2" inputmode="numeric">
                <input type="password" class="pin-digit" maxlength="1" id="pd3" inputmode="numeric">
                <input type="password" class="pin-digit" maxlength="1" id="pd4" inputmode="numeric">
            </div>
            <button class="pin-btn" onclick="checkPin()">Giriş</button>
            <div class="pin-error" id="pinError"></div>
            <button class="pin-back" onclick="window.location.href='index.html'">← Ana Sayfaya Dön</button>
        </div>
    </div>

    <!-- ─── PANEL ─── -->
    <div id="panel">

        <div class="topbar">
            <button class="back-btn" onclick="window.location.href='index.html'">← Geri</button>
            <span class="topbar-title">🚚 Dağıtım Paneli</span>
            <span class="topbar-date" id="todayBadge">—</span>
            <button class="refresh-btn" onclick="loadData()">🔄 Yenile</button>
            <button class="print-btn" onclick="window.print()">🖨️ Yazdır</button>
        </div>

        <div class="content">

            <!-- Bölüm 0: Bugün Gelen Girişleri -->
            <div class="section-header">
                <span class="section-title">📦 Bugün Gelen Girişleri</span>
                <div class="section-line"></div>
            </div>
            <!-- Masaüstü: tablo -->
            <div class="plan-wrap gelen-table-wrap" style="margin-bottom:32px;">
                <table class="gelen-table" id="gelenTable">
                    <tr><td class="loading-state" colspan="99">Veriler yükleniyor…</td></tr>
                </table>
            </div>
            <!-- Mobil: kart düzeni -->
            <div class="gelen-cards-wrap">
                <div class="gc-grid" id="gelenCards">
                    <div class="loading-state">Veriler yükleniyor…</div>
                </div>
            </div>

            <!-- Bölüm A: Güncel Stok Durumu -->
            <div class="section-header">
                <span class="section-title">Güncel Stok Durumu</span>
                <div class="section-line"></div>
            </div>
            <div class="stock-summary" id="stockSummary">
                <div class="stock-card">
                    <div class="skel" style="width:36px;height:36px;border-radius:8px;"></div>
                    <div class="skel" style="width:60px;height:10px;margin-top:4px;"></div>
                    <div class="skel" style="width:48px;height:36px;margin-top:4px;border-radius:8px;"></div>
                </div>
                <div class="stock-card">
                    <div class="skel" style="width:36px;height:36px;border-radius:8px;"></div>
                    <div class="skel" style="width:60px;height:10px;margin-top:4px;"></div>
                    <div class="skel" style="width:48px;height:36px;margin-top:4px;border-radius:8px;"></div>
                </div>
                <div class="stock-card">
                    <div class="skel" style="width:36px;height:36px;border-radius:8px;"></div>
                    <div class="skel" style="width:60px;height:10px;margin-top:4px;"></div>
                    <div class="skel" style="width:48px;height:36px;margin-top:4px;border-radius:8px;"></div>
                </div>
            </div>

            <div class="grand-total-bar" id="grandTotalBar">
                <span class="grand-total-label">Tüm Şubelerde Toplam</span>
                <span class="grand-total-value" id="grandTotalVal">—</span>
            </div>

            <!-- Bölüm B: Şube Bazlı Stok -->
            <div class="section-header">
                <span class="section-title">Şube Bazlı Stok</span>
                <div class="section-line"></div>
            </div>
            <div class="branches-grid" id="branchesGrid">
                <div class="branch-card">
                    <div class="branch-card-header">
                        <div class="skel" style="width:28px;height:28px;border-radius:6px;flex-shrink:0;"></div>
                        <div class="skel" style="flex:1;height:16px;"></div>
                        <div class="skel" style="width:32px;height:22px;border-radius:6px;"></div>
                    </div>
                </div>
                <div class="branch-card">
                    <div class="branch-card-header">
                        <div class="skel" style="width:28px;height:28px;border-radius:6px;flex-shrink:0;"></div>
                        <div class="skel" style="flex:1;height:16px;"></div>
                        <div class="skel" style="width:32px;height:22px;border-radius:6px;"></div>
                    </div>
                </div>
            </div>

            <!-- Bölüm C: Dağıtım Planı -->
            <div class="section-header">
                <span class="section-title">Dağıtım Planı</span>
                <div class="section-line"></div>
            </div>
            <div class="plan-wrap">
                <table class="plan-table" id="planTable">
                    <tr><td class="loading-state" colspan="99">Veriler yükleniyor…</td></tr>
                </table>
            </div>
            <div class="threshold-legend">
                <span class="legend-item"><span class="dt-critical">ACİL</span> Stok yok — hemen gönder</span>
                <span class="legend-item"><span class="dt-low">+5</span> Eksik adet — tamamla</span>
                <span class="legend-item"><span class="dt-ok">—</span> Yeterli stok</span>
            </div>
            <div class="threshold-note" id="thresholdNote"></div>

        </div>
    </div>

    <script src="supabase-client.js"></script>
    <script>
        // ─── PIN ───
        let _panelPin = '1234'; // DB yüklenene kadar default
        getSetting('dagitimPin').then(val => { if (val) _panelPin = String(val); });

        const pinIds = ['pd1','pd2','pd3','pd4'];

        if (sessionStorage.getItem('dagitimAuth') === '1') {
            document.getElementById('pinOverlay').classList.remove('active');
        }

        pinIds.forEach((id, idx) => {
            const el = document.getElementById(id);
            el.addEventListener('input', e => {
                if (e.target.value && idx < 3) document.getElementById(pinIds[idx + 1]).focus();
                if (e.target.value && idx === 3) checkPin();
            });
            el.addEventListener('keydown', e => {
                if (e.key === 'Backspace' && !e.target.value && idx > 0)
                    document.getElementById(pinIds[idx - 1]).focus();
                if (e.key === 'Enter') checkPin();
            });
        });

        setTimeout(() => {
            if (document.getElementById('pinOverlay').classList.contains('active'))
                document.getElementById('pd1').focus();
        }, 150);

        function checkPin() {
            const entered = pinIds.map(id => document.getElementById(id).value).join('');
            if (entered === _panelPin) {
                sessionStorage.setItem('dagitimAuth', '1');
                document.getElementById('pinOverlay').classList.remove('active');
                loadData();
            } else {
                document.getElementById('pinError').textContent = 'Hatalı şifre!';
                pinIds.forEach(id => document.getElementById(id).value = '');
                document.getElementById('pd1').focus();
                setTimeout(() => document.getElementById('pinError').textContent = '', 2200);
            }
        }

        // ─── VERİ ───
        const branchEmojis = {
            'Rumeli İskelesi': '🌊',
            'Yahya Kemal':     '📚',
            'TunaBoyu':        '🏞️',
            'Sahil':           '🏖️',
            'Vagon':           '🚂',
            'Millet Bahçesi':  '🌳',
        };

        // Şube satış hacmi sıralaması (yüksekten düşüğe)
        const BRANCH_PRIORITY = [
            'Rumeli İskelesi',
            'Millet Bahçesi',
            'Sahil',
            'Yahya Kemal',
            'TunaBoyu',
            'Vagon',
        ];

        // Şubeye özel minimum stok eşikleri (satış hacmine göre)
        const BRANCH_THRESHOLDS = {
            'Rumeli İskelesi': 10, // en yüksek satış
            'Millet Bahçesi':  8,
            'Sahil':           7,
            'Yahya Kemal':     6,
            'TunaBoyu':        5,
            'Vagon':           5,
        };

        const today = getTodayDate();
        document.getElementById('todayBadge').textContent = formatDateTurkish(today);

        async function loadData() {
            // Skeleton göster
            document.getElementById('stockSummary').innerHTML = `
                <div class="stock-card">
                    <div class="skel" style="width:36px;height:36px;border-radius:8px;"></div>
                    <div class="skel" style="width:60px;height:10px;margin-top:4px;"></div>
                    <div class="skel" style="width:48px;height:36px;margin-top:4px;border-radius:8px;"></div>
                </div>
                <div class="stock-card">
                    <div class="skel" style="width:36px;height:36px;border-radius:8px;"></div>
                    <div class="skel" style="width:60px;height:10px;margin-top:4px;"></div>
                    <div class="skel" style="width:48px;height:36px;margin-top:4px;border-radius:8px;"></div>
                </div>`;
            document.getElementById('grandTotalVal').textContent = '—';
            document.getElementById('planTable').innerHTML =
                '<tr><td class="loading-state" colspan="99">Veriler yükleniyor…</td></tr>';
            document.getElementById('gelenTable').innerHTML =
                '<tr><td class="loading-state" colspan="99">Veriler yükleniyor…</td></tr>';
            document.getElementById('gelenCards').innerHTML =
                '<div class="loading-state">Veriler yükleniyor…</div>';

            const [branches, desserts, allStock, todayEntries] = await Promise.all([
                getBranches(),
                getActiveDesserts(),
                getAllLatestStock(),
                getAllDailyEntriesByDate(today)
            ]);

            if (!branches || !desserts) {
                document.getElementById('stockSummary').innerHTML =
                    '<div class="loading-state" style="color:#ef4444;">❌ Veri alınamadı.</div>';
                return;
            }

            // Süper admin panelinden kaydedilen eşikler (DB'den, tüm cihazlarda geçerli)
            const savedThresholds = (await getSetting('dessertThresholds')) || {};

            // ── Bölüm 0: Bugün Gelen Girişleri ──
            buildGelenTable(branches, desserts, todayEntries || []);

            // ── Bölüm A: Tatlı bazlı toplam stok ──
            const summaryEl = document.getElementById('stockSummary');
            summaryEl.innerHTML = '';
            let grandTotal = 0;

            desserts.forEach(dessert => {
                let total = 0;
                branches.forEach(branch => {
                    total += (allStock[branch.id]?.[dessert.id] ?? 0);
                });
                grandTotal += total;

                const card = document.createElement('div');
                card.className = 'stock-card';
                card.innerHTML = `
                    <div class="stock-card-emoji">${dessert.emoji || '🍰'}</div>
                    <div class="stock-card-name">${dessert.name}</div>
                    <div class="stock-card-value ${total === 0 ? 'zero' : ''}">${total}</div>
                `;
                summaryEl.appendChild(card);
            });

            document.getElementById('grandTotalVal').textContent = grandTotal;

            // ── Bölüm B: Şube bazlı açılır/kapanır kartlar ──
            const branchesEl = document.getElementById('branchesGrid');
            branchesEl.innerHTML = '';

            // Satış hacmine göre sırala
            const sortedBranches = [...branches].sort((a, b) => {
                const ai = BRANCH_PRIORITY.indexOf(a.name);
                const bi = BRANCH_PRIORITY.indexOf(b.name);
                return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
            });

            sortedBranches.forEach(branch => {
                const branchStock = allStock[branch.id] || {};
                let branchTotal = 0;
                desserts.forEach(d => { branchTotal += branchStock[d.id] ?? 0; });

                const card = document.createElement('div');
                card.className = 'branch-card';

                const emoji = branchEmojis[branch.name] || '🏪';

                let rowsHtml = '';
                desserts.forEach(dessert => {
                    const val = branchStock[dessert.id] ?? 0;
                    rowsHtml += `
                        <div class="branch-dessert-row">
                            <span class="branch-dessert-emoji">${dessert.emoji || '🍰'}</span>
                            <span class="branch-dessert-name">${dessert.name}</span>
                            <span class="branch-dessert-value ${val === 0 ? 'zero' : ''}">${val === 0 ? '—' : val}</span>
                        </div>`;
                });

                const isMobile = window.innerWidth <= 600;
                if (!isMobile) card.classList.add('open');

                card.innerHTML = `
                    <div class="branch-card-header" onclick="toggleBranchCard(this.closest('.branch-card'))">
                        <span class="branch-card-emoji">${emoji}</span>
                        <span class="branch-card-name">${branch.name}</span>
                        <span class="branch-card-total">${branchTotal}</span>
                        <span class="branch-chevron">▾</span>
                    </div>
                    <div class="branch-dessert-list">
                        <div class="branch-dessert-inner">${rowsHtml}</div>
                    </div>
                `;
                branchesEl.appendChild(card);
            });

            // ── Bölüm C: Dağıtım planı tablosu ──
            buildDeliveryTable(branches, desserts, allStock);
        }

        function toggleBranchCard(card) {
            card.classList.toggle('open');
        }

        function toggleGcCard(card) {
            card.classList.toggle('open');
        }

        function buildDeliveryTable(branches, desserts, allStock) {
            const table = document.getElementById('planTable');

            // Başlık satırı
            let thead = '<thead><tr><th>Şube</th>';
            desserts.forEach(d => {
                thead += `<th title="${d.name}">${d.emoji || '🍰'} ${d.name}</th>`;
            });
            thead += '<th>Durum</th></tr></thead>';

            // Şubeleri satış hacmine göre sırala
            const sortedBranches = [...branches].sort((a, b) => {
                const ai = BRANCH_PRIORITY.indexOf(a.name);
                const bi = BRANCH_PRIORITY.indexOf(b.name);
                return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
            });

            // Veri satırları
            let tbody = '<tbody>';
            sortedBranches.forEach(branch => {
                const branchStock = allStock[branch.id] || {};
                const emoji       = branchEmojis[branch.name] || '🏪';

                let hasCritical = false;
                let hasLow      = false;

                let cells = '';
                desserts.forEach(dessert => {
                    // Eşiği şu öncelikle bul: localStorage → BRANCH_THRESHOLDS → 5
                    const threshold = savedThresholds[branch.id]?.[String(dessert.id)]
                                   ?? BRANCH_THRESHOLDS[branch.name]
                                   ?? 5;
                    const stock = branchStock[dessert.id] ?? 0;
                    if (stock === 0) {
                        hasCritical = true;
                        cells += `<td><span class="dt-critical">ACİL</span></td>`;
                    } else if (stock < threshold) {
                        hasLow = true;
                        const needed = threshold - stock;
                        cells += `<td><span class="dt-low">+${needed}</span></td>`;
                    } else {
                        cells += `<td><span class="dt-ok">—</span></td>`;
                    }
                });

                const needsDelivery = hasCritical || hasLow;
                const statusBadge   = hasCritical
                    ? `<span class="dt-critical">ACİL</span>`
                    : hasLow
                        ? `<span class="dt-low">Eksik var</span>`
                        : `<span class="dt-ok">✓</span>`;

                tbody += `<tr class="${needsDelivery ? 'needs-delivery' : ''}">
                    <td>${emoji} ${branch.name}</td>
                    ${cells}
                    <td>${statusBadge}</td>
                </tr>`;
            });
            tbody += '</tbody>';

            table.innerHTML = thead + tbody;

            // Eşik notu
            const hasCustom = Object.keys(savedThresholds).length > 0;
            document.getElementById('thresholdNote').innerHTML = hasCustom
                ? `<strong>Şube eşikleri:</strong> Süper admin panelinden özelleştirilmiş ✓`
                : `<strong>Şube eşikleri:</strong> Varsayılan — ` +
                  Object.entries(BRANCH_THRESHOLDS)
                    .map(([name, val]) => `${branchEmojis[name] || '🏪'} ${name}: min ${val}`)
                    .join(' &nbsp;·&nbsp; ');
        }

        function buildGelenTable(branches, desserts, entries) {
            const table = document.getElementById('gelenTable');
            const cards = document.getElementById('gelenCards');

            if (!branches.length || !desserts.length) {
                table.innerHTML = '<tr><td class="loading-state" style="color:#ef4444;">❌ Veri alınamadı.</td></tr>';
                cards.innerHTML = '<div class="loading-state" style="color:#ef4444;">❌ Veri alınamadı.</div>';
                return;
            }

            // Lookup: byBranch[branch_id][dessert_id] = received_amount
            const byBranch = {};
            entries.forEach(e => {
                if (!byBranch[e.branch_id]) byBranch[e.branch_id] = {};
                byBranch[e.branch_id][e.dessert_id] = (e.received_amount ?? 0);
            });

            // Şubeleri satış hacmine göre sırala
            const sortedBranches = [...branches].sort((a, b) => {
                const ai = BRANCH_PRIORITY.indexOf(a.name);
                const bi = BRANCH_PRIORITY.indexOf(b.name);
                return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
            });

            // ── Masaüstü tablosu ──
            let thead = '<thead><tr><th>Şube</th>';
            desserts.forEach(d => {
                thead += `<th title="${d.name}">${d.emoji || '🍰'} ${d.name}</th>`;
            });
            thead += '<th>Toplam</th><th>Durum</th></tr></thead>';

            let tbody = '<tbody>';
            sortedBranches.forEach(branch => {
                const branchData = byBranch[branch.id];
                const hasEntries  = !!branchData;
                const emoji       = branchEmojis[branch.name] || '🏪';
                let branchTotal   = 0;
                let cells         = '';

                desserts.forEach(dessert => {
                    if (!hasEntries) {
                        cells += `<td><span class="gt-none">Girilmedi</span></td>`;
                    } else {
                        const amt = branchData[dessert.id] ?? 0;
                        branchTotal += amt;
                        cells += amt > 0
                            ? `<td><span class="gt-ok">${amt}</span></td>`
                            : `<td><span class="gt-zero">—</span></td>`;
                    }
                });

                const totalCell  = hasEntries
                    ? `<td><span class="gt-total">${branchTotal}</span></td>`
                    : `<td>—</td>`;
                const statusCell = hasEntries
                    ? `<td><span class="gt-status-ok">✓ Girildi</span></td>`
                    : `<td><span class="gt-status-none">⚠ Girilmedi</span></td>`;

                tbody += `<tr class="${hasEntries ? '' : 'row-none'}">
                    <td>${emoji} ${branch.name}</td>
                    ${cells}${totalCell}${statusCell}
                </tr>`;
            });
            tbody += '</tbody>';
            table.innerHTML = thead + tbody;

            // ── Mobil kartları ──
            let cardsHtml = '';
            sortedBranches.forEach(branch => {
                const branchData = byBranch[branch.id];
                const hasEntries  = !!branchData;
                const emoji       = branchEmojis[branch.name] || '🏪';
                let branchTotal   = 0;

                if (!hasEntries) {
                    cardsHtml += `
                        <div class="gc-card gc-missing">
                            <div class="gc-header" onclick="toggleGcCard(this.closest('.gc-card'))">
                                <span style="font-size:20px">${emoji}</span>
                                <span class="gc-branch-name">${branch.name}</span>
                                <span class="gt-status-none">⚠ Girilmedi</span>
                                <span class="gc-chevron">▾</span>
                            </div>
                            <div class="gc-collapsible">
                                <div class="gc-missing-notice">Bu şube henüz bugün gelen tatlıları girmemiş.</div>
                            </div>
                        </div>`;
                    return;
                }

                let rowsHtml = '';
                desserts.forEach(dessert => {
                    const amt = branchData[dessert.id] ?? 0;
                    branchTotal += amt;
                    rowsHtml += `
                        <div class="gc-row">
                            <span style="font-size:18px;width:26px;text-align:center;flex-shrink:0">${dessert.emoji || '🍰'}</span>
                            <span class="gc-dessert-name">${dessert.name}</span>
                            <span class="${amt > 0 ? 'gc-amt-ok' : 'gc-amt-zero'}">${amt > 0 ? amt : '—'}</span>
                        </div>`;
                });

                cardsHtml += `
                    <div class="gc-card">
                        <div class="gc-header" onclick="toggleGcCard(this.closest('.gc-card'))">
                            <span style="font-size:20px">${emoji}</span>
                            <span class="gc-branch-name">${branch.name}</span>
                            <span class="gt-status-ok">✓ Girildi</span>
                            <span class="gc-chevron">▾</span>
                        </div>
                        <div class="gc-collapsible">
                            <div class="gc-body">${rowsHtml}</div>
                            <div class="gc-footer">
                                <span class="gc-total-label">Toplam</span>
                                <span class="gt-total">${branchTotal}</span>
                            </div>
                        </div>
                    </div>`;
            });
            cards.innerHTML = cardsHtml;
        }

        // Giriş yapılmışsa yükle
        if (sessionStorage.getItem('dagitimAuth') === '1') loadData();

        // 5 dakikada bir yenile
        setInterval(() => {
            if (sessionStorage.getItem('dagitimAuth') === '1') loadData();
        }, 300000);
    </script>
    <script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js");</script>
