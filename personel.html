<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="theme-color" content="#f59e0b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Personel Yönetimi</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --amber: #f59e0b;
            --green: #10b981;
            --red:   #ef4444;
            --blue:  #3b82f6;
            --bg:    #070d1a;
            --glass: rgba(255,255,255,0.035);
            --border:rgba(255,255,255,0.07);
            --text:  #f0f4ff;
            --muted: rgba(255,255,255,0.35);
        }

        html, body { height: 100%; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; flex-direction: column;
            overflow-x: hidden;
        }

        .bg-grid {
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none; z-index: 0;
        }

        /* ── Topbar ── */
        .topbar {
            position: sticky; top: 0; z-index: 50;
            display: flex; align-items: center; gap: 14px;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(16px);
            background: rgba(7,13,26,0.85);
        }

        .back-btn {
            display: flex; align-items: center;
            padding: 8px 14px;
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 10px; color: var(--muted);
            font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
            touch-action: manipulation; white-space: nowrap; flex-shrink: 0;
        }
        .back-btn:hover { background: rgba(255,255,255,0.07); color: var(--text); }

        .topbar-title { font-size: 16px; font-weight: 700; flex: 1; }
        .topbar-sub   { font-size: 11px; color: var(--muted); margin-top: 1px; }

        .refresh-btn {
            padding: 7px 14px;
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 10px; color: var(--muted);
            font-size: 12px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; flex-shrink: 0;
            touch-action: manipulation;
        }
        .refresh-btn:hover { background: rgba(255,255,255,0.07); color: var(--text); }
        .refresh-btn.spin { animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Content ── */
        .content {
            flex: 1; position: relative; z-index: 1;
            padding: 20px 18px 60px;
            max-width: 700px; width: 100%; margin: 0 auto;
        }

        /* ── Summary chips ── */
        .summary-row {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; margin-bottom: 24px;
        }

        .summary-chip {
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 14px; padding: 14px 12px; text-align: center;
        }
        .chip-num  { font-size: 28px; font-weight: 800; letter-spacing: -0.04em; line-height: 1; margin-bottom: 4px; }
        .chip-lbl  { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; }
        .chip-green .chip-num { color: var(--green); }
        .chip-yellow .chip-num{ color: var(--amber); }
        .chip-red   .chip-num { color: var(--red); }

        /* ── Section header ── */
        .section-head {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 10px; margin-top: 24px;
        }
        .section-head:first-of-type { margin-top: 0; }
        .section-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
        .section-badge {
            font-size: 10px; font-weight: 700;
            padding: 2px 7px; border-radius: 99px;
            background: rgba(255,255,255,0.07);
            color: var(--muted);
        }

        /* ── Branch activity rows ── */
        .branch-row {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px;
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 12px; margin-bottom: 6px;
        }

        .branch-dot {
            width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
        }
        .dot-green  { background: var(--green);  box-shadow: 0 0 6px rgba(16,185,129,0.6); }
        .dot-yellow { background: var(--amber);  box-shadow: 0 0 6px rgba(245,158,11,0.6); }
        .dot-red    { background: var(--red);    box-shadow: 0 0 6px rgba(239,68,68,0.5); }
        .dot-gray   { background: rgba(255,255,255,0.2); }

        .branch-info { flex: 1; min-width: 0; }
        .branch-name-text { font-size: 14px; font-weight: 700; }
        .branch-manager   { font-size: 11px; color: var(--muted); margin-top: 1px; }

        .branch-status {
            font-size: 11px; font-weight: 600; text-align: right; flex-shrink: 0;
        }
        .status-green  { color: var(--green); }
        .status-yellow { color: var(--amber); }
        .status-red    { color: var(--red); }
        .status-gray   { color: rgba(255,255,255,0.25); }

        /* ── Alert list (bugün eksik) ── */
        .alert-row {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 14px;
            background: rgba(239,68,68,0.07);
            border: 1px solid rgba(239,68,68,0.18);
            border-radius: 10px; margin-bottom: 6px;
        }
        .alert-icon { font-size: 16px; flex-shrink: 0; }
        .alert-name { font-size: 13px; font-weight: 700; color: rgba(252,165,165,0.9); }
        .alert-mgr  { font-size: 11px; color: rgba(252,165,165,0.5); margin-top: 1px; }

        /* ── Correction rows ── */
        .corr-row {
            background: rgba(245,158,11,0.05);
            border: 1px solid rgba(245,158,11,0.14);
            border-radius: 12px; padding: 12px 14px; margin-bottom: 8px;
        }
        .corr-head {
            display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap;
        }
        .corr-branch { font-size: 13px; font-weight: 700; color: rgba(245,158,11,0.9); }
        .corr-mgr    { font-size: 11px; color: var(--muted); }
        .corr-tag    { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; background: rgba(245,158,11,0.15); color: var(--amber); border-radius: 6px; padding: 2px 6px; }
        .corr-detail {
            display: flex; gap: 16px; flex-wrap: wrap;
        }
        .corr-item { font-size: 12px; color: rgba(255,255,255,0.55); }
        .corr-item span { color: var(--text); font-weight: 600; }

        /* ── Empty / loading ── */
        .empty-msg {
            text-align: center; padding: 28px 16px;
            color: rgba(255,255,255,0.25); font-size: 13px;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeUp 0.4s ease both; }
    </style>
</head>
<body>
<div class="bg-grid"></div>

<nav class="topbar">
    <button class="back-btn" onclick="window.location.href='admin-dashboard.html'">‹ Geri</button>
    <div style="flex:1">
        <div class="topbar-title">👥 Personel Yönetimi</div>
        <div class="topbar-sub" id="lastUpdated">Yükleniyor…</div>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="loadAll(this)">↻ Yenile</button>
</nav>

<div class="content">

    <!-- Özet chips -->
    <div class="summary-row fade-in" id="summaryRow">
        <div class="summary-chip chip-green">
            <div class="chip-num" id="cntGreen">—</div>
            <div class="chip-lbl">Bugün Aktif</div>
        </div>
        <div class="summary-chip chip-yellow">
            <div class="chip-num" id="cntYellow">—</div>
            <div class="chip-lbl">Dün / Eskiden</div>
        </div>
        <div class="summary-chip chip-red">
            <div class="chip-num" id="cntRed">—</div>
            <div class="chip-lbl">Hiç / 2+ Gün</div>
        </div>
    </div>

    <!-- Şube aktivite durumu -->
    <div class="section-head">
        <span class="section-title">Şube Aktivite Durumu</span>
        <span class="section-badge" id="badgeBranch">—</span>
    </div>
    <div id="branchActivityList"><div class="empty-msg">Yükleniyor…</div></div>

    <!-- Bugün eksik -->
    <div class="section-head" style="margin-top:28px">
        <span class="section-title" style="color:rgba(252,165,165,0.7)">⚠ Bugün Veri Girmeyen</span>
        <span class="section-badge" id="badgeMissing">—</span>
    </div>
    <div id="missingList"><div class="empty-msg">Yükleniyor…</div></div>

    <!-- Düzeltme geçmişi -->
    <div class="section-head" style="margin-top:28px">
        <span class="section-title" style="color:rgba(251,191,36,0.7)">✏ Düzeltme Geçmişi (Son 30 Gün)</span>
        <span class="section-badge" id="badgeCorr">—</span>
    </div>
    <div id="correctionList"><div class="empty-msg">Yükleniyor…</div></div>

</div>

<script src="supabase-client.js"></script>
<script>
    // Auth kontrolü
    if (!localStorage.getItem('adminName') && !localStorage.getItem('superAdminAuth')) {
        window.location.href = 'admin-dashboard.html';
    }

    const TODAY = new Date().toISOString().split('T')[0];
    const YESTERDAY = (() => { const d = new Date(); d.setDate(d.getDate()-1); return d.toISOString().split('T')[0]; })();

    async function loadAll(btn) {
        if (btn) btn.classList.add('spin');
        try {
            const [activity, corrections] = await Promise.all([
                getBranchLastActivity(),
                getCorrectionEntries(30)
            ]);
            renderActivity(activity);
            renderCorrections(corrections);
            document.getElementById('lastUpdated').textContent =
                'Son güncelleme: ' + new Date().toLocaleTimeString('tr-TR', {hour:'2-digit',minute:'2-digit'});
        } catch(e) {
            console.error(e);
        } finally {
            if (btn) btn.classList.remove('spin');
        }
    }

    function renderActivity(list) {
        const el = document.getElementById('branchActivityList');
        const missingEl = document.getElementById('missingList');
        if (!list || list.length === 0) {
            el.innerHTML = '<div class="empty-msg">Şube bulunamadı</div>';
            missingEl.innerHTML = '<div class="empty-msg">—</div>';
            return;
        }

        // Sırala: bugün → dün → eski → hiç
        list.sort((a, b) => {
            const da = a.lastDate || '0000-00-00';
            const db = b.lastDate || '0000-00-00';
            return db.localeCompare(da);
        });

        let green = 0, yellow = 0, red = 0;
        let actHtml = '';
        let missingHtml = '';

        list.forEach(b => {
            const last = b.lastDate;
            let dotCls, statusCls, statusTxt;

            if (!last) {
                dotCls = 'dot-gray'; statusCls = 'status-gray';
                statusTxt = 'Hiç giriş yok'; red++;
            } else if (last === TODAY) {
                dotCls = 'dot-green'; statusCls = 'status-green';
                statusTxt = 'Bugün ✓'; green++;
            } else if (last === YESTERDAY) {
                dotCls = 'dot-yellow'; statusCls = 'status-yellow';
                statusTxt = 'Dün'; yellow++;
            } else {
                dotCls = 'dot-red'; statusCls = 'status-red';
                const days = Math.round((new Date(TODAY) - new Date(last)) / 86400000);
                statusTxt = days + ' gün önce'; red++;
            }

            actHtml += `<div class="branch-row fade-in">
                <div class="branch-dot ${dotCls}"></div>
                <div class="branch-info">
                    <div class="branch-name-text">${b.name}</div>
                    <div class="branch-manager">${b.manager_name || 'Müdür atanmamış'}</div>
                </div>
                <div class="branch-status ${statusCls}">${statusTxt}</div>
            </div>`;

            if (last !== TODAY) {
                missingHtml += `<div class="alert-row fade-in">
                    <span class="alert-icon">⚠️</span>
                    <div>
                        <div class="alert-name">${b.name}</div>
                        <div class="alert-mgr">${b.manager_name || '—'} · Son giriş: ${last ? formatTR(last) : 'Hiçbir zaman'}</div>
                    </div>
                </div>`;
            }
        });

        document.getElementById('cntGreen').textContent  = green;
        document.getElementById('cntYellow').textContent = yellow;
        document.getElementById('cntRed').textContent    = red;
        document.getElementById('badgeBranch').textContent = list.length + ' şube';
        document.getElementById('badgeMissing').textContent = (list.length - green) + ' şube';

        el.innerHTML = actHtml || '<div class="empty-msg">—</div>';
        missingEl.innerHTML = missingHtml || '<div class="empty-msg" style="color:rgba(16,185,129,0.6)">✓ Tüm şubeler bugün giriş yaptı</div>';
    }

    function renderCorrections(list) {
        const el = document.getElementById('correctionList');
        document.getElementById('badgeCorr').textContent = list.length + ' kayıt';

        if (!list || list.length === 0) {
            el.innerHTML = '<div class="empty-msg">Son 30 günde düzeltme girişi yok</div>';
            return;
        }

        const html = list.map(c => {
            // [DÜZ 30.03.2026 14:32] gibi etiketi parse et
            const match = (c.notes || '').match(/\[DÜZ ([^\]]+)\]/);
            const corrTime = match ? match[1] : '—';
            const branch  = c.branches?.name || '?';
            const mgr     = c.branches?.manager_name || '—';
            const dessert = (c.desserts?.emoji || '') + ' ' + (c.desserts?.name || '?');

            return `<div class="corr-row fade-in">
                <div class="corr-head">
                    <span class="corr-branch">${branch}</span>
                    <span class="corr-mgr">${mgr}</span>
                    <span class="corr-tag">Düzeltme</span>
                </div>
                <div class="corr-detail">
                    <div class="corr-item">Tatlı: <span>${dessert}</span></div>
                    <div class="corr-item">Tarih: <span>${formatTR(c.entry_date)}</span></div>
                    <div class="corr-item">Düzeltildi: <span>${corrTime}</span></div>
                    ${c.received_amount  != null ? `<div class="corr-item">Gelen: <span>${c.received_amount}</span></div>` : ''}
                    ${c.remaining_amount != null ? `<div class="corr-item">Kalan: <span>${c.remaining_amount}</span></div>` : ''}
                    ${c.waste_amount     != null && c.waste_amount > 0 ? `<div class="corr-item">Zayiat: <span>${c.waste_amount}</span></div>` : ''}
                </div>
            </div>`;
        }).join('');

        el.innerHTML = html;
    }

    function formatTR(dateStr) {
        if (!dateStr) return '—';
        const d = new Date(dateStr + 'T12:00:00');
        return d.toLocaleDateString('tr-TR', { day:'numeric', month:'long', year:'numeric' });
    }

    loadAll(null);
</script>
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js");</script>
</body>
</html>
