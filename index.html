<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="theme-color" content="#f59e0b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tatlı Takip">
    <title>🍰 Tatlı Takip Sistemi</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #f59e0b;
            --primary-dark: #d97706;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-tertiary: #94a3b8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a1020, #0f172a, #0a1020);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Arka plan efektleri */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
            pointer-events: none;
        }

        .orb-1 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, #f59e0b, transparent);
            top: -200px; left: -200px;
            animation: float1 20s ease-in-out infinite;
        }

        .orb-2 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, #3b82f6, transparent);
            bottom: -150px; right: -150px;
            animation: float2 25s ease-in-out infinite;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(50px, -50px); }
        }

        @keyframes float2 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-40px, 40px); }
        }

        /* Ana container */
        .main-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            text-align: center;
        }

        /* Logo animasyonu */
        .logo-container {
            margin-bottom: 36px;
        }

        .animated-logo {
            font-size: 100px;
            display: inline-block;
            filter: drop-shadow(0 10px 30px rgba(245, 158, 11, 0.5));
        }

        /* Başlık */
        .main-title {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .main-subtitle {
            font-size: 14px;
            color: var(--text-tertiary);
            margin-bottom: 48px;
        }

        /* Butonlar */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Büyük buton (Müdür) */
        .btn-primary {
            width: 100%;
            padding: 24px 32px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 10px 40px rgba(245, 158, 11, 0.4);
            transition: all 0.3s;
            touch-action: manipulation;
        }

        .btn-primary:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 50px rgba(245, 158, 11, 0.6);
        }

        .btn-primary:active { transform: translateY(-1px); }

        .btn-icon { font-size: 28px; }

        /* Küçük butonlar grubu */
        .btn-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .btn-secondary {
            padding: 18px 20px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            touch-action: manipulation;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-secondary:active { transform: translateY(0); }

        .btn-secondary .btn-icon { font-size: 32px; }

        /* Footer */
        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: var(--text-tertiary);
            opacity: 0.6;
        }

        /* ─── VIP Yönetici Kartı ─── */
        .admin-link-wrap {
            margin-top: 24px;
            display: flex;
            justify-content: center;
        }

        .admin-vip-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            touch-action: manipulation;
            position: relative;
            width: 100%;
        }

        .admin-vip-card {
            position: relative;
            padding: 16px 22px;
            background: linear-gradient(135deg, rgba(12,9,3,0.97), rgba(22,16,5,0.98));
            border-radius: 18px;
            border: 1px solid rgba(245,158,11,0.28);
            box-shadow:
                0 0 0 1px rgba(0,0,0,0.6),
                0 8px 32px rgba(0,0,0,0.55),
                0 0 60px rgba(245,158,11,0.05),
                inset 0 1px 0 rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
            overflow: hidden;
            text-align: left;
        }

        /* Üst amber çizgi */
        .admin-vip-card::before {
            content: '';
            position: absolute;
            top: 0; left: 10%; right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(245,158,11,0.55), transparent);
        }

        /* Köşe ışıması */
        .admin-vip-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 60%; height: 60%;
            background: linear-gradient(135deg, rgba(245,158,11,0.07), transparent);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .admin-vip-btn:hover .admin-vip-card {
            border-color: rgba(245,158,11,0.55);
            box-shadow:
                0 0 0 1px rgba(0,0,0,0.6),
                0 12px 48px rgba(0,0,0,0.65),
                0 0 80px rgba(245,158,11,0.12),
                inset 0 1px 0 rgba(255,255,255,0.09);
            transform: translateY(-2px);
        }

        .admin-vip-btn:hover .admin-vip-card::after { opacity: 1; }
        .admin-vip-btn:active .admin-vip-card { transform: translateY(0); }

        /* Pulsing dot */
        .admin-vip-dot {
            position: absolute;
            top: 12px; right: 14px;
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #f59e0b;
            box-shadow: 0 0 8px rgba(245,158,11,0.7);
            animation: vipDotPulse 2.4s ease-in-out infinite;
        }

        @keyframes vipDotPulse {
            0%, 100% { opacity: 0.35; transform: scale(1); box-shadow: 0 0 6px rgba(245,158,11,0.4); }
            50%       { opacity: 1;    transform: scale(1.4); box-shadow: 0 0 14px rgba(245,158,11,0.8); }
        }

        /* İkon kutusu */
        .admin-vip-icon-box {
            width: 52px; height: 52px;
            border-radius: 14px;
            background: linear-gradient(145deg, rgba(245,158,11,0.14), rgba(245,158,11,0.06));
            border: 1px solid rgba(245,158,11,0.22);
            display: flex; align-items: center; justify-content: center;
            font-size: 26px;
            flex-shrink: 0;
            position: relative; z-index: 1;
            filter: drop-shadow(0 2px 8px rgba(245,158,11,0.25));
            transition: filter 0.3s;
        }

        .admin-vip-btn:hover .admin-vip-icon-box {
            filter: drop-shadow(0 4px 14px rgba(245,158,11,0.45));
        }

        /* Metinler */
        .admin-vip-texts {
            flex: 1; min-width: 0;
            position: relative; z-index: 1;
        }

        .admin-vip-label {
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: rgba(245,158,11,0.55);
            margin-bottom: 3px;
        }

        .admin-vip-title {
            font-size: 16px;
            font-weight: 800;
            color: rgba(255,255,255,0.9);
            letter-spacing: -0.02em;
            margin-bottom: 2px;
        }

        .admin-vip-sub {
            font-size: 11px;
            color: rgba(255,255,255,0.28);
            letter-spacing: 0.02em;
            font-weight: 500;
        }

        /* Ok */
        .admin-vip-arrow {
            font-size: 22px;
            color: rgba(245,158,11,0.3);
            font-weight: 300;
            position: relative; z-index: 1;
            transition: transform 0.25s cubic-bezier(0.16,1,0.3,1), color 0.25s;
            flex-shrink: 0;
            line-height: 1;
        }

        .admin-vip-btn:hover .admin-vip-arrow {
            transform: translateX(5px);
            color: rgba(245,158,11,0.8);
        }

        /* Gizli sistem linki */
        .sys-link {
            margin-top: 28px;
            text-align: center;
        }

        .sys-link a {
            font-size: 10px;
            color: rgba(255,255,255,0.06);
            text-decoration: none;
            letter-spacing: 0.15em;
            transition: color 0.3s;
        }

        .sys-link a:hover { color: rgba(255,255,255,0.25); }

        /* Modal ortak */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(10, 16, 32, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 32px;
            max-width: 500px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            animation: modalUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalUp {
            from { transform: translateY(24px); opacity: 0; }
            to   { transform: translateY(0); opacity: 1; }
        }

        .modal-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 24px;
            text-align: center;
        }

        /* Şube seçimi */
        .branch-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .branch-card {
            padding: 20px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            touch-action: manipulation;
        }

        .branch-card:hover {
            background: rgba(14, 165, 233, 0.2);
            border-color: rgba(14, 165, 233, 0.4);
            transform: translateY(-3px);
        }

        .branch-emoji { font-size: 36px; margin-bottom: 8px; display: block; }
        .branch-name { font-size: 14px; font-weight: 600; }

        .modal-close {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            color: var(--text-tertiary);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-close:hover { background: rgba(255, 255, 255, 0.1); color: white; }

        /* PIN Modal */
        .pin-modal-content { text-align: center; }

        .pin-input-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 20px 0 28px;
        }

        .pin-input {
            width: 62px;
            height: 70px;
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            color: white;
            outline: none;
            transition: all 0.2s;
        }

        .pin-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.15);
        }

        .btn-verify {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(245, 158, 11, 0.35);
            transition: all 0.3s;
            margin-bottom: 12px;
            touch-action: manipulation;
        }

        .btn-verify:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(245, 158, 11, 0.5); }

        /* ─── Admin Neon Card ─── */
        .admin-card-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .admin-card-outer {
            position: relative;
            width: min(320px, 92vw);
            height: 370px;
            border-radius: 18px;
            background: #05080f;
            border: 1px solid rgba(245, 158, 11, 0.2);
            box-shadow:
                -6px -6px 20px rgba(245, 158, 11, 0.55),
                 6px  6px 20px rgba(59, 130, 246, 0.45),
                 0 0 60px rgba(245, 158, 11, 0.07);
            overflow: hidden;
            animation: cardPop 0.45s cubic-bezier(0.34, 1.4, 0.64, 1) both;
        }

        @keyframes cardPop {
            from { transform: scale(0.88); opacity: 0; }
            to   { transform: scale(1);    opacity: 1; }
        }

        /* Üst-sol amber köşe */
        .admin-card-outer::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 55%; height: 45%;
            background: linear-gradient(135deg, rgba(245,158,11,0.13), transparent);
            pointer-events: none;
        }

        /* Alt-sağ mavi köşe */
        .admin-card-outer::after {
            content: '';
            position: absolute;
            bottom: 0; right: 0;
            width: 55%; height: 45%;
            background: linear-gradient(315deg, rgba(59,130,246,0.1), transparent);
            pointer-events: none;
        }

        .admin-card-inner {
            position: absolute;
            inset: 50px 36px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.55);
            box-shadow: inset 0 10px 22px rgba(0,0,0,0.65);
            border-bottom: 1.5px solid rgba(255,255,255,0.16);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            overflow: visible;
            padding: 0 10px;
            z-index: 1;
        }

        .admin-card-title {
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #f59e0b;
            text-shadow: 0 0 14px rgba(245,158,11,0.7);
        }

        .admin-pin-row {
            display: flex;
            gap: 10px;
            animation: adminSlideUp 0.5s cubic-bezier(0.34,1.3,0.64,1) 0.15s both;
        }

        .admin-pin-box {
            width: 44px;
            height: 50px;
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            background: rgba(255,255,255,0.06);
            border: 1.5px solid rgba(245,158,11,0.3);
            border-radius: 10px;
            color: white;
            outline: none;
            transition: all 0.2s;
        }

        .admin-pin-box:focus {
            border-color: #f59e0b;
            background: rgba(245,158,11,0.09);
            box-shadow: 0 0 0 3px rgba(245,158,11,0.15), 0 0 14px rgba(245,158,11,0.25);
        }

        .admin-signin-btn {
            width: 100%;
            padding: 11px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border: none;
            border-radius: 10px;
            color: #060a14;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 18px rgba(245,158,11,0.4);
            transition: all 0.3s;
            touch-action: manipulation;
            animation: adminSlideUp 0.5s cubic-bezier(0.34,1.3,0.64,1) 0.25s both;
        }

        .admin-signin-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 26px rgba(245,158,11,0.55);
        }

        .admin-signin-btn:active { transform: translateY(0); }

        @keyframes adminSlideUp {
            from { transform: translateY(30px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }

        .admin-cancel {
            padding: 10px 28px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            color: rgba(255,255,255,0.38);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
        }

        .admin-cancel:hover {
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.7);
            border-color: rgba(255,255,255,0.18);
        }

        /* Yükleniyor spinner */
        #loadingOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(10, 16, 32, 0.7);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }

        #loadingOverlay.active { display: flex; }

        .spinner {
            width: 48px; height: 48px;
            border: 4px solid rgba(255,255,255,0.15);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Toast */
        #toastContainer {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .animated-logo { font-size: 80px; }
            .main-title { font-size: 26px; }
            .btn-primary { font-size: 18px; padding: 20px 24px; }
            .btn-secondary { font-size: 14px; padding: 16px 12px; }
            .pin-input { width: 54px; height: 62px; font-size: 24px; }
        }
    </style>
</head>
<body>

    <!-- Arka plan -->
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <!-- Ana container -->
    <div class="main-container">
        <!-- Logo -->
        <div class="logo-container">
            <div class="animated-logo" id="mainLogo">🍰</div>
        </div>

        <!-- Başlık -->
        <h1 class="main-title">Tatlı Takip Sistemi</h1>
        <p class="main-subtitle">Mutlukent Esenlik Hizmetleri A.Ş</p>

        <!-- Butonlar -->
        <div class="btn-group">

            <!-- Müdür Girişi (Büyük) -->
            <button class="btn-primary" onclick="openBranchSelection()">
                <span class="btn-icon">🏪</span>
                <span>Müdür Girişi</span>
            </button>

            <!-- Dağıtım + Tatlıcılar (Küçük, yan yana) -->
            <div class="btn-row">
                <button class="btn-secondary" onclick="openDagitim()">
                    <span class="btn-icon">🚚</span>
                    <span>Dağıtım</span>
                </button>
                <button class="btn-secondary" onclick="openTatlicilar()">
                    <span class="btn-icon">👨‍🍳</span>
                    <span>Tatlıcılar</span>
                </button>
            </div>

        </div>

        <!-- Footer -->
        <div class="footer">© 2026 Mutlukent Esenlik Hizmetleri A.Ş</div>

        <!-- VIP Yönetici Kartı -->
        <div class="admin-link-wrap" style="margin-bottom:0">
            <button class="admin-vip-btn" onclick="openAdminLogin()">
                <div class="admin-vip-card">
                    <div class="admin-vip-dot"></div>
                    <div class="admin-vip-icon-box">👔</div>
                    <div class="admin-vip-texts">
                        <div class="admin-vip-label">Genel Müdür Girişi</div>
                        <div class="admin-vip-title">Yönetici Paneli</div>
                    </div>
                    <span class="admin-vip-arrow">›</span>
                </div>
            </button>
        </div>
        <!-- Gizli sistem erişimi -->
        <div class="sys-link"><a href="superadmin.html">sys</a></div>
    </div>

    <!-- ŞUBE SEÇİMİ MODAL -->
    <div class="modal" id="branchModal">
        <div class="modal-content">
            <h3 class="modal-title">🏪 Şubenizi Seçin</h3>
            <div class="branch-grid" id="branchGrid">
                <div style="grid-column:1/-1; text-align:center; padding:32px; color:var(--text-tertiary);">
                    Şubeler yükleniyor...
                </div>
            </div>
            <button class="modal-close" onclick="closeBranchModal()">İptal</button>
        </div>
    </div>

    <!-- PIN MODAL -->
    <div class="modal" id="pinModal">
        <div class="modal-content pin-modal-content">
            <div style="font-size:52px; margin-bottom:12px;" id="pinBranchEmoji">🏪</div>
            <h3 class="modal-title" id="pinModalTitle">Şube Şifresi</h3>
            <p style="color:var(--text-tertiary); font-size:14px; margin-bottom:4px;">4 haneli şifrenizi girin</p>
            <div class="pin-input-group">
                <input type="password" class="pin-input" maxlength="1" id="pin1" inputmode="numeric">
                <input type="password" class="pin-input" maxlength="1" id="pin2" inputmode="numeric">
                <input type="password" class="pin-input" maxlength="1" id="pin3" inputmode="numeric">
                <input type="password" class="pin-input" maxlength="1" id="pin4" inputmode="numeric">
            </div>
            <button class="btn-verify" onclick="verifyBranchPin()">Giriş Yap</button>
            <button class="modal-close" onclick="closePinModal()">İptal</button>
        </div>
    </div>

    <!-- YÖNETİCİ GİRİŞ MODAL -->
    <div class="modal" id="adminModal">
        <div class="admin-card-wrap">
            <div class="admin-card-outer">
                <div class="admin-card-inner">
                    <p class="admin-card-title">👔 Yönetici</p>
                    <div class="admin-pin-row">
                        <input type="password" class="admin-pin-box" maxlength="1" id="ap1" inputmode="numeric">
                        <input type="password" class="admin-pin-box" maxlength="1" id="ap2" inputmode="numeric">
                        <input type="password" class="admin-pin-box" maxlength="1" id="ap3" inputmode="numeric">
                        <input type="password" class="admin-pin-box" maxlength="1" id="ap4" inputmode="numeric">
                    </div>
                    <button class="admin-signin-btn" onclick="verifyAdminLogin()">Giriş Yap</button>
                </div>
            </div>
            <button class="admin-cancel" onclick="closeAdminModal()">İptal</button>
        </div>
    </div>

    <!-- Yükleniyor -->
    <div id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <!-- Toast container -->
    <div id="toastContainer"></div>

    <script src="supabase-client.js"></script>
    <script>
        // Logo animasyonu
        anime({
            targets: '#mainLogo',
            rotate: ['0deg', '10deg', '-5deg', '0deg'],
            translateY: [0, -18, -8, 0],
            duration: 3000,
            easing: 'easeInOutSine',
            loop: true
        });

        const branchEmojis = {
            'Rumeli İskelesi': '🌊',
            'Yahya Kemal':     '📚',
            'TunaBoyu':        '🏞️',
            'Sahil':           '🏖️',
            'Vagon':           '🚂',
            'Millet Bahçesi':  '🌳',
        };

        let selectedBranch = null;
        let branchesCache = [];

        // Sayfa yüklenince şubeleri arka planda çek
        document.addEventListener('DOMContentLoaded', async () => {
            branchesCache = await getBranches();
        });

        // ─── Şube seçimi ───
        function openBranchSelection() {
            const grid = document.getElementById('branchGrid');

            if (branchesCache.length === 0) {
                grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:32px;color:var(--text-tertiary);">Şube bilgileri alınamadı.</div>';
            } else {
                grid.innerHTML = '';
                branchesCache.forEach(branch => {
                    const emoji = branchEmojis[branch.name] || '🏪';
                    const card = document.createElement('div');
                    card.className = 'branch-card';
                    card.innerHTML = `<span class="branch-emoji">${emoji}</span><div class="branch-name">${branch.name}</div>`;
                    card.onclick = () => {
                        selectedBranch = { ...branch, emoji };
                        closeBranchModal();
                        openPinModal();
                    };
                    grid.appendChild(card);
                });
            }

            document.getElementById('branchModal').classList.add('active');
        }

        function closeBranchModal() {
            document.getElementById('branchModal').classList.remove('active');
        }

        // ─── PIN Modal ───
        function openPinModal() {
            document.getElementById('pinBranchEmoji').textContent = selectedBranch.emoji;
            document.getElementById('pinModalTitle').textContent = selectedBranch.name;
            ['pin1','pin2','pin3','pin4'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('pinModal').classList.add('active');
            setTimeout(() => document.getElementById('pin1').focus(), 150);
        }

        function closePinModal() {
            document.getElementById('pinModal').classList.remove('active');
            ['pin1','pin2','pin3','pin4'].forEach(id => document.getElementById(id).value = '');
        }

        // PIN otomatik geçiş
        const pinIds = ['pin1','pin2','pin3','pin4'];
        pinIds.forEach((id, idx) => {
            const input = document.getElementById(id);
            input.addEventListener('input', e => {
                if (e.target.value && idx < 3) document.getElementById(pinIds[idx + 1]).focus();
            });
            input.addEventListener('keydown', e => {
                if (e.key === 'Backspace' && !e.target.value && idx > 0) document.getElementById(pinIds[idx - 1]).focus();
                if (e.key === 'Enter') verifyBranchPin();
            });
        });

        // Şube girişi doğrula
        async function verifyBranchPin() {
            const pin = pinIds.map(id => document.getElementById(id).value).join('');
            if (pin.length !== 4) { showToast('4 haneli şifre girin!', 'error'); return; }

            toggleLoading(true);
            const result = await checkBranchPassword(selectedBranch.name, pin);
            toggleLoading(false);

            if (result.success) {
                localStorage.setItem('branchId',   result.branchId);
                localStorage.setItem('branchName', result.branchName);
                if (result.managerName) localStorage.setItem('managerName', result.managerName);
                window.location.href = 'branch-menu.html';
            } else {
                showToast(result.error || 'Hatalı şifre!', 'error');
                pinIds.forEach(id => document.getElementById(id).value = '');
                document.getElementById('pin1').focus();
            }
        }

        // ─── Yönetici girişi ───
        const adminPinIds = ['ap1','ap2','ap3','ap4'];

        function openAdminLogin() {
            adminPinIds.forEach(id => document.getElementById(id).value = '');
            document.getElementById('adminModal').classList.add('active');
            setTimeout(() => document.getElementById('ap1').focus(), 200);
        }

        function closeAdminModal() {
            document.getElementById('adminModal').classList.remove('active');
        }

        adminPinIds.forEach((id, idx) => {
            const el = document.getElementById(id);
            el.addEventListener('input', e => {
                if (e.target.value && idx < 3) document.getElementById(adminPinIds[idx + 1]).focus();
                if (e.target.value && idx === 3) verifyAdminLogin();
            });
            el.addEventListener('keydown', e => {
                if (e.key === 'Backspace' && !e.target.value && idx > 0)
                    document.getElementById(adminPinIds[idx - 1]).focus();
                if (e.key === 'Enter') verifyAdminLogin();
            });
        });

        async function verifyAdminLogin() {
            const pin = adminPinIds.map(id => document.getElementById(id).value).join('');
            if (pin.length !== 4) { showToast('4 haneli şifre girin!', 'error'); return; }

            toggleLoading(true);
            const result = await checkAdminPasswordOnly(pin);
            toggleLoading(false);

            if (result.success) {
                localStorage.setItem('adminName', result.adminName || 'Yönetici');
                window.location.href = 'admin-dashboard.html';
            } else {
                showToast(result.error || 'Şifre hatalı!', 'error');
                adminPinIds.forEach(id => document.getElementById(id).value = '');
                document.getElementById('ap1').focus();
            }
        }

        // ─── Dağıtım ───
        function openDagitim() {
            window.location.href = 'dagitim.html';
        }

        // ─── Tatlıcılar ───
        function openTatlicilar() {
            window.location.href = 'tatlilar-panel.html';
        }

        // ─── Modal dışına tıklayınca kapat ───
        ['branchModal','pinModal','adminModal'].forEach(id => {
            document.getElementById(id).addEventListener('click', e => {
                if (e.target.id === id) {
                    if (id === 'pinModal') closePinModal();
                    else if (id === 'branchModal') closeBranchModal();
                    else closeAdminModal();
                }
            });
        });

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                closePinModal();
                closeBranchModal();
                closeAdminModal();
            }
        });
    </script>
    <script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js");</script>
</body>
</html>
