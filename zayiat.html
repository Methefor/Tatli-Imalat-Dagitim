<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="theme-color" content="#ef4444">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tatlı Takip">
    <title>Zayiat Girişi</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --accent:  #ef4444;
            --acc-dim: rgba(239,68,68,0.12);
            --acc-brd: rgba(239,68,68,0.22);
            --bg:      #070d1a;
            --glass:   rgba(255,255,255,0.035);
            --border:  rgba(255,255,255,0.07);
            --text:    #f0f4ff;
            --muted:   rgba(255,255,255,0.35);
        }

        html { height: 100%; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ── Arka plan ── */
        .bg-grid {
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none; z-index: 0;
        }

        .bg-orb-1 {
            position: fixed; top: -20%; left: -15%;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(239,68,68,0.1) 0%, transparent 70%);
            border-radius: 50%; filter: blur(80px);
            pointer-events: none; z-index: 0;
            animation: drift1 16s ease-in-out infinite alternate;
        }

        .bg-orb-2 {
            position: fixed; bottom: -10%; right: -10%;
            width: 380px; height: 380px;
            background: radial-gradient(circle, rgba(96,165,250,0.06) 0%, transparent 70%);
            border-radius: 50%; filter: blur(80px);
            pointer-events: none; z-index: 0;
            animation: drift2 20s ease-in-out infinite alternate;
        }

        @keyframes drift1 { 0% { transform: translate(0,0); } 100% { transform: translate(30px,40px); } }
        @keyframes drift2 { 0% { transform: translate(0,0); } 100% { transform: translate(-25px,-35px); } }

        /* ── Topbar ── */
        .topbar {
            position: sticky; top: 0; z-index: 50;
            display: flex; align-items: center; gap: 14px;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(16px);
            background: rgba(7,13,26,0.8);
            animation: fadeDown 0.4s ease both;
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .back-btn {
            display: flex; align-items: center; gap: 6px;
            padding: 8px 14px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--muted);
            font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
            touch-action: manipulation;
            white-space: nowrap; flex-shrink: 0;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.07);
            color: var(--text);
            border-color: rgba(255,255,255,0.12);
        }

        .topbar-info { flex: 1; min-width: 0; }

        .topbar-title {
            font-size: 16px; font-weight: 700;
            letter-spacing: -0.02em;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .topbar-sub {
            font-size: 11px; color: var(--muted);
            font-weight: 500; letter-spacing: 0.02em; margin-top: 1px;
        }

        .topbar-badge {
            display: flex; align-items: center; gap: 5px;
            padding: 5px 12px;
            background: var(--acc-dim);
            border: 1px solid var(--acc-brd);
            border-radius: 20px;
            font-size: 11px; font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.04em;
            white-space: nowrap; flex-shrink: 0;
        }

        /* ── İçerik ── */
        .content {
            flex: 1; position: relative; z-index: 1;
            padding: 20px 18px 140px;
            max-width: 560px; width: 100%; margin: 0 auto;
        }

        /* ── Tarih Navigatörü ── */
        .date-nav {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 14px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px;
            margin-bottom: 14px;
            opacity: 0;
            animation: fadeUp 0.5s ease 0.06s both;
        }

        .date-nav-btn {
            flex-shrink: 0;
            width: 38px; height: 38px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 20px; font-weight: 700;
            cursor: pointer; transition: all 0.18s;
            touch-action: manipulation; line-height: 1;
        }

        .date-nav-btn:hover:not(:disabled) {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.15);
        }

        .date-nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }

        .date-nav-center {
            flex: 1; position: relative; text-align: center; cursor: pointer;
        }

        .date-display {
            font-size: 14px; font-weight: 700; letter-spacing: -0.01em;
        }

        .date-display-sub {
            font-size: 10px; color: var(--muted);
            font-weight: 500; letter-spacing: 0.05em; margin-top: 2px;
        }

        .date-picker-overlay {
            position: absolute; inset: 0;
            opacity: 0; cursor: pointer;
            width: 100%; height: 100%;
            border: none; background: transparent; font-size: 0;
        }

        /* ── Bilgi kartı ── */
        .info-card {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px;
            background: rgba(239,68,68,0.07);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 14px;
            margin-bottom: 14px;
            opacity: 0; animation: fadeUp 0.5s ease 0.08s both;
        }

        .info-card-icon { font-size: 20px; flex-shrink: 0; }

        .info-card-text {
            font-size: 12px; color: rgba(252,165,165,0.85);
            font-weight: 500; line-height: 1.45;
        }

        /* ── Tatlı listesi ── */
        .dessert-list {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .dessert-row {
            display: flex; align-items: center; gap: 14px;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.045);
            opacity: 0;
            animation: rowIn 0.5s cubic-bezier(0.16,1,0.3,1) both;
        }

        .dessert-row:last-child { border-bottom: none; }

        .dessert-row:nth-child(1)  { animation-delay: 0.08s; }
        .dessert-row:nth-child(2)  { animation-delay: 0.14s; }
        .dessert-row:nth-child(3)  { animation-delay: 0.20s; }
        .dessert-row:nth-child(4)  { animation-delay: 0.26s; }
        .dessert-row:nth-child(5)  { animation-delay: 0.32s; }
        .dessert-row:nth-child(6)  { animation-delay: 0.38s; }
        .dessert-row:nth-child(7)  { animation-delay: 0.44s; }
        .dessert-row:nth-child(8)  { animation-delay: 0.50s; }
        .dessert-row:nth-child(9)  { animation-delay: 0.56s; }
        .dessert-row:nth-child(10) { animation-delay: 0.62s; }

        @keyframes rowIn {
            from { opacity: 0; transform: translateX(-12px); filter: blur(4px); }
            to   { opacity: 1; transform: translateX(0);     filter: blur(0);   }
        }

        .dessert-emoji {
            font-size: 28px; flex-shrink: 0;
            width: 44px; height: 44px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
        }

        .dessert-name {
            flex: 1; font-size: 15px; font-weight: 600;
            letter-spacing: -0.01em; min-width: 0;
        }

        .dessert-received {
            font-size: 11px; color: var(--muted); margin-top: 2px; font-weight: 500;
        }

        .num-input {
            width: 80px; height: 48px;
            background: var(--acc-dim);
            border: 1.5px solid var(--acc-brd);
            border-radius: 12px;
            color: var(--text);
            font-size: 20px; font-weight: 700;
            text-align: center; outline: none;
            transition: all 0.2s; flex-shrink: 0;
            font-variant-numeric: tabular-nums;
            -webkit-appearance: none; -moz-appearance: textfield;
        }

        .num-input::-webkit-inner-spin-button,
        .num-input::-webkit-outer-spin-button { -webkit-appearance: none; }

        .num-input:focus {
            background: rgba(239,68,68,0.18);
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(239,68,68,0.1), 0 0 24px rgba(239,68,68,0.15);
            transform: scale(1.04);
        }

        /* ── Hızlı ekleme butonları ── */
        .quick-btns { display: flex; gap: 4px; margin-top: 5px; }
        .quick-btn {
            padding: 2px 9px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            color: rgba(255,255,255,0.45);
            font-size: 11px; font-weight: 700;
            cursor: pointer; touch-action: manipulation;
            transition: all 0.15s;
        }
        .quick-btn:active {
            background: rgba(239,68,68,0.18);
            border-color: rgba(239,68,68,0.35);
            color: var(--accent);
            transform: scale(0.88);
        }
        [data-theme="light"] .quick-btn { color: rgba(0,0,0,0.4); background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.1); }

        /* ── Toplam ── */
        .total-card {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 22px;
            background: linear-gradient(135deg, rgba(239,68,68,0.1), rgba(239,68,68,0.04));
            border: 1px solid var(--acc-brd);
            border-radius: 16px; margin-bottom: 14px;
            opacity: 0; animation: fadeUp 0.6s ease 0.55s both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); filter: blur(4px); }
            to   { opacity: 1; transform: translateY(0);    filter: blur(0);   }
        }

        .total-label {
            font-size: 12px; font-weight: 700; color: var(--accent);
            letter-spacing: 0.1em; text-transform: uppercase;
        }

        .total-value {
            font-size: 40px; font-weight: 800; color: var(--accent);
            letter-spacing: -0.04em; font-variant-numeric: tabular-nums;
            transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
        }

        .total-value.bump { transform: scale(1.12); }

        /* ── Kaydet (sabit alt) ── */
        .save-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 16px 18px calc(16px + env(safe-area-inset-bottom));
            background: linear-gradient(to top, rgba(7,13,26,0.98) 70%, transparent);
            z-index: 40;
        }

        .save-bar-row {
            display: flex;
            gap: 10px;
            max-width: 560px;
            margin: 0 auto;
        }

        .save-btn {
            flex: 1;
            padding: 17px;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            border: none; border-radius: 16px;
            color: #fff; font-size: 16px; font-weight: 800;
            cursor: pointer; letter-spacing: 0.01em;
            box-shadow: 0 8px 28px rgba(239,68,68,0.35);
            transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
            touch-action: manipulation;
            opacity: 0; animation: fadeUp 0.6s ease 0.7s forwards;
        }

        .save-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 36px rgba(239,68,68,0.48); }
        .save-btn:active { transform: scale(0.98); transition-duration: 0.1s; }

        .exit-btn {
            padding: 17px 20px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            color: rgba(255,255,255,0.5);
            font-size: 14px; font-weight: 700;
            cursor: pointer;
            touch-action: manipulation;
            transition: all 0.2s;
            white-space: nowrap;
            opacity: 0; animation: fadeUp 0.6s ease 0.75s forwards;
        }

        .exit-btn:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); }

        /* ── Skeleton ── */
        .skel {
            background: rgba(255,255,255,0.06);
            border-radius: 8px;
            animation: shimmer 1.5s ease-in-out infinite;
        }

        @keyframes shimmer { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.9; } }

        #loadingOverlay {
            display: none; position: fixed; inset: 0;
            background: rgba(7,13,26,0.75); z-index: 9999;
            align-items: center; justify-content: center;
            backdrop-filter: blur(6px);
        }

        #loadingOverlay.active { display: flex; }

        .spinner {
            width: 42px; height: 42px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent);
            border-radius: 50%; animation: spin 0.75s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #toastContainer {
            position: fixed; bottom: 90px; left: 50%;
            transform: translateX(-50%);
            z-index: 10000; pointer-events: none;
        }

        @media (max-width: 400px) {
            .dessert-row { padding: 13px 14px; gap: 10px; }
            .dessert-emoji { width: 38px; height: 38px; font-size: 22px; }
            .dessert-name { font-size: 14px; }
            .num-input { width: 70px; height: 44px; font-size: 18px; }
        }

        /* ── TEMA ─────────────────────────── */
        .theme-toggle-btn { background:transparent; border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:16px; cursor:pointer; padding:5px 9px; line-height:1; flex-shrink:0; }
        [data-theme="light"] {
            --bg: #eef2fa;
            --glass: #ffffff;
            --border: rgba(15,23,42,0.1);
            --text: #0f172a;
            --muted: #64748b;
            --accent: #7c3aed;
            --acc-dim: rgba(124,58,237,0.08);
            --acc-brd: rgba(124,58,237,0.22);
        }
        [data-theme="light"] body { background: #eef2fa; }
        [data-theme="light"] .topbar { background: rgba(238,242,250,0.95) !important; border-bottom: 1px solid rgba(0,0,0,0.1); }
        [data-theme="light"] .bg-grid {
            background-image:
                linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
        }
        [data-theme="light"] .bg-orb { background: radial-gradient(circle, rgba(124,58,237,0.07) 0%, transparent 70%); }
        [data-theme="light"] .num-input { background: #f8fafc; color: #0f172a; border-color: rgba(0,0,0,0.12); }
        [data-theme="light"] .dessert-row { border-bottom-color: rgba(0,0,0,0.06); }
    </style>
</head>
<body>

    <div class="bg-grid"></div>
    <div class="bg-orb-1"></div>
    <div class="bg-orb-2"></div>

    <nav class="topbar">
        <button class="back-btn" onclick="window.location.href='branch-menu.html'">‹ Geri</button>
        <div class="topbar-info">
            <div class="topbar-title">Zayiat Girişi</div>
            <div class="topbar-sub" id="branchLabel">Yükleniyor…</div>
        </div>
        <div class="topbar-badge">⚠️ ZAYİAT</div>
        <button id="themeToggleBtn" class="theme-toggle-btn" onclick="toggleTheme()" title="Tema">☀️</button>
    </nav>

    <div class="content">

        <!-- Tarih Navigatörü -->
        <div class="date-nav">
            <button class="date-nav-btn" id="prevDayBtn" onclick="changeDate(-1)">‹</button>
            <div class="date-nav-center">
                <div class="date-display" id="dateDisplay">—</div>
                <div class="date-display-sub">📅 Tarih seçmek için dokun</div>
                <input type="date" class="date-picker-overlay" id="datePicker"
                       onchange="onDatePick(this.value)">
            </div>
            <button class="date-nav-btn" id="nextDayBtn" onclick="changeDate(1)">›</button>
        </div>

        <!-- Bilgi kartı -->
        <div class="info-card">
            <div class="info-card-icon">⚠️</div>
            <div class="info-card-text">Fire, bozulma veya kayıp miktarını girin. Sıfır bırakılan ürünler kaydedilmez.</div>
        </div>

        <!-- Tatlı Listesi -->
        <div class="dessert-list" id="dessertList">
            <div class="dessert-row" style="opacity:1;animation:none;">
                <div class="skel" style="width:44px;height:44px;border-radius:12px;flex-shrink:0;"></div>
                <div class="skel" style="flex:1;height:18px;"></div>
                <div class="skel" style="width:80px;height:48px;border-radius:12px;flex-shrink:0;"></div>
            </div>
            <div class="dessert-row" style="opacity:1;animation:none;">
                <div class="skel" style="width:44px;height:44px;border-radius:12px;flex-shrink:0;"></div>
                <div class="skel" style="flex:1;height:18px;"></div>
                <div class="skel" style="width:80px;height:48px;border-radius:12px;flex-shrink:0;"></div>
            </div>
            <div class="dessert-row" style="opacity:1;animation:none;">
                <div class="skel" style="width:44px;height:44px;border-radius:12px;flex-shrink:0;"></div>
                <div class="skel" style="flex:1;height:18px;"></div>
                <div class="skel" style="width:80px;height:48px;border-radius:12px;flex-shrink:0;"></div>
            </div>
        </div>

        <!-- Toplam -->
        <div class="total-card">
            <span class="total-label">Toplam Zayiat</span>
            <span class="total-value" id="totalValue">0</span>
        </div>
    </div>

    <div class="save-bar">
        <div class="save-bar-row">
            <button class="save-btn" onclick="saveZayiatData()">⚠️ Kaydet</button>
            <button class="exit-btn" onclick="window.location.href='branch-menu.html'">Çıkış ›</button>
        </div>
    </div>

    <div id="loadingOverlay"><div class="spinner"></div></div>
    <div id="toastContainer"></div>

    <script src="supabase-client.js"></script>
    <script>
        const branchId   = localStorage.getItem('branchId');
        const branchName = localStorage.getItem('branchName');
        let   selectedDate = getTodayDate();

        if (!branchId) window.location.href = 'index.html';

        document.getElementById('branchLabel').textContent = branchName;

        function toDateStr(d) {
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        }

        function updateDateUI() {
            const today = getTodayDate();
            document.getElementById('dateDisplay').textContent = formatDateTurkish(selectedDate);
            document.getElementById('datePicker').value = selectedDate;
            document.getElementById('datePicker').max   = today;
            document.getElementById('nextDayBtn').disabled = (selectedDate >= today);
        }

        function changeDate(delta) {
            const d = new Date(selectedDate + 'T12:00:00');
            d.setDate(d.getDate() + delta);
            const next  = toDateStr(d);
            const today = getTodayDate();
            if (next > today) return;
            selectedDate = next;
            updateDateUI();
            loadDesserts();
        }

        function onDatePick(val) {
            if (!val) return;
            const today = getTodayDate();
            selectedDate = val > today ? today : val;
            updateDateUI();
            loadDesserts();
        }

        function quickAdd(btn, delta) {
            const inp = btn.closest('.dessert-row').querySelector('.num-input');
            inp.value = Math.max(0, (parseInt(inp.value) || 0) + delta);
            updateTotal();
        }

        function updateTotal() {
            let total = 0;
            document.querySelectorAll('.num-input').forEach(inp => {
                total += parseInt(inp.value) || 0;
            });
            const el = document.getElementById('totalValue');
            el.textContent = total;
            el.classList.add('bump');
            setTimeout(() => el.classList.remove('bump'), 200);
        }

        async function loadDesserts() {
            const [activeDesserts, entries] = await Promise.all([
                getActiveDesserts(),
                getDailyEntriesByBranch(branchId, selectedDate)
            ]);

            const list = document.getElementById('dessertList');
            list.innerHTML = '';

            if (!activeDesserts || activeDesserts.length === 0) {
                list.innerHTML = emptyStateHTML('🗑️', 'Tatlı bulunamadı', 'Süper yönetici panelinden tatlı eklenebilir');
                return;
            }

            activeDesserts.forEach((dessert, i) => {
                const entry        = (entries || []).find(e => e.dessert_id === dessert.id);
                const wasteAmt     = entry?.waste_amount    ?? 0;
                const receivedAmt  = entry?.received_amount ?? 0;

                const receivedHint = receivedAmt > 0
                    ? `<div class="dessert-received">Gelen: ${receivedAmt} adet</div>`
                    : '';

                const row = document.createElement('div');
                row.className = 'dessert-row';
                row.style.animationDelay = `${0.08 + i * 0.06}s`;
                row.innerHTML = `
                    <div class="dessert-emoji">${dessert.emoji || '🍰'}</div>
                    <div style="flex:1;min-width:0;">
                        <div class="dessert-name">${dessert.name}</div>
                        ${receivedHint}
                        <div class="quick-btns">
                            <button class="quick-btn" type="button" onclick="quickAdd(this,1)">+1</button>
                            <button class="quick-btn" type="button" onclick="quickAdd(this,5)">+5</button>
                            <button class="quick-btn" type="button" onclick="quickAdd(this,10)">+10</button>
                        </div>
                    </div>
                    <input type="number" class="num-input"
                           value="${wasteAmt}" min="0"
                           data-id="${dessert.id}"
                           data-received="${receivedAmt}"
                           inputmode="numeric"
                           oninput="updateTotal()">
                `;
                list.appendChild(row);
            });

            updateTotal();
        }

        async function saveZayiatData() {
            const inputs = document.querySelectorAll('.num-input');
            if (inputs.length === 0) return;

            toggleLoading(true);
            let successCount = 0;

            for (const input of inputs) {
                const wasteAmt    = parseInt(input.value) || 0;
                const receivedAmt = parseInt(input.dataset.received) || 0;

                // Sıfır olan kayıtları atla
                if (wasteAmt === 0) continue;

                const result = await saveDailyEntry(
                    branchId,
                    input.dataset.id,
                    selectedDate,
                    null,      // zayiat kaydı: received_amount'a dokunma
                    null,      // zayiat kaydı: remaining_amount'a dokunma
                    wasteAmt,
                    ''
                );
                if (result.success) successCount++;
            }

            toggleLoading(false);

            if (successCount > 0) {
                showToast(`✅ ${successCount} tatlı zayiatı kaydedildi!`, 'success');
                await loadDesserts(); // Sayfada kal, değerleri yenile
            } else {
                showToast('⚠️ Kaydedilecek zayiat girilmedi.', 'error');
            }
        }

        updateDateUI();
        loadDesserts();
        initPullToRefresh(() => loadDesserts());
    </script>
    <script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js");</script>
</body>
</html>
