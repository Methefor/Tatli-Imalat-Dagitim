<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👨‍🍳 Tatlıcılar Paneli</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:      #0f172a;
            --surface: #1e293b;
            --border:  rgba(255,255,255,0.08);
            --primary: #f59e0b;
            --text:    #f1f5f9;
            --muted:   #94a3b8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ─── PIN EKRANI ─── */
        #pinOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        #pinOverlay.active { display: flex; }

        .pin-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 32px;
            text-align: center;
            width: 90%;
            max-width: 320px;
        }

        .pin-icon  { font-size: 60px; margin-bottom: 16px; display: block; }
        .pin-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
        .pin-sub   { font-size: 13px; color: var(--muted); margin-bottom: 28px; }

        .pin-inputs { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }

        .pin-digit {
            width: 58px; height: 66px;
            font-size: 26px; font-weight: 700;
            text-align: center;
            background: rgba(255,255,255,0.07);
            border: 2px solid rgba(255,255,255,0.14);
            border-radius: 12px;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .pin-digit:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(245,158,11,0.15);
        }

        .pin-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            touch-action: manipulation;
        }
        .pin-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245,158,11,0.4); }

        .pin-error {
            font-size: 13px;
            color: #ef4444;
            margin-top: 12px;
            min-height: 18px;
        }

        /* ─── PANEL ─── */
        #panel { display: flex; flex-direction: column; min-height: 100vh; }

        /* Üst bar */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(15,23,42,0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .back-btn {
            padding: 8px 14px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            color: var(--text);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            touch-action: manipulation;
            transition: background 0.2s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.14); }

        .topbar-title {
            flex: 1;
            font-size: 18px;
            font-weight: 700;
        }

        .topbar-date {
            font-size: 13px;
            color: var(--primary);
            font-weight: 600;
            background: rgba(245,158,11,0.1);
            border: 1px solid rgba(245,158,11,0.2);
            border-radius: 20px;
            padding: 5px 14px;
            white-space: nowrap;
        }

        .refresh-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            color: var(--text);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s;
            touch-action: manipulation;
        }
        .refresh-btn:hover { background: rgba(255,255,255,0.12); }

        /* İçerik */
        .content { padding: 20px 16px 48px; overflow-x: auto; }

        /* ─── TABLO ─── */
        .tatli-tablo {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            min-width: 680px;
        }

        /* Başlık satırı */
        .tatli-tablo thead th {
            padding: 12px 10px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--muted);
            text-align: center;
            border-bottom: 2px solid var(--border);
            white-space: nowrap;
            position: sticky;
            top: 60px;
            background: var(--bg);
            z-index: 10;
        }

        .tatli-tablo thead th:first-child {
            text-align: left;
            padding-left: 12px;
            min-width: 140px;
        }

        .tatli-tablo thead th.toplam-col {
            color: var(--primary);
            border-left: 2px solid rgba(245,158,11,0.2);
        }

        /* Şube emoji satırı */
        .branch-header-row th {
            padding: 8px 10px 14px;
            font-size: 22px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }
        .branch-header-row th:first-child { text-align: left; }

        /* Gövde satırları */
        .tatli-tablo tbody tr {
            border-bottom: 1px solid var(--border);
        }

        .tatli-tablo tbody tr:last-child { border-bottom: none; }

        /* Tatlı isim hücresi */
        .dessert-cell {
            padding: 14px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dessert-emoji-sm { font-size: 24px; }
        .dessert-name-txt { font-size: 15px; font-weight: 600; }

        /* Stok hücresi */
        .stock-cell {
            text-align: center;
            padding: 8px 6px;
            vertical-align: middle;
        }

        .stock-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 52px;
            border-radius: 12px;
            font-size: 22px;
            font-weight: 800;
            border: 2px solid;
            line-height: 1;
        }

        /* Stok renkleri */
        .s-ok     { background: rgba(34,197,94,0.12);  border-color: rgba(34,197,94,0.35);  color: #22c55e; }
        .s-mid    { background: rgba(234,179,8,0.12);  border-color: rgba(234,179,8,0.35);  color: #eab308; }
        .s-low    { background: rgba(239,68,68,0.12);  border-color: rgba(239,68,68,0.35);  color: #ef4444; }
        .s-empty  { background: rgba(0,0,0,0.25);      border-color: rgba(255,255,255,0.1); color: #475569; }

        /* Toplam sütunu */
        .toplam-cell {
            text-align: center;
            padding: 8px 10px;
            border-left: 2px solid rgba(245,158,11,0.15);
        }

        .toplam-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 52px;
            height: 48px;
            padding: 0 10px;
            border-radius: 10px;
            font-size: 22px;
            font-weight: 800;
            background: rgba(245,158,11,0.1);
            border: 1px solid rgba(245,158,11,0.2);
            color: var(--primary);
        }

        /* Alt toplam satırı */
        .sum-row td {
            padding: 10px 6px;
            border-top: 2px solid var(--border);
            text-align: center;
            font-weight: 800;
            font-size: 14px;
            color: var(--muted);
        }
        .sum-row td:first-child { text-align: left; padding-left: 12px; }

        /* ─── ALT BİLGİ ─── */
        .footer-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            padding: 20px 16px;
            border-top: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--muted);
        }

        .legend-dot {
            width: 14px; height: 14px;
            border-radius: 4px;
            border: 2px solid;
        }

        .ld-ok    { background: rgba(34,197,94,0.2);  border-color: #22c55e; }
        .ld-mid   { background: rgba(234,179,8,0.2);  border-color: #eab308; }
        .ld-low   { background: rgba(239,68,68,0.2);  border-color: #ef4444; }
        .ld-empty { background: rgba(0,0,0,0.3);       border-color: #475569; }

        /* ─── YÜKLENİYOR ─── */
        .loading-row td {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
            font-size: 15px;
        }

        /* ─── MOBİL ─── */
        @media (max-width: 600px) {
            .topbar-date { display: none; }
            .topbar-title { font-size: 16px; }
            .stock-badge { width: 46px; height: 44px; font-size: 18px; border-radius: 10px; }
            .toplam-badge { font-size: 18px; height: 40px; }
            .dessert-name-txt { font-size: 13px; }
            .dessert-emoji-sm { font-size: 20px; }
        }
    </style>
</head>
<body>

    <!-- ─── PIN ─── -->
    <div id="pinOverlay" class="active">
        <div class="pin-box">
            <span class="pin-icon">👨‍🍳</span>
            <h2 class="pin-title">Tatlıcılar Paneli</h2>
            <p class="pin-sub">Şifrenizi girin</p>
            <div class="pin-inputs">
                <input type="password" class="pin-digit" maxlength="1" id="pd1" inputmode="numeric">
                <input type="password" class="pin-digit" maxlength="1" id="pd2" inputmode="numeric">
                <input type="password" class="pin-digit" maxlength="1" id="pd3" inputmode="numeric">
                <input type="password" class="pin-digit" maxlength="1" id="pd4" inputmode="numeric">
            </div>
            <button class="pin-btn" onclick="checkPin()">Giriş</button>
            <div class="pin-error" id="pinError"></div>
        </div>
    </div>

    <!-- ─── PANEL ─── -->
    <div id="panel">

        <!-- Üst Bar -->
        <div class="topbar">
            <button class="back-btn" onclick="window.location.href='index.html'">← Geri</button>
            <span class="topbar-title">👨‍🍳 Tatlıcılar Paneli</span>
            <span class="topbar-date" id="todayBadge">—</span>
            <button class="refresh-btn" onclick="loadData()">🔄 Yenile</button>
        </div>

        <!-- Tablo -->
        <div class="content">
            <table class="tatli-tablo">
                <thead>
                    <tr class="branch-header-row" id="branchEmojiRow">
                        <th></th>
                        <!-- şube emojileri dinamik -->
                    </tr>
                    <tr id="branchNameRow">
                        <th>Tatlı</th>
                        <!-- şube isimleri dinamik -->
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr class="loading-row">
                        <td colspan="10">🍰 Yükleniyor...</td>
                    </tr>
                </tbody>
                <tfoot id="tableFoot"></tfoot>
            </table>
        </div>

        <!-- Lejant -->
        <div class="footer-info">
            <div class="legend-item"><div class="legend-dot ld-ok"></div>Yeterli (&gt;20)</div>
            <div class="legend-item"><div class="legend-dot ld-mid"></div>Orta (10–20)</div>
            <div class="legend-item"><div class="legend-dot ld-low"></div>Düşük (1–9)</div>
            <div class="legend-item"><div class="legend-dot ld-empty"></div>Tükendi (0)</div>
        </div>

    </div>

    <script src="supabase-client.js"></script>
    <script>
        // ─── PIN ───
        const PANEL_PIN = '0000';
        const pinIds    = ['pd1','pd2','pd3','pd4'];

        if (sessionStorage.getItem('tatlicilarAuth') === '1') {
            document.getElementById('pinOverlay').classList.remove('active');
            document.getElementById('pd1').blur();
        }

        pinIds.forEach((id, idx) => {
            const el = document.getElementById(id);
            el.addEventListener('input', e => {
                if (e.target.value && idx < 3) document.getElementById(pinIds[idx + 1]).focus();
                if (e.target.value && idx === 3) checkPin();
            });
            el.addEventListener('keydown', e => {
                if (e.key === 'Backspace' && !e.target.value && idx > 0)
                    document.getElementById(pinIds[idx - 1]).focus();
                if (e.key === 'Enter') checkPin();
            });
        });

        setTimeout(() => {
            if (document.getElementById('pinOverlay').classList.contains('active'))
                document.getElementById('pd1').focus();
        }, 150);

        function checkPin() {
            const entered = pinIds.map(id => document.getElementById(id).value).join('');
            if (entered === PANEL_PIN) {
                sessionStorage.setItem('tatlicilarAuth', '1');
                document.getElementById('pinOverlay').classList.remove('active');
                loadData();
            } else {
                document.getElementById('pinError').textContent = 'Hatalı şifre!';
                pinIds.forEach(id => document.getElementById(id).value = '');
                document.getElementById('pd1').focus();
                setTimeout(() => document.getElementById('pinError').textContent = '', 2200);
            }
        }

        // ─── VERİ ───
        const branchEmojis = {
            'Rumeli İskelesi': '🌊',
            'Yahya Kemal':     '📚',
            'TunaBoyu':        '🏞️',
            'Sahil':           '🏖️',
            'Vagon':           '🚂',
            'Millet Bahçesi':  '🌳',
        };

        const today = getTodayDate();
        document.getElementById('todayBadge').textContent = formatDateTurkish(today);

        function stockClass(val) {
            if (val > 20) return 's-ok';
            if (val > 9)  return 's-mid';
            if (val > 0)  return 's-low';
            return 's-empty';
        }

        async function loadData() {
            const body = document.getElementById('tableBody');
            const foot = document.getElementById('tableFoot');
            body.innerHTML = '<tr class="loading-row"><td colspan="10">🍰 Yükleniyor...</td></tr>';
            foot.innerHTML = '';

            const [branches, desserts, allEntries] = await Promise.all([
                getBranches(),
                getActiveDesserts(),
                getAllDailyEntriesByDate(today)
            ]);

            if (!branches || !desserts) {
                body.innerHTML = '<tr class="loading-row"><td colspan="10" style="color:#ef4444;">❌ Veri alınamadı.</td></tr>';
                return;
            }

            // Başlık satırlarını doldur
            const emojiRow = document.getElementById('branchEmojiRow');
            const nameRow  = document.getElementById('branchNameRow');

            // Önce temizle (ilk th hariç)
            while (emojiRow.children.length > 1) emojiRow.removeChild(emojiRow.lastChild);
            while (nameRow.children.length > 1)  nameRow.removeChild(nameRow.lastChild);

            branches.forEach(b => {
                const eTh = document.createElement('th');
                eTh.textContent = branchEmojis[b.name] || '🏪';
                emojiRow.appendChild(eTh);

                const nTh = document.createElement('th');
                nTh.textContent = b.name;
                nameRow.appendChild(nTh);
            });

            // Toplam sütunu başlıkları
            const eTotTh = document.createElement('th');
            eTotTh.innerHTML = '∑';
            eTotTh.className = 'toplam-col';
            emojiRow.appendChild(eTotTh);

            const nTotTh = document.createElement('th');
            nTotTh.textContent = 'TOPLAM';
            nTotTh.className = 'toplam-col';
            nameRow.appendChild(nTotTh);

            // Şube toplamları (alt satır için)
            const branchTotals = new Array(branches.length).fill(0);
            let grandTotal = 0;

            // Tatlı satırlarını doldur
            body.innerHTML = '';

            desserts.forEach(dessert => {
                const entries = (allEntries || []).filter(e => e.dessert_id === dessert.id);
                let rowTotal = 0;

                const tr = document.createElement('tr');

                // Tatlı isim hücresi
                const nameTd = document.createElement('td');
                nameTd.innerHTML = `
                    <div class="dessert-cell">
                        <span class="dessert-emoji-sm">${dessert.emoji || '🍰'}</span>
                        <span class="dessert-name-txt">${dessert.name}</span>
                    </div>
                `;
                tr.appendChild(nameTd);

                // Her şube için stok hücresi
                branches.forEach((branch, idx) => {
                    const entry     = entries.find(e => e.branch_id === branch.id);
                    const remaining = entry?.remaining_amount ?? 0;

                    rowTotal         += remaining;
                    branchTotals[idx] += remaining;

                    const td = document.createElement('td');
                    td.className = 'stock-cell';
                    td.innerHTML = `<div class="stock-badge ${stockClass(remaining)}">${remaining}</div>`;
                    tr.appendChild(td);
                });

                grandTotal += rowTotal;

                // Satır toplamı
                const totTd = document.createElement('td');
                totTd.className = 'toplam-cell';
                totTd.innerHTML = `<div class="toplam-badge">${rowTotal}</div>`;
                tr.appendChild(totTd);

                body.appendChild(tr);
            });

            // Alt toplam satırı
            const sumTr = document.createElement('tr');
            sumTr.className = 'sum-row';

            const sumLabel = document.createElement('td');
            sumLabel.textContent = 'TOPLAM';
            sumTr.appendChild(sumLabel);

            branchTotals.forEach(t => {
                const td = document.createElement('td');
                td.textContent = t;
                sumTr.appendChild(td);
            });

            const sumGrand = document.createElement('td');
            sumGrand.textContent = grandTotal;
            sumGrand.style.color = 'var(--primary)';
            sumTr.appendChild(sumGrand);

            foot.appendChild(sumTr);
        }

        // Giriş yapılmışsa yükle
        if (sessionStorage.getItem('tatlicilarAuth') === '1') loadData();

        // 60 saniyede bir yenile
        setInterval(() => {
            if (sessionStorage.getItem('tatlicilarAuth') === '1') loadData();
        }, 60000);
    </script>
</body>
</html>
