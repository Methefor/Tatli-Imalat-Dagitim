<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>👨‍🍳 Tatlıcılar Paneli</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>!function(){var t=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t)}()</script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:      #0f172a;
            --surface: #1e293b;
            --border:  rgba(255,255,255,0.08);
            --primary: #f59e0b;
            --text:    #f1f5f9;
            --muted:   #64748b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ─── PIN EKRANI ─── */
        #pinOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        #pinOverlay.active { display: flex; }

        .pin-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 32px;
            text-align: center;
            width: 90%;
            max-width: 320px;
        }

        .pin-icon  { font-size: 60px; margin-bottom: 16px; display: block; }
        .pin-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
        .pin-sub   { font-size: 13px; color: var(--muted); margin-bottom: 28px; }

        .pin-inputs { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }

        .pin-digit {
            width: 58px; height: 66px;
            font-size: 26px; font-weight: 700;
            text-align: center;
            background: rgba(255,255,255,0.07);
            border: 2px solid rgba(255,255,255,0.14);
            border-radius: 12px;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .pin-digit:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(245,158,11,0.15);
        }

        .pin-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            touch-action: manipulation;
        }
        .pin-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245,158,11,0.4); }

        .pin-error {
            font-size: 13px;
            color: #ef4444;
            margin-top: 12px;
            min-height: 18px;
        }

        .pin-back {
            margin-top: 16px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.35);
            font-size: 13px;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 8px;
            transition: color 0.2s, background 0.2s;
        }
        .pin-back:hover { color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.06); }

        /* ─── PANEL ─── */
        #panel { display: flex; flex-direction: column; min-height: 100vh; }

        /* Üst bar */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(15,23,42,0.97);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            padding: 8px 14px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            color: var(--text);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            touch-action: manipulation;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .back-btn:hover { background: rgba(255,255,255,0.14); }

        .topbar-title {
            flex: 1;
            font-size: 17px;
            font-weight: 700;
        }

        .topbar-date {
            font-size: 12px;
            color: var(--primary);
            font-weight: 600;
            background: rgba(245,158,11,0.1);
            border: 1px solid rgba(245,158,11,0.2);
            border-radius: 20px;
            padding: 5px 12px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .refresh-btn {
            padding: 8px 14px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            color: var(--text);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s;
            touch-action: manipulation;
            flex-shrink: 0;
        }
        .refresh-btn:hover { background: rgba(255,255,255,0.12); }

        /* ─── İÇERİK ─── */
        .content {
            padding: 24px 16px 48px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        /* Bölüm başlığı */
        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
        }

        .section-line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ─── TOPLAM STOK ALANI ─── */
        .stock-summary {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 12px;
        }

        .stock-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            text-align: center;
        }

        .stock-card-emoji {
            font-size: 28px;
            line-height: 1;
        }

        .stock-card-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: 0.02em;
        }

        .stock-card-value {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -0.04em;
            font-variant-numeric: tabular-nums;
            color: var(--text);
            line-height: 1;
        }

        .stock-card-value.zero { color: rgba(255,255,255,0.2); }

        /* Grand total */
        .grand-total-bar {
            background: linear-gradient(135deg, rgba(245,158,11,0.12), rgba(245,158,11,0.06));
            border: 1px solid rgba(245,158,11,0.25);
            border-radius: 14px;
            padding: 16px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }

        .grand-total-label {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: rgba(245,158,11,0.8);
        }

        .grand-total-value {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.04em;
            color: var(--primary);
        }

        /* ─── ŞUBE KARTLARI ─── */
        .branches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 12px;
        }

        .branch-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            overflow: hidden;
        }

        .branch-card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,0.02);
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }
        .branch-card-header:hover { background: rgba(255,255,255,0.04); }

        .branch-chevron {
            font-size: 14px;
            color: rgba(255,255,255,0.3);
            transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
            flex-shrink: 0;
            margin-left: 2px;
        }
        .branch-card.open .branch-chevron { transform: rotate(180deg); }

        .branch-card-emoji {
            font-size: 22px;
            line-height: 1;
        }

        .branch-card-name {
            font-size: 15px;
            font-weight: 700;
            flex: 1;
        }

        .branch-card-total {
            font-size: 18px;
            font-weight: 800;
            color: var(--primary);
            font-variant-numeric: tabular-nums;
        }

        .branch-dessert-list {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.35s cubic-bezier(0.16,1,0.3,1);
        }
        .branch-card.open .branch-dessert-list { max-height: 800px; }
        .branch-dessert-inner { padding: 10px 0; }

        .branch-dessert-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 18px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }

        .branch-dessert-row:last-child { border-bottom: none; }

        .branch-dessert-emoji {
            font-size: 18px;
            width: 26px;
            text-align: center;
            flex-shrink: 0;
        }

        .branch-dessert-name {
            flex: 1;
            font-size: 14px;
            font-weight: 500;
            color: rgba(255,255,255,0.75);
        }

        .branch-dessert-value {
            font-size: 18px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            min-width: 32px;
            text-align: right;
        }

        .branch-dessert-value.zero {
            color: rgba(255,255,255,0.18);
        }

        /* Yükleniyor */
        .loading-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
            font-size: 15px;
        }

        /* Skeleton */
        .skel {
            background: rgba(255,255,255,0.06);
            border-radius: 8px;
            animation: shimmer 1.4s ease-in-out infinite;
        }

        @keyframes shimmer { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.85; } }

        /* ─── MOBİL ─── */
        @media (max-width: 600px) {
            .topbar-date { display: none; }
            .topbar-title { font-size: 15px; }
            .stock-summary { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; }
            .stock-card { padding: 14px 10px; }
            .stock-card-value { font-size: 28px; }
            .branches-grid { grid-template-columns: 1fr; }
        }

        /* ── HAFTALIK TAKVİM ─────────────────── */
        .schedule-section { margin-top: 36px; }

        .schedule-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        .schedule-table th {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            padding: 10px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,0.02);
        }

        .schedule-table td {
            padding: 12px 16px;
            font-size: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            vertical-align: middle;
        }

        .schedule-table tr:last-child td { border-bottom: none; }

        .schedule-day-col {
            font-weight: 700;
            width: 110px;
            color: rgba(255,255,255,0.7);
        }

        .schedule-day-col.today-day {
            color: var(--primary);
        }

        .schedule-dessert-col { color: var(--text); }

        .schedule-qty-col {
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            color: var(--primary);
            text-align: right;
            width: 90px;
        }

        .schedule-row-today { background: rgba(245,158,11,0.06); }

        .schedule-edit-input {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            padding: 6px 10px;
            width: 100%;
            outline: none;
            transition: border-color 0.2s;
        }
        .schedule-edit-input:focus { border-color: var(--primary); }

        .schedule-qty-input {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 8px;
            color: var(--primary);
            font-size: 14px;
            font-weight: 700;
            padding: 6px 10px;
            width: 80px;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }
        .schedule-qty-input:focus { border-color: var(--primary); }

        .schedule-edit-btn {
            font-size: 12px; padding: 6px 14px;
            background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2);
            border-radius: 8px; color: var(--primary); cursor: pointer;
            font-weight: 600; transition: background 0.2s;
        }
        .schedule-edit-btn:hover { background: rgba(245,158,11,0.2); }
        .schedule-save-btn {
            font-size: 12px; padding: 6px 14px;
            background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3);
            border-radius: 8px; color: #10b981; cursor: pointer;
            font-weight: 700; transition: background 0.2s;
        }
        .schedule-save-btn:hover { background: rgba(16,185,129,0.25); }
        .schedule-cancel-btn {
            font-size: 12px; padding: 6px 14px;
            background: transparent; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; color: rgba(255,255,255,0.4); cursor: pointer;
            transition: background 0.2s;
        }
        .schedule-cancel-btn:hover { background: rgba(255,255,255,0.06); color: var(--text); }

        /* ─── KOLAY GELSİN ─── */
        .greeting-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(6,10,20,0.82);
            z-index: 8000; align-items: flex-start; justify-content: center;
            padding-top: 48px;
            backdrop-filter: blur(4px);
        }
        .greeting-overlay.active { display: flex; }
        .greeting-card {
            background: linear-gradient(135deg, #1a2744, #111d30);
            border: 1px solid rgba(245,158,11,0.3);
            border-radius: 28px;
            padding: 48px 40px 40px;
            text-align: center;
            max-width: 320px; width: 90%;
            box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(245,158,11,0.1);
            animation: greetPop 0.45s cubic-bezier(0.34,1.4,0.64,1) both;
        }
        @keyframes greetPop {
            from { transform: scale(0.8); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }
        .greeting-emoji { font-size: 72px; display: block; margin-bottom: 20px; }
        .greeting-main  {
            font-size: 24px; font-weight: 800; color: #f1f5f9;
            margin-bottom: 8px; line-height: 1.3;
        }
        .greeting-sub {
            font-size: 13px; color: rgba(255,255,255,0.4);
            margin-bottom: 28px;
        }
        .greeting-bar {
            height: 3px; border-radius: 3px;
            background: rgba(245,158,11,0.25);
            overflow: hidden;
        }
        .greeting-bar-fill {
            height: 100%; border-radius: 3px;
            background: linear-gradient(90deg, #f59e0b, #fbbf24);
            animation: greetBar 2.8s linear forwards;
        }
        @keyframes greetBar {
            from { width: 100%; }
            to   { width: 0%; }
        }

        /* Şifre modalı */
        .sched-auth-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(5,8,18,0.9);
            z-index: 9000;
            align-items: center;
            justify-content: center;
        }
        .sched-auth-overlay.active { display: flex; }
        .sched-auth-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px 28px;
            text-align: center;
            width: 90%;
            max-width: 300px;
        }
        .sched-auth-inputs { display: flex; gap: 8px; justify-content: center; margin: 18px 0; }

        /* ── TEMA ─────────────────────────── */
        .theme-toggle-btn { background:transparent; border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:16px; cursor:pointer; padding:5px 9px; line-height:1; }
        [data-theme="light"] {
            --bg: #eef2fa;
            --surface: #ffffff;
            --panel: #ffffff;
            --border: rgba(15,23,42,0.1);
            --text: #0f172a;
            --muted: #64748b;
            --accent: #7c3aed;
        }
        [data-theme="light"] body { background: #eef2fa; }
        [data-theme="light"] .topbar { background: rgba(238,242,250,0.95) !important; border-bottom: 1px solid rgba(0,0,0,0.1); }
        [data-theme="light"] .bg-grid {
            background-image:
                linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
        }
        [data-theme="light"] .bg-orb { background: radial-gradient(circle, rgba(124,58,237,0.07) 0%, transparent 70%); }
        [data-theme="light"] .pin-digit { background: #f8fafc; border-color: rgba(0,0,0,0.14); color: #0f172a; }
        [data-theme="light"] .back-btn { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.1); color: #0f172a; }
        [data-theme="light"] .back-btn:hover { background: rgba(0,0,0,0.08); }
        [data-theme="light"] .refresh-btn { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.1); color: #0f172a; }
        [data-theme="light"] .refresh-btn:hover { background: rgba(0,0,0,0.08); }
    </style>
</head>
<body>

    <!-- ─── PIN ─── -->
    <div id="pinOverlay" class="active">
        <div class="pin-box">
            <span class="pin-icon">👨‍🍳</span>
            <h2 class="pin-title">Tatlıcılar Paneli</h2>
            <p class="pin-sub">Şifrenizi girin</p>
            <div class="pin-inputs">
                <input type="password" class="pin-digit" maxlength="1" id="pd1" inputmode="numeric">
                <input type="password" class="pin-digit" maxlength="1" id="pd2" inputmode="numeric">
                <input type="password" class="pin-digit" maxlength="1" id="pd3" inputmode="numeric">
                <input type="password" class="pin-digit" maxlength="1" id="pd4" inputmode="numeric">
            </div>
            <button class="pin-btn" onclick="checkPin()">Giriş</button>
            <div class="pin-error" id="pinError"></div>
            <button class="pin-back" onclick="window.location.href='index.html'">← Ana Sayfaya Dön</button>
        </div>
    </div>

    <!-- ─── PANEL ─── -->
    <div id="panel">

        <div class="topbar">
            <button class="back-btn" onclick="window.location.href='index.html'">← Geri</button>
            <span class="topbar-title">👨‍🍳 Tatlıcılar Paneli</span>
            <span class="topbar-date" id="todayBadge">—</span>
            <button class="refresh-btn" onclick="loadData()">🔄 Yenile</button>
            <button id="themeToggleBtn" class="theme-toggle-btn" onclick="toggleTheme()" title="Tema">☀️</button>
        </div>

        <div class="content">

            <!-- Bölüm 1: Şube Bazlı -->
            <div class="section-header">
                <span class="section-title">Şube Bazlı Stok</span>
                <div class="section-line"></div>
            </div>
            <div class="branches-grid" id="branchesGrid">
                <!-- skeleton -->
                <div class="branch-card">
                    <div class="branch-card-header">
                        <div class="skel" style="width:28px;height:28px;border-radius:6px;flex-shrink:0;"></div>
                        <div class="skel" style="flex:1;height:16px;"></div>
                        <div class="skel" style="width:32px;height:22px;border-radius:6px;"></div>
                    </div>
                    <div class="branch-dessert-list" style="padding:14px 18px;display:flex;flex-direction:column;gap:10px;">
                        <div class="skel" style="height:14px;border-radius:6px;"></div>
                        <div class="skel" style="height:14px;border-radius:6px;width:80%;"></div>
                        <div class="skel" style="height:14px;border-radius:6px;width:90%;"></div>
                    </div>
                </div>
                <div class="branch-card">
                    <div class="branch-card-header">
                        <div class="skel" style="width:28px;height:28px;border-radius:6px;flex-shrink:0;"></div>
                        <div class="skel" style="flex:1;height:16px;"></div>
                        <div class="skel" style="width:32px;height:22px;border-radius:6px;"></div>
                    </div>
                    <div class="branch-dessert-list" style="padding:14px 18px;display:flex;flex-direction:column;gap:10px;">
                        <div class="skel" style="height:14px;border-radius:6px;"></div>
                        <div class="skel" style="height:14px;border-radius:6px;width:70%;"></div>
                        <div class="skel" style="height:14px;border-radius:6px;width:85%;"></div>
                    </div>
                </div>
            </div>

            <!-- Bölüm 2: Güncel Stok Durumu -->
            <div class="section-header" style="margin-top:28px">
                <span class="section-title">Güncel Stok Durumu</span>
                <div class="section-line"></div>
            </div>
            <div class="stock-summary" id="stockSummary">
                <!-- skeleton -->
                <div class="stock-card">
                    <div class="skel" style="width:36px;height:36px;border-radius:8px;"></div>
                    <div class="skel" style="width:60px;height:10px;margin-top:4px;"></div>
                    <div class="skel" style="width:48px;height:36px;margin-top:4px;border-radius:8px;"></div>
                </div>
                <div class="stock-card">
                    <div class="skel" style="width:36px;height:36px;border-radius:8px;"></div>
                    <div class="skel" style="width:60px;height:10px;margin-top:4px;"></div>
                    <div class="skel" style="width:48px;height:36px;margin-top:4px;border-radius:8px;"></div>
                </div>
                <div class="stock-card">
                    <div class="skel" style="width:36px;height:36px;border-radius:8px;"></div>
                    <div class="skel" style="width:60px;height:10px;margin-top:4px;"></div>
                    <div class="skel" style="width:48px;height:36px;margin-top:4px;border-radius:8px;"></div>
                </div>
            </div>
            <div class="grand-total-bar" id="grandTotalBar">
                <span class="grand-total-label">Genel Toplam</span>
                <span class="grand-total-value" id="grandTotalVal">—</span>
            </div>

            <!-- Bölüm 3: Haftalık Üretim Takvimi -->
            <div class="schedule-section">
                <div class="section-header" style="margin-bottom:14px">
                    <span class="section-title">📅 Haftalık Üretim Takvimi</span>
                    <div class="section-line"></div>
                    <button class="schedule-edit-btn" id="schedEditBtn" onclick="renderSchedule(true)">✏️ Düzenle</button>
                </div>
                <div id="scheduleTableWrap">
                    <div class="loading-state" style="padding:24px 0">Yükleniyor...</div>
                </div>
            </div>

        </div>
    </div>

    <!-- Takvim düzenleme şifre modalı -->
    <div class="sched-auth-overlay" id="schedAuthOverlay">
        <div class="sched-auth-box">
            <div style="font-size:40px;margin-bottom:12px;">🔐</div>
            <div style="font-size:16px;font-weight:700;margin-bottom:6px;">Yönetici Şifresi</div>
            <div style="font-size:12px;color:var(--muted);margin-bottom:4px;">Takvimi düzenlemek için şifre girin</div>
            <div class="sched-auth-inputs">
                <input type="password" class="pin-digit" maxlength="1" id="sa1" inputmode="numeric">
                <input type="password" class="pin-digit" maxlength="1" id="sa2" inputmode="numeric">
                <input type="password" class="pin-digit" maxlength="1" id="sa3" inputmode="numeric">
                <input type="password" class="pin-digit" maxlength="1" id="sa4" inputmode="numeric">
            </div>
            <div id="schedAuthError" style="font-size:12px;color:#ef4444;min-height:16px;margin-bottom:12px;"></div>
            <button class="pin-btn" onclick="checkSchedAuth()" style="font-size:14px;padding:11px;">Giriş</button>
            <button class="pin-back" onclick="closeSchedAuth()" style="margin-top:10px;">İptal</button>
        </div>
    </div>

    <!-- Kolay Gelsin Karşılama -->
    <div class="greeting-overlay" id="greetingOverlay" onclick="dismissGreeting()">
        <div class="greeting-card">
            <span class="greeting-emoji">☺️</span>
            <div class="greeting-main">Hanımlar Kolay Gelsin!</div>
            <div class="greeting-sub">Bugün de güzel tatlılar hazırlıyoruz 🍰</div>
            <div class="greeting-bar"><div class="greeting-bar-fill" id="greetBarFill"></div></div>
        </div>
    </div>

    <script src="supabase-client.js"></script>
    <script>
        // ─── Kolay Gelsin ───
        let greetTimer = null;
        function showGreeting() {
            const el = document.getElementById('greetingOverlay');
            if (!el) return;
            el.classList.add('active');
            if (greetTimer) clearTimeout(greetTimer);
            greetTimer = setTimeout(dismissGreeting, 2800);
        }
        function dismissGreeting() {
            const el = document.getElementById('greetingOverlay');
            if (el) el.classList.remove('active');
            if (greetTimer) { clearTimeout(greetTimer); greetTimer = null; }
        }

        // ─── PIN ───
        const pinIds = ['pd1','pd2','pd3','pd4'];

        if (sessionStorage.getItem('tatlicilarAuth') === '1') {
            document.getElementById('pinOverlay').classList.remove('active');
        }

        pinIds.forEach((id, idx) => {
            const el = document.getElementById(id);
            el.addEventListener('input', e => {
                if (e.target.value && idx < 3) document.getElementById(pinIds[idx + 1]).focus();
                if (e.target.value && idx === 3) checkPin();
            });
            el.addEventListener('keydown', e => {
                if (e.key === 'Backspace' && !e.target.value && idx > 0)
                    document.getElementById(pinIds[idx - 1]).focus();
                if (e.key === 'Enter') checkPin();
            });
        });

        setTimeout(() => {
            if (document.getElementById('pinOverlay').classList.contains('active'))
                document.getElementById('pd1').focus();
        }, 150);

        async function checkPin() {
            const entered = pinIds.map(id => document.getElementById(id).value).join('');
            // Her seferinde DB'den taze oku (PIN değişikliği anında geçerli olsun)
            const currentPin = String((await getSetting('tatlicilarPin')) || '0000');
            if (entered === currentPin) {
                sessionStorage.setItem('tatlicilarAuth', '1');
                document.getElementById('pinOverlay').classList.remove('active');
                showGreeting();
                loadData();
                loadSchedule();
            } else {
                document.getElementById('pinError').textContent = 'Hatalı şifre!';
                pinIds.forEach(id => document.getElementById(id).value = '');
                document.getElementById('pd1').focus();
                setTimeout(() => document.getElementById('pinError').textContent = '', 2200);
            }
        }

        // ─── VERİ ───
        const branchEmojis = {
            'Rumeli İskelesi': '🌊',
            'Yahya Kemal':     '📚',
            'TunaBoyu':        '🏞️',
            'Sahil':           '🏖️',
            'Vagon':           '🚂',
            'Millet Bahçesi':  '🌳',
        };

        const today = getTodayDate();
        document.getElementById('todayBadge').textContent = formatDateTurkish(today);

        async function loadData() {
            // Skeleton göster
            document.getElementById('stockSummary').innerHTML = `
                <div class="stock-card">
                    <div class="skel" style="width:36px;height:36px;border-radius:8px;"></div>
                    <div class="skel" style="width:60px;height:10px;margin-top:4px;"></div>
                    <div class="skel" style="width:48px;height:36px;margin-top:4px;border-radius:8px;"></div>
                </div>
                <div class="stock-card">
                    <div class="skel" style="width:36px;height:36px;border-radius:8px;"></div>
                    <div class="skel" style="width:60px;height:10px;margin-top:4px;"></div>
                    <div class="skel" style="width:48px;height:36px;margin-top:4px;border-radius:8px;"></div>
                </div>
                <div class="stock-card">
                    <div class="skel" style="width:36px;height:36px;border-radius:8px;"></div>
                    <div class="skel" style="width:60px;height:10px;margin-top:4px;"></div>
                    <div class="skel" style="width:48px;height:36px;margin-top:4px;border-radius:8px;"></div>
                </div>`;
            document.getElementById('grandTotalVal').textContent = '—';
            document.getElementById('branchesGrid').innerHTML = '';

            const [branches, desserts, allStock] = await Promise.all([
                getBranches(),
                getActiveDesserts(),
                getAllLatestStock()
            ]);

            if (!branches || !desserts) {
                document.getElementById('stockSummary').innerHTML =
                    '<div class="loading-state" style="color:#ef4444;">❌ Veri alınamadı.</div>';
                return;
            }

            // ── Bölüm 1: Her tatlının toplam stoku ──
            const summaryEl = document.getElementById('stockSummary');
            summaryEl.innerHTML = '';
            let grandTotal = 0;

            desserts.forEach(dessert => {
                let total = 0;
                branches.forEach(branch => {
                    total += (allStock[branch.id]?.[dessert.id] ?? 0);
                });
                grandTotal += total;

                const card = document.createElement('div');
                card.className = 'stock-card';
                card.innerHTML = `
                    <div class="stock-card-emoji">${dessert.emoji || '🍰'}</div>
                    <div class="stock-card-name">${dessert.name}</div>
                    <div class="stock-card-value ${total === 0 ? 'zero' : ''}">${total}</div>
                `;
                summaryEl.appendChild(card);
            });

            document.getElementById('grandTotalVal').textContent = grandTotal;

            // ── Bölüm 2: Şube bazlı ──
            const branchesEl = document.getElementById('branchesGrid');
            branchesEl.innerHTML = '';

            branches.forEach(branch => {
                const branchStock = allStock[branch.id] || {};
                let branchTotal = 0;
                desserts.forEach(d => { branchTotal += branchStock[d.id] ?? 0; });

                const card = document.createElement('div');
                card.className = 'branch-card';

                const emoji = branchEmojis[branch.name] || '🏪';

                let rowsHtml = '';
                desserts.forEach(dessert => {
                    const val = branchStock[dessert.id] ?? 0;
                    rowsHtml += `
                        <div class="branch-dessert-row">
                            <span class="branch-dessert-emoji">${dessert.emoji || '🍰'}</span>
                            <span class="branch-dessert-name">${dessert.name}</span>
                            <span class="branch-dessert-value ${val === 0 ? 'zero' : ''}">${val === 0 ? '—' : val}</span>
                        </div>`;
                });

                const isMobile = window.innerWidth <= 600;
                if (!isMobile) card.classList.add('open');

                card.innerHTML = `
                    <div class="branch-card-header" onclick="toggleBranchCard(this.closest('.branch-card'))">
                        <span class="branch-card-emoji">${emoji}</span>
                        <span class="branch-card-name">${branch.name}</span>
                        <span class="branch-card-total">${branchTotal}</span>
                        <span class="branch-chevron">▾</span>
                    </div>
                    <div class="branch-dessert-list">
                        <div class="branch-dessert-inner">${rowsHtml}</div>
                    </div>
                `;
                branchesEl.appendChild(card);
            });
        }

        function toggleBranchCard(card) {
            card.classList.toggle('open');
        }

        // ── Haftalık Takvim ────────────────────────────
        const DAYS = ['Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi','Pazar'];
        // JS getDay(): 0=Pazar,1=Pzt,...,6=Cmt → offset to DAYS array index
        const JS_DAY_MAP = [6,0,1,2,3,4,5]; // Pazar→6, Pzt→0, ...
        const todayDayIdx = JS_DAY_MAP[new Date().getDay()];

        let _scheduleData = null;
        let _schedEditMode = false;

        async function loadSchedule() {
            _scheduleData = await getWeeklySchedule();
            renderSchedule(false);
        }

        function renderSchedule(editMode) {
            _schedEditMode = editMode;
            const wrap = document.getElementById('scheduleTableWrap');
            if (!_scheduleData) { wrap.innerHTML = '<div class="loading-state" style="padding:24px 0">Yükleniyor...</div>'; return; }

            let rows = '';
            DAYS.forEach((day, i) => {
                const entry = _scheduleData[day] || { dessert: '—', qty: 0 };
                const isToday = i === todayDayIdx;
                const rowCls = isToday ? 'schedule-row-today' : '';
                const dayCls = isToday ? 'today-day' : '';
                const todayBadge = isToday ? ' <span style="font-size:10px;color:var(--primary);font-weight:700;">● Bugün</span>' : '';

                if (editMode) {
                    rows += `<tr class="${rowCls}">
                        <td class="schedule-day-col ${dayCls}">${day}${todayBadge}</td>
                        <td class="schedule-dessert-col"><input class="schedule-edit-input" id="sched-d-${i}" value="${entry.dessert}" placeholder="Tatlı adı"></td>
                        <td class="schedule-qty-col"><input class="schedule-qty-input" id="sched-q-${i}" type="number" min="0" value="${entry.qty}"></td>
                    </tr>`;
                } else {
                    rows += `<tr class="${rowCls}">
                        <td class="schedule-day-col ${dayCls}">${day}${todayBadge}</td>
                        <td class="schedule-dessert-col">${entry.dessert}</td>
                        <td class="schedule-qty-col">${entry.qty > 0 ? entry.qty + ' adet' : '—'}</td>
                    </tr>`;
                }
            });

            const actionRow = editMode
                ? `<div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end">
                       <button class="schedule-cancel-btn" onclick="renderSchedule(false)">İptal</button>
                       <button class="schedule-save-btn" onclick="saveSchedule()">💾 Kaydet</button>
                   </div>`
                : '';

            wrap.innerHTML = `
                <table class="schedule-table">
                    <thead><tr>
                        <th>Gün</th>
                        <th>Tatlı</th>
                        <th style="text-align:right">Adet</th>
                    </tr></thead>
                    <tbody>${rows}</tbody>
                </table>
                ${actionRow}
            `;
        }

        async function saveSchedule() {
            const newSched = {};
            DAYS.forEach((day, i) => {
                const d = document.getElementById(`sched-d-${i}`)?.value?.trim() || '—';
                const q = parseInt(document.getElementById(`sched-q-${i}`)?.value) || 0;
                newSched[day] = { dessert: d, qty: q };
            });
            try {
                await saveWeeklySchedule(newSched);
                _scheduleData = newSched;
                renderSchedule(false);
                showToast('Takvim kaydedildi ✓', 'success');
            } catch (err) {
                showToast('Kayıt hatası: ' + (err.message || ''), 'error');
            }
        }

        // ── Takvim Şifre Modalı ──────────────────────
        const saIds = ['sa1','sa2','sa3','sa4'];

        function openSchedAuth() {
            saIds.forEach(id => document.getElementById(id).value = '');
            document.getElementById('schedAuthError').textContent = '';
            document.getElementById('schedAuthOverlay').classList.add('active');
            setTimeout(() => document.getElementById('sa1').focus(), 100);
        }

        function closeSchedAuth() {
            document.getElementById('schedAuthOverlay').classList.remove('active');
        }

        saIds.forEach((id, idx) => {
            const el = document.getElementById(id);
            el.addEventListener('input', e => {
                if (e.target.value && idx < 3) document.getElementById(saIds[idx + 1]).focus();
                if (e.target.value && idx === 3) checkSchedAuth();
            });
            el.addEventListener('keydown', e => {
                if (e.key === 'Backspace' && !e.target.value && idx > 0) document.getElementById(saIds[idx - 1]).focus();
                if (e.key === 'Enter') checkSchedAuth();
            });
        });

        async function checkSchedAuth() {
            const pin = saIds.map(id => document.getElementById(id).value).join('');
            if (pin.length !== 4) return;
            const result = await checkAdminPasswordOnly(pin);
            if (result.success) {
                closeSchedAuth();
                renderSchedule(true);
            } else {
                document.getElementById('schedAuthError').textContent = 'Şifre hatalı!';
                saIds.forEach(id => document.getElementById(id).value = '');
                document.getElementById('sa1').focus();
            }
        }

        initTheme();

        // Giriş yapılmışsa yükle
        if (sessionStorage.getItem('tatlicilarAuth') === '1') {
            loadData();
            loadSchedule();
        }

        // 60 saniyede bir yenile
        setInterval(() => {
            if (sessionStorage.getItem('tatlicilarAuth') === '1') loadData();
        }, 60000);
    </script>
    <script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js");</script>
</body>
</html>
