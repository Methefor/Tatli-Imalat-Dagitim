<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👨‍🍳 Tatlıcılar Paneli</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:      #0f172a;
            --surface: #1e293b;
            --border:  rgba(255,255,255,0.08);
            --primary: #f59e0b;
            --text:    #f1f5f9;
            --muted:   #64748b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ─── PIN EKRANI ─── */
        #pinOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        #pinOverlay.active { display: flex; }

        .pin-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 32px;
            text-align: center;
            width: 90%;
            max-width: 320px;
        }

        .pin-icon  { font-size: 60px; margin-bottom: 16px; display: block; }
        .pin-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
        .pin-sub   { font-size: 13px; color: var(--muted); margin-bottom: 28px; }

        .pin-inputs { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }

        .pin-digit {
            width: 58px; height: 66px;
            font-size: 26px; font-weight: 700;
            text-align: center;
            background: rgba(255,255,255,0.07);
            border: 2px solid rgba(255,255,255,0.14);
            border-radius: 12px;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .pin-digit:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(245,158,11,0.15);
        }

        .pin-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            touch-action: manipulation;
        }
        .pin-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245,158,11,0.4); }

        .pin-error {
            font-size: 13px;
            color: #ef4444;
            margin-top: 12px;
            min-height: 18px;
        }

        .pin-back {
            margin-top: 16px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.35);
            font-size: 13px;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 8px;
            transition: color 0.2s, background 0.2s;
        }
        .pin-back:hover { color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.06); }

        /* ─── PANEL ─── */
        #panel { display: flex; flex-direction: column; min-height: 100vh; }

        /* Üst bar */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(15,23,42,0.97);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            padding: 8px 14px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            color: var(--text);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            touch-action: manipulation;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .back-btn:hover { background: rgba(255,255,255,0.14); }

        .topbar-title {
            flex: 1;
            font-size: 17px;
            font-weight: 700;
        }

        .topbar-date {
            font-size: 12px;
            color: var(--primary);
            font-weight: 600;
            background: rgba(245,158,11,0.1);
            border: 1px solid rgba(245,158,11,0.2);
            border-radius: 20px;
            padding: 5px 12px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .refresh-btn {
            padding: 8px 14px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            color: var(--text);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s;
            touch-action: manipulation;
            flex-shrink: 0;
        }
        .refresh-btn:hover { background: rgba(255,255,255,0.12); }

        /* ─── İÇERİK ─── */
        .content {
            padding: 24px 16px 48px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        /* Bölüm başlığı */
        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
        }

        .section-line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ─── TOPLAM STOK ALANI ─── */
        .stock-summary {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 12px;
        }

        .stock-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            text-align: center;
        }

        .stock-card-emoji {
            font-size: 28px;
            line-height: 1;
        }

        .stock-card-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: 0.02em;
        }

        .stock-card-value {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -0.04em;
            font-variant-numeric: tabular-nums;
            color: var(--text);
            line-height: 1;
        }

        .stock-card-value.zero { color: rgba(255,255,255,0.2); }

        /* Grand total */
        .grand-total-bar {
            background: linear-gradient(135deg, rgba(245,158,11,0.12), rgba(245,158,11,0.06));
            border: 1px solid rgba(245,158,11,0.25);
            border-radius: 14px;
            padding: 16px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }

        .grand-total-label {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: rgba(245,158,11,0.8);
        }

        .grand-total-value {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.04em;
            color: var(--primary);
        }

        /* ─── ŞUBE KARTLARI ─── */
        .branches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 12px;
        }

        .branch-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            overflow: hidden;
        }

        .branch-card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,0.02);
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }
        .branch-card-header:hover { background: rgba(255,255,255,0.04); }

        .branch-chevron {
            font-size: 14px;
            color: rgba(255,255,255,0.3);
            transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
            flex-shrink: 0;
            margin-left: 2px;
        }
        .branch-card.open .branch-chevron { transform: rotate(180deg); }

        .branch-card-emoji {
            font-size: 22px;
            line-height: 1;
        }

        .branch-card-name {
            font-size: 15px;
            font-weight: 700;
            flex: 1;
        }

        .branch-card-total {
            font-size: 18px;
            font-weight: 800;
            color: var(--primary);
            font-variant-numeric: tabular-nums;
        }

        .branch-dessert-list {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.35s cubic-bezier(0.16,1,0.3,1);
        }
        .branch-card.open .branch-dessert-list { max-height: 800px; }
        .branch-dessert-inner { padding: 10px 0; }

        .branch-dessert-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 18px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }

        .branch-dessert-row:last-child { border-bottom: none; }

        .branch-dessert-emoji {
            font-size: 18px;
            width: 26px;
            text-align: center;
            flex-shrink: 0;
        }

        .branch-dessert-name {
            flex: 1;
            font-size: 14px;
            font-weight: 500;
            color: rgba(255,255,255,0.75);
        }

        .branch-dessert-value {
            font-size: 18px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            min-width: 32px;
            text-align: right;
        }

        .branch-dessert-value.zero {
            color: rgba(255,255,255,0.18);
        }

        /* Yükleniyor */
        .loading-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
            font-size: 15px;
        }

        /* Skeleton */
        .skel {
            background: rgba(255,255,255,0.06);
            border-radius: 8px;
            animation: shimmer 1.4s ease-in-out infinite;
        }

        @keyframes shimmer { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.85; } }

        /* ─── MOBİL ─── */
        @media (max-width: 600px) {
            .topbar-date { display: none; }
            .topbar-title { font-size: 15px; }
            .stock-summary { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; }
            .stock-card { padding: 14px 10px; }
            .stock-card-value { font-size: 28px; }
            .branches-grid { grid-template-columns: 1fr; }
        }

        /* ── ÜRETİM HEDEFİ ──────────────────── */
        .stock-card-target { font-size: 11px; color: var(--muted); margin-top: 1px; }
        .stock-card-progress {
            width: 100%; height: 5px;
            background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden;
            margin-top: 6px;
        }
        .stock-card-progress-fill {
            height: 100%; border-radius: 3px;
            transition: width 0.8s cubic-bezier(0.16,1,0.3,1);
        }
        .pfill-green  { background: linear-gradient(90deg, #10b981, #059669); }
        .pfill-amber  { background: linear-gradient(90deg, #f59e0b, #d97706); }
        .pfill-red    { background: linear-gradient(90deg, #ef4444, #dc2626); }
        .target-edit-row {
            width: 100%; display: flex; align-items: center; gap: 4px;
            margin-top: 6px;
        }
        .target-input {
            flex: 1; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px; color: var(--text); font-size: 12px;
            padding: 4px 6px; text-align: center; max-width: 60px;
        }
        .target-save-btn {
            font-size: 11px; padding: 4px 8px;
            background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.25);
            border-radius: 6px; color: var(--primary); cursor: pointer;
            white-space: nowrap;
        }
        .target-edit-mode-btn {
            font-size: 12px; padding: 6px 12px;
            background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2);
            border-radius: 8px; color: var(--primary); cursor: pointer;
            margin-left: auto;
        }

        /* ── TEMA ─────────────────────────── */
        .theme-toggle-btn { background:transparent; border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:16px; cursor:pointer; padding:5px 9px; line-height:1; }
        [data-theme="light"] {
            --bg: #eef2fa;
            --surface: #ffffff;
            --panel: #ffffff;
            --border: rgba(15,23,42,0.1);
            --text: #0f172a;
            --muted: #64748b;
            --accent: #7c3aed;
        }
        [data-theme="light"] body { background: #eef2fa; }
        [data-theme="light"] .topbar { background: rgba(238,242,250,0.95) !important; border-bottom: 1px solid rgba(0,0,0,0.1); }
        [data-theme="light"] .bg-grid {
            background-image:
                linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
        }
        [data-theme="light"] .bg-orb { background: radial-gradient(circle, rgba(124,58,237,0.07) 0%, transparent 70%); }
        [data-theme="light"] .pin-digit { background: #f8fafc; border-color: rgba(0,0,0,0.14); color: #0f172a; }
        [data-theme="light"] .back-btn { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.1); color: #0f172a; }
        [data-theme="light"] .back-btn:hover { background: rgba(0,0,0,0.08); }
        [data-theme="light"] .refresh-btn { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.1); color: #0f172a; }
        [data-theme="light"] .refresh-btn:hover { background: rgba(0,0,0,0.08); }
    </style>
</head>
<body>

    <!-- ─── PIN ─── -->
    <div id="pinOverlay" class="active">
        <div class="pin-box">
            <span class="pin-icon">👨‍🍳</span>
            <h2 class="pin-title">Tatlıcılar Paneli</h2>
            <p class="pin-sub">Şifrenizi girin</p>
            <div class="pin-inputs">
                <input type="password" class="pin-digit" maxlength="1" id="pd1" inputmode="numeric">
                <input type="password" class="pin-digit" maxlength="1" id="pd2" inputmode="numeric">
                <input type="password" class="pin-digit" maxlength="1" id="pd3" inputmode="numeric">
                <input type="password" class="pin-digit" maxlength="1" id="pd4" inputmode="numeric">
            </div>
            <button class="pin-btn" onclick="checkPin()">Giriş</button>
            <div class="pin-error" id="pinError"></div>
            <button class="pin-back" onclick="window.location.href='index.html'">← Ana Sayfaya Dön</button>
        </div>
    </div>

    <!-- ─── PANEL ─── -->
    <div id="panel">

        <div class="topbar">
            <button class="back-btn" onclick="window.location.href='index.html'">← Geri</button>
            <span class="topbar-title">👨‍🍳 Tatlıcılar Paneli</span>
            <span class="topbar-date" id="todayBadge">—</span>
            <button class="refresh-btn" onclick="loadData()">🔄 Yenile</button>
            <button class="target-edit-mode-btn" id="targetModeBtn" onclick="toggleTargetMode()">🎯 Hedef</button>
            <button id="themeToggleBtn" class="theme-toggle-btn" onclick="toggleTheme()" title="Tema">☀️</button>
        </div>

        <div class="content">

            <!-- Bölüm 1: Toplam Stok -->
            <div class="section-header">
                <span class="section-title">Güncel Stok Durumu</span>
                <div class="section-line"></div>
            </div>
            <div class="stock-summary" id="stockSummary">
                <!-- skeleton -->
                <div class="stock-card">
                    <div class="skel" style="width:36px;height:36px;border-radius:8px;"></div>
                    <div class="skel" style="width:60px;height:10px;margin-top:4px;"></div>
                    <div class="skel" style="width:48px;height:36px;margin-top:4px;border-radius:8px;"></div>
                </div>
                <div class="stock-card">
                    <div class="skel" style="width:36px;height:36px;border-radius:8px;"></div>
                    <div class="skel" style="width:60px;height:10px;margin-top:4px;"></div>
                    <div class="skel" style="width:48px;height:36px;margin-top:4px;border-radius:8px;"></div>
                </div>
                <div class="stock-card">
                    <div class="skel" style="width:36px;height:36px;border-radius:8px;"></div>
                    <div class="skel" style="width:60px;height:10px;margin-top:4px;"></div>
                    <div class="skel" style="width:48px;height:36px;margin-top:4px;border-radius:8px;"></div>
                </div>
            </div>

            <div class="grand-total-bar" id="grandTotalBar">
                <span class="grand-total-label">Genel Toplam</span>
                <span class="grand-total-value" id="grandTotalVal">—</span>
            </div>

            <!-- Bölüm 2: Şube Bazlı -->
            <div class="section-header">
                <span class="section-title">Şube Bazlı Stok</span>
                <div class="section-line"></div>
            </div>
            <div class="branches-grid" id="branchesGrid">
                <!-- skeleton -->
                <div class="branch-card">
                    <div class="branch-card-header">
                        <div class="skel" style="width:28px;height:28px;border-radius:6px;flex-shrink:0;"></div>
                        <div class="skel" style="flex:1;height:16px;"></div>
                        <div class="skel" style="width:32px;height:22px;border-radius:6px;"></div>
                    </div>
                    <div class="branch-dessert-list" style="padding:14px 18px;display:flex;flex-direction:column;gap:10px;">
                        <div class="skel" style="height:14px;border-radius:6px;"></div>
                        <div class="skel" style="height:14px;border-radius:6px;width:80%;"></div>
                        <div class="skel" style="height:14px;border-radius:6px;width:90%;"></div>
                    </div>
                </div>
                <div class="branch-card">
                    <div class="branch-card-header">
                        <div class="skel" style="width:28px;height:28px;border-radius:6px;flex-shrink:0;"></div>
                        <div class="skel" style="flex:1;height:16px;"></div>
                        <div class="skel" style="width:32px;height:22px;border-radius:6px;"></div>
                    </div>
                    <div class="branch-dessert-list" style="padding:14px 18px;display:flex;flex-direction:column;gap:10px;">
                        <div class="skel" style="height:14px;border-radius:6px;"></div>
                        <div class="skel" style="height:14px;border-radius:6px;width:70%;"></div>
                        <div class="skel" style="height:14px;border-radius:6px;width:85%;"></div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="supabase-client.js"></script>
    <script>
        // ─── PIN ───
        let _panelPin = '0000'; // DB yüklenene kadar default
        getSetting('tatlicilarPin').then(val => { if (val) _panelPin = String(val); });

        const pinIds = ['pd1','pd2','pd3','pd4'];

        if (sessionStorage.getItem('tatlicilarAuth') === '1') {
            document.getElementById('pinOverlay').classList.remove('active');
        }

        pinIds.forEach((id, idx) => {
            const el = document.getElementById(id);
            el.addEventListener('input', e => {
                if (e.target.value && idx < 3) document.getElementById(pinIds[idx + 1]).focus();
                if (e.target.value && idx === 3) checkPin();
            });
            el.addEventListener('keydown', e => {
                if (e.key === 'Backspace' && !e.target.value && idx > 0)
                    document.getElementById(pinIds[idx - 1]).focus();
                if (e.key === 'Enter') checkPin();
            });
        });

        setTimeout(() => {
            if (document.getElementById('pinOverlay').classList.contains('active'))
                document.getElementById('pd1').focus();
        }, 150);

        function checkPin() {
            const entered = pinIds.map(id => document.getElementById(id).value).join('');
            if (entered === _panelPin) {
                sessionStorage.setItem('tatlicilarAuth', '1');
                document.getElementById('pinOverlay').classList.remove('active');
                loadData();
            } else {
                document.getElementById('pinError').textContent = 'Hatalı şifre!';
                pinIds.forEach(id => document.getElementById(id).value = '');
                document.getElementById('pd1').focus();
                setTimeout(() => document.getElementById('pinError').textContent = '', 2200);
            }
        }

        // ─── VERİ ───
        const branchEmojis = {
            'Rumeli İskelesi': '🌊',
            'Yahya Kemal':     '📚',
            'TunaBoyu':        '🏞️',
            'Sahil':           '🏖️',
            'Vagon':           '🚂',
            'Millet Bahçesi':  '🌳',
        };

        const today = getTodayDate();
        document.getElementById('todayBadge').textContent = formatDateTurkish(today);

        async function loadData() {
            // Skeleton göster
            document.getElementById('stockSummary').innerHTML = `
                <div class="stock-card">
                    <div class="skel" style="width:36px;height:36px;border-radius:8px;"></div>
                    <div class="skel" style="width:60px;height:10px;margin-top:4px;"></div>
                    <div class="skel" style="width:48px;height:36px;margin-top:4px;border-radius:8px;"></div>
                </div>
                <div class="stock-card">
                    <div class="skel" style="width:36px;height:36px;border-radius:8px;"></div>
                    <div class="skel" style="width:60px;height:10px;margin-top:4px;"></div>
                    <div class="skel" style="width:48px;height:36px;margin-top:4px;border-radius:8px;"></div>
                </div>
                <div class="stock-card">
                    <div class="skel" style="width:36px;height:36px;border-radius:8px;"></div>
                    <div class="skel" style="width:60px;height:10px;margin-top:4px;"></div>
                    <div class="skel" style="width:48px;height:36px;margin-top:4px;border-radius:8px;"></div>
                </div>`;
            document.getElementById('grandTotalVal').textContent = '—';
            document.getElementById('branchesGrid').innerHTML = '';

            const [branches, desserts, allStock, targets] = await Promise.all([
                getBranches(),
                getActiveDesserts(),
                getAllLatestStock(),
                getProductionTargets().catch(() => ({}))
            ]);

            if (!branches || !desserts) {
                document.getElementById('stockSummary').innerHTML =
                    '<div class="loading-state" style="color:#ef4444;">❌ Veri alınamadı.</div>';
                return;
            }

            // ── Bölüm 1: Her tatlının toplam stoku ──
            const summaryEl = document.getElementById('stockSummary');
            summaryEl.innerHTML = '';
            let grandTotal = 0;

            // Hedefleri sakla (hedef güncelleme için)
            window._lastTargets  = targets;
            window._lastDesserts = desserts;

            desserts.forEach(dessert => {
                // Tüm şubelerdeki bu tatlının toplamı
                let total = 0;
                branches.forEach(branch => {
                    total += (allStock[branch.id]?.[dessert.id] ?? 0);
                });
                grandTotal += total;

                const target   = Number(targets[String(dessert.id)] || 0);
                const hasTarget = target > 0;
                const ratio    = hasTarget ? Math.min(total / target, 1) : 0;
                const pct      = Math.round(ratio * 100);
                const fillClass = pct >= 100 ? 'pfill-green' : pct >= 50 ? 'pfill-amber' : 'pfill-red';
                const targetHtml = hasTarget
                    ? `<div class="stock-card-target">Hedef: ${target} adet/gün · %${pct}</div>
                       <div class="stock-card-progress">
                           <div class="stock-card-progress-fill ${fillClass}" style="width:${pct}%"></div>
                       </div>`
                    : `<div class="stock-card-target" style="opacity:0.4">Hedef yok</div>`;

                const editHtml = `
                    <div class="target-edit-row target-edit-section" id="tgt-${dessert.id}" style="display:none">
                        <input class="target-input" type="number" min="0" placeholder="${target || '0'}" value="${target || ''}">
                        <button class="target-save-btn" onclick="saveTarget(${dessert.id}, this)">✓</button>
                    </div>`;

                const card = document.createElement('div');
                card.className = 'stock-card';
                card.innerHTML = `
                    <div class="stock-card-emoji">${dessert.emoji || '🍰'}</div>
                    <div class="stock-card-name">${dessert.name}</div>
                    <div class="stock-card-value ${total === 0 ? 'zero' : ''}">${total}</div>
                    ${targetHtml}
                    ${editHtml}
                `;
                summaryEl.appendChild(card);
            });

            document.getElementById('grandTotalVal').textContent = grandTotal;

            // ── Bölüm 2: Şube bazlı ──
            const branchesEl = document.getElementById('branchesGrid');
            branchesEl.innerHTML = '';

            branches.forEach(branch => {
                const branchStock = allStock[branch.id] || {};
                let branchTotal = 0;
                desserts.forEach(d => { branchTotal += branchStock[d.id] ?? 0; });

                const card = document.createElement('div');
                card.className = 'branch-card';

                const emoji = branchEmojis[branch.name] || '🏪';

                let rowsHtml = '';
                desserts.forEach(dessert => {
                    const val = branchStock[dessert.id] ?? 0;
                    rowsHtml += `
                        <div class="branch-dessert-row">
                            <span class="branch-dessert-emoji">${dessert.emoji || '🍰'}</span>
                            <span class="branch-dessert-name">${dessert.name}</span>
                            <span class="branch-dessert-value ${val === 0 ? 'zero' : ''}">${val === 0 ? '—' : val}</span>
                        </div>`;
                });

                const isMobile = window.innerWidth <= 600;
                if (!isMobile) card.classList.add('open');

                card.innerHTML = `
                    <div class="branch-card-header" onclick="toggleBranchCard(this.closest('.branch-card'))">
                        <span class="branch-card-emoji">${emoji}</span>
                        <span class="branch-card-name">${branch.name}</span>
                        <span class="branch-card-total">${branchTotal}</span>
                        <span class="branch-chevron">▾</span>
                    </div>
                    <div class="branch-dessert-list">
                        <div class="branch-dessert-inner">${rowsHtml}</div>
                    </div>
                `;
                branchesEl.appendChild(card);
            });
        }

        function toggleBranchCard(card) {
            card.classList.toggle('open');
        }

        // ── Üretim Hedefi ─────────────────────────────
        let targetEditMode = false;

        function toggleTargetMode() {
            targetEditMode = !targetEditMode;
            document.querySelectorAll('.target-edit-section').forEach(el => {
                el.style.display = targetEditMode ? 'flex' : 'none';
            });
            const btn = document.getElementById('targetModeBtn');
            btn.style.background   = targetEditMode ? 'rgba(245,158,11,0.25)' : 'rgba(245,158,11,0.1)';
            btn.style.borderColor  = targetEditMode ? 'rgba(245,158,11,0.5)'  : 'rgba(245,158,11,0.2)';
            btn.textContent = targetEditMode ? '✓ Tamam' : '🎯 Hedef';
        }

        async function saveTarget(dessertId, btn) {
            const row   = document.getElementById(`tgt-${dessertId}`);
            const input = row?.querySelector('input');
            if (!input) return;
            const val = parseInt(input.value);
            if (isNaN(val) || val < 0) { showToast('Geçersiz değer', 'error'); return; }
            try {
                await setProductionTarget(dessertId, val);
                showToast('Hedef kaydedildi ✓', 'success');
                loadData();
            } catch (err) {
                showToast('Kayıt hatası: ' + (err.message || ''), 'error');
            }
        }

        // Giriş yapılmışsa yükle
        if (sessionStorage.getItem('tatlicilarAuth') === '1') loadData();

        // 60 saniyede bir yenile
        setInterval(() => {
            if (sessionStorage.getItem('tatlicilarAuth') === '1') loadData();
        }, 60000);
    </script>
    <script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js");</script>
</body>
</html>
