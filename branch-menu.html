<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Müdür Paneli</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: #060c18;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 18px;
            overflow: hidden;
            position: relative;
        }

        /* ── Ambient arka plan ışıkları ── */
        body::before {
            content: '';
            position: fixed;
            top: -20%;
            left: -10%;
            width: 60%;
            height: 60%;
            background: radial-gradient(ellipse, rgba(245,158,11,0.12) 0%, transparent 70%);
            pointer-events: none;
            animation: floatA 8s ease-in-out infinite alternate;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -10%;
            right: -15%;
            width: 55%;
            height: 55%;
            background: radial-gradient(ellipse, rgba(59,130,246,0.1) 0%, transparent 70%);
            pointer-events: none;
            animation: floatB 10s ease-in-out infinite alternate;
        }

        @keyframes floatA {
            0%   { transform: translate(0,   0)   scale(1);    }
            100% { transform: translate(5%,  8%)  scale(1.1);  }
        }
        @keyframes floatB {
            0%   { transform: translate(0,   0)   scale(1);    }
            100% { transform: translate(-5%, -8%) scale(1.08); }
        }

        /* ── İkinci yeşil ambient ── */
        .glow-green {
            position: fixed;
            bottom: 30%;
            left: -5%;
            width: 40%;
            height: 40%;
            background: radial-gradient(ellipse, rgba(16,185,129,0.08) 0%, transparent 70%);
            pointer-events: none;
            animation: floatA 12s ease-in-out infinite alternate-reverse;
        }

        /* ── Kapsayıcı ── */
        .container {
            max-width: 420px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        /* ── Header kartı ── */
        .header-card {
            background: linear-gradient(145deg, rgba(245,158,11,0.12), rgba(245,158,11,0.04));
            border: 1px solid rgba(245,158,11,0.22);
            border-radius: 28px;
            padding: 32px 24px 28px;
            text-align: center;
            margin-bottom: 24px;
            animation: slideDown 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
            backdrop-filter: blur(12px);
        }

        .branch-emoji-wrap {
            position: relative;
            display: inline-block;
            margin-bottom: 16px;
        }

        .branch-emoji {
            font-size: 64px;
            line-height: 1;
            display: block;
            filter: drop-shadow(0 6px 20px rgba(245,158,11,0.5));
            animation: floatEmoji 3s ease-in-out infinite;
        }

        @keyframes floatEmoji {
            0%, 100% { transform: translateY(0);    }
            50%       { transform: translateY(-6px); }
        }

        .emoji-ring {
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            border: 1.5px solid rgba(245,158,11,0.2);
            animation: ringPulse 2.5s ease-in-out infinite;
        }

        @keyframes ringPulse {
            0%, 100% { transform: scale(1);    opacity: 0.5; }
            50%       { transform: scale(1.12); opacity: 0;   }
        }

        .branch-name {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #fbbf24, #f59e0b, #d97706);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }

        .panel-label {
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        .date-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 18px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255,255,255,0.55);
        }

        /* ── Menü butonları ── */
        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 14px;
        }

        .menu-btn {
            width: 100%;
            padding: 0;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0;
            transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s;
            touch-action: manipulation;
            position: relative;
            overflow: hidden;
            text-decoration: none;
            animation: slideUp 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
        }

        .menu-btn:nth-child(1) { animation-delay: 0.08s; }
        .menu-btn:nth-child(2) { animation-delay: 0.15s; }
        .menu-btn:nth-child(3) { animation-delay: 0.22s; }

        /* Parlama efekti */
        .menu-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
            transform: skewX(-20deg);
            transition: left 0.5s ease;
        }

        .menu-btn:hover::before { left: 160%; }

        .menu-btn:hover {
            transform: translateY(-3px) scale(1.01);
        }

        .menu-btn:active {
            transform: translateY(0) scale(0.98);
            transition-duration: 0.1s;
        }

        /* İkon bloğu */
        .btn-icon-wrap {
            width: 72px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            flex-shrink: 0;
            border-radius: 18px 0 0 18px;
        }

        /* Metin bloğu */
        .btn-body {
            flex: 1;
            padding: 18px 20px;
            text-align: left;
        }

        .btn-title {
            font-size: 17px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.01em;
            margin-bottom: 3px;
        }

        .btn-desc {
            font-size: 12px;
            font-weight: 500;
            opacity: 0.65;
            color: #fff;
        }

        /* Ok ikon */
        .btn-arrow {
            padding: 0 18px 0 4px;
            font-size: 18px;
            opacity: 0.45;
            color: #fff;
            transition: transform 0.2s;
        }

        .menu-btn:hover .btn-arrow {
            transform: translateX(4px);
            opacity: 0.7;
        }

        /* ── Gelen (amber) ── */
        .btn-gelen {
            background: linear-gradient(135deg, #d97706, #b45309);
            box-shadow: 0 8px 28px rgba(217,119,6,0.35);
        }

        .btn-gelen:hover {
            box-shadow: 0 14px 36px rgba(217,119,6,0.48);
        }

        .btn-gelen .btn-icon-wrap {
            background: rgba(0,0,0,0.15);
        }

        /* ── Kalan (mavi) ── */
        .btn-kalan {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            box-shadow: 0 8px 28px rgba(37,99,235,0.35);
        }

        .btn-kalan:hover {
            box-shadow: 0 14px 36px rgba(37,99,235,0.48);
        }

        .btn-kalan .btn-icon-wrap {
            background: rgba(0,0,0,0.15);
        }

        /* ── Şubem (yeşil) ── */
        .btn-subem {
            background: linear-gradient(135deg, #059669, #047857);
            box-shadow: 0 8px 28px rgba(5,150,105,0.35);
        }

        .btn-subem:hover {
            box-shadow: 0 14px 36px rgba(5,150,105,0.48);
        }

        .btn-subem .btn-icon-wrap {
            background: rgba(0,0,0,0.15);
        }

        /* ── Çıkış ── */
        .logout-btn {
            width: 100%;
            padding: 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            color: rgba(255,255,255,0.35);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
            letter-spacing: 0.02em;
            animation: slideUp 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
        }

        .logout-btn:hover {
            background: rgba(239,68,68,0.1);
            border-color: rgba(239,68,68,0.25);
            color: #f87171;
        }

        /* ── Animasyonlar ── */
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        #toastContainer {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="glow-green"></div>

    <div class="container">
        <!-- Şube Header -->
        <div class="header-card">
            <div class="branch-emoji-wrap">
                <span class="branch-emoji" id="branchEmoji">🏪</span>
                <span class="emoji-ring"></span>
            </div>
            <h1 class="branch-name" id="branchNameText">Şube</h1>
            <p class="panel-label">Müdür Paneli</p>
            <span class="date-badge" id="todayDate">📅 —</span>
        </div>

        <!-- Menü Butonları -->
        <div class="menu-buttons">

            <button class="menu-btn btn-gelen" onclick="window.location.href='gelen-tatlilar.html'">
                <div class="btn-icon-wrap">📦</div>
                <div class="btn-body">
                    <div class="btn-title">Gelen Tatlılar</div>
                    <div class="btn-desc">Bugün gelen ürünleri kaydet</div>
                </div>
                <span class="btn-arrow">›</span>
            </button>

            <button class="menu-btn btn-kalan" onclick="window.location.href='kalan-tatlilar.html'">
                <div class="btn-icon-wrap">📊</div>
                <div class="btn-body">
                    <div class="btn-title">Kalan Tatlılar</div>
                    <div class="btn-desc">Günün sonunda kalan ürünleri gir</div>
                </div>
                <span class="btn-arrow">›</span>
            </button>

            <button class="menu-btn btn-subem" onclick="window.location.href='subem.html'">
                <div class="btn-icon-wrap">🏪</div>
                <div class="btn-body">
                    <div class="btn-title">Şubem</div>
                    <div class="btn-desc">Günlük özet ve istatistikler</div>
                </div>
                <span class="btn-arrow">›</span>
            </button>

        </div>

        <button class="logout-btn" onclick="logout()">🚪 Çıkış Yap</button>
    </div>

    <div id="toastContainer"></div>

    <script src="supabase-client.js"></script>
    <script>
        const branchId   = localStorage.getItem('branchId');
        const branchName = localStorage.getItem('branchName');

        if (!branchId) window.location.href = 'index.html';

        const emojis = {
            'Rumeli İskelesi': '🌊',
            'Yahya Kemal':     '📚',
            'TunaBoyu':        '🏞️',
            'Sahil':           '🏖️',
            'Vagon':           '🚂',
            'Millet Bahçesi':  '🌳',
        };

        document.getElementById('branchNameText').textContent = branchName;
        document.getElementById('branchEmoji').textContent    = emojis[branchName] || '🏪';
        document.getElementById('todayDate').textContent      = '📅 ' + formatDateTurkish(getTodayDate());

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
