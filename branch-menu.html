<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="theme-color" content="#f59e0b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tatlı Takip">
    <title>Müdür Paneli</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --gold:   #f59e0b;
            --gold-2: #fbbf24;
            --bg:     #070d1a;
            --glass:  rgba(255,255,255,0.035);
            --border: rgba(255,255,255,0.07);
            --text:   #f0f4ff;
            --muted:  rgba(255,255,255,0.35);
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        /* ── Statik arka plan dokusu ── */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Ambient gradient ışıklar ── */
        .bg-glow {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0;
            animation: orbReveal 1.4s ease forwards;
        }

        .glow-orb-1 {
            width: 500px; height: 500px;
            top: -15%; left: -10%;
            background: radial-gradient(circle, rgba(245,158,11,0.18) 0%, transparent 70%);
            animation-delay: 0.3s;
            animation: orbReveal 1.6s ease 0.3s forwards, drift1 14s ease-in-out 2s infinite alternate;
        }

        .glow-orb-2 {
            width: 420px; height: 420px;
            bottom: -10%; right: -10%;
            background: radial-gradient(circle, rgba(96,165,250,0.12) 0%, transparent 70%);
            animation: orbReveal 1.6s ease 0.5s forwards, drift2 18s ease-in-out 2s infinite alternate;
        }

        @keyframes orbReveal {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        @keyframes drift1 {
            0%   { transform: translate(0px,   0px);  }
            100% { transform: translate(40px,  30px); }
        }

        @keyframes drift2 {
            0%   { transform: translate(0px,   0px);  }
            100% { transform: translate(-30px, -40px); }
        }

        /* ── İçerik ── */
        .page {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* ── Top bar ── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
        }

        .topbar-brand {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .topbar-clock {
            font-size: 14px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.06em;
            color: rgba(255,255,255,0.45);
        }

        .logout-btn {
            padding: 6px 14px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.04em;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            border-color: rgba(239,68,68,0.4);
            color: #f87171;
            background: rgba(239,68,68,0.07);
        }

        /* ── Hero bölümü ── */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px 24px;
            text-align: center;
        }

        .branch-avatar {
            position: relative;
            width: 96px;
            height: 96px;
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
        }

        .avatar-bg {
            width: 96px;
            height: 96px;
            border-radius: 28px;
            background: linear-gradient(145deg, rgba(245,158,11,0.15), rgba(245,158,11,0.05));
            border: 1px solid rgba(245,158,11,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            position: relative;
            overflow: hidden;
        }

        /* Köşe ışıması */
        .avatar-bg::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px;
            width: 50%; height: 50%;
            background: linear-gradient(135deg, rgba(245,158,11,0.3), transparent);
            border-radius: 28px 0 0 0;
        }

        .avatar-ring {
            position: absolute;
            inset: -8px;
            border-radius: 36px;
            border: 1px solid rgba(245,158,11,0.12);
            animation: ringExpand 2.4s ease-in-out infinite;
        }

        .avatar-ring-2 {
            position: absolute;
            inset: -16px;
            border-radius: 44px;
            border: 1px solid rgba(245,158,11,0.06);
            animation: ringExpand 2.4s ease-in-out 0.8s infinite;
        }

        @keyframes ringExpand {
            0%   { opacity: 0.8; transform: scale(1);    }
            100% { opacity: 0;   transform: scale(1.12); }
        }

        /* Karşılama satırı */
        .welcome-line {
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 6px;
            opacity: 0;
            animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.3s forwards;
        }

        /* Müdür adı — en büyük ve kişisel */
        .manager-name {
            font-size: 30px;
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1.1;
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 50%, #fcd34d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
            opacity: 0;
            animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.38s forwards;
        }

        /* Şube adı — ikincil */
        .branch-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: 0.02em;
            margin-bottom: 12px;
            opacity: 0;
            animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.45s forwards;
        }

        .branch-date {
            font-size: 13px;
            font-weight: 500;
            color: var(--muted);
            letter-spacing: 0.04em;
            opacity: 0;
            animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.52s forwards;
        }

        /* ── Separator ── */
        .separator {
            width: 40px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(245,158,11,0.4), transparent);
            margin: 20px auto;
            opacity: 0;
            animation: fadeUp 0.7s ease 0.5s forwards;
        }

        /* ── Aksiyon kartları ── */
        .actions {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 0 24px 32px;
            margin: 0 auto;
        }

        .action-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px 20px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px;
            cursor: pointer;
            transition:
                background 0.25s,
                border-color 0.25s,
                transform 0.2s cubic-bezier(0.16,1,0.3,1),
                box-shadow 0.25s;
            position: relative;
            overflow: hidden;
            text-align: left;
            width: 100%;
            color: inherit;
            opacity: 0;
            touch-action: manipulation;
        }

        .action-card:nth-child(1) { animation: slideIn 0.65s cubic-bezier(0.16,1,0.3,1) 0.55s forwards; }
        .action-card:nth-child(2) { animation: slideIn 0.65s cubic-bezier(0.16,1,0.3,1) 0.68s forwards; }
        .action-card:nth-child(3) { animation: slideIn 0.65s cubic-bezier(0.16,1,0.3,1) 0.81s forwards; }

        /* Sol renk çizgisi */
        .action-card::before {
            content: '';
            position: absolute;
            left: 0; top: 20%; bottom: 20%;
            width: 3px;
            border-radius: 0 2px 2px 0;
            transition: top 0.25s, bottom 0.25s;
        }

        .action-card:hover::before {
            top: 10%; bottom: 10%;
        }

        .card-amber::before  { background: var(--gold); }
        .card-blue::before   { background: #60a5fa; }
        .card-green::before  { background: #34d399; }

        /* Hover arka plan parlaması */
        .action-card::after {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.25s;
            border-radius: 16px;
        }

        .card-amber::after { background: linear-gradient(120deg, rgba(245,158,11,0.07), transparent 60%); }
        .card-blue::after  { background: linear-gradient(120deg, rgba(96,165,250,0.07), transparent 60%); }
        .card-green::after { background: linear-gradient(120deg, rgba(52,211,153,0.07), transparent 60%); }

        .action-card:hover {
            border-color: rgba(255,255,255,0.13);
            transform: translateX(4px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.06);
        }

        .card-amber:hover { box-shadow: 0 8px 32px rgba(245,158,11,0.12), inset 0 1px 0 rgba(255,255,255,0.06); }
        .card-blue:hover  { box-shadow: 0 8px 32px rgba(96,165,250,0.12), inset 0 1px 0 rgba(255,255,255,0.06); }
        .card-green:hover { box-shadow: 0 8px 32px rgba(52,211,153,0.12), inset 0 1px 0 rgba(255,255,255,0.06); }

        .action-card:hover::after { opacity: 1; }

        .action-card:active {
            transform: translateX(2px) scale(0.99);
            transition-duration: 0.1s;
        }

        /* Kart ikon */
        .card-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .card-amber .card-icon { background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.15); }
        .card-blue  .card-icon { background: rgba(96,165,250,0.12);  border: 1px solid rgba(96,165,250,0.15);  }
        .card-green .card-icon { background: rgba(52,211,153,0.12);  border: 1px solid rgba(52,211,153,0.15);  }

        /* Kart içerik */
        .card-body {
            flex: 1;
            position: relative;
            z-index: 1;
        }

        .card-title {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: -0.01em;
            color: var(--text);
            margin-bottom: 2px;
        }

        .card-desc {
            font-size: 12px;
            color: var(--muted);
            font-weight: 500;
        }

        /* Ok */
        .card-arrow {
            font-size: 20px;
            font-weight: 300;
            color: var(--muted);
            position: relative;
            z-index: 1;
            transition: transform 0.25s cubic-bezier(0.16,1,0.3,1), color 0.25s;
            line-height: 1;
        }

        .action-card:hover .card-arrow {
            transform: translateX(5px);
            color: rgba(255,255,255,0.65);
        }

        /* ── Animasyonlar ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); filter: blur(6px); }
            to   { opacity: 1; transform: translateY(0);    filter: blur(0);   }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-16px); filter: blur(4px); }
            to   { opacity: 1; transform: translateX(0);     filter: blur(0);   }
        }

        /* ── Toast ── */
        #toastContainer {
            position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%);
            z-index: 9999; pointer-events: none;
        }

        @media (max-width: 400px) {
            .branch-name { font-size: 26px; }
            .topbar { padding: 14px 16px; }
            .actions { padding: 0 16px 28px; }
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>
    <div class="bg-glow">
        <div class="glow-orb glow-orb-1"></div>
        <div class="glow-orb glow-orb-2"></div>
    </div>

    <div class="page">
        <!-- Top Bar -->
        <nav class="topbar">
            <span class="topbar-brand">Mutlukent Tatlı</span>
            <div class="topbar-right">
                <span class="topbar-clock" id="clock">--:--</span>
                <button class="logout-btn" onclick="logout()">Çıkış</button>
            </div>
        </nav>

        <!-- Hero -->
        <div class="hero">
            <div class="branch-avatar">
                <div class="avatar-bg">
                    <span id="branchEmoji">🏪</span>
                    <span class="avatar-ring"></span>
                    <span class="avatar-ring-2"></span>
                </div>
            </div>
            <p class="welcome-line">Hoş geldin 👋</p>
            <h1 class="manager-name" id="managerNameText">—</h1>
            <p class="branch-name" id="branchNameText">— Müdürü</p>
            <p class="branch-date" id="todayDate">—</p>
            <div class="separator"></div>
        </div>

        <!-- Aksiyon Kartları -->
        <div class="actions">

            <button class="action-card card-amber" onclick="window.location.href='gelen-tatlilar.html'">
                <div class="card-icon">📦</div>
                <div class="card-body">
                    <div class="card-title">Gelen Tatlılar</div>
                    <div class="card-desc">Bugün gelen ürünleri kaydet</div>
                </div>
                <span class="card-arrow">›</span>
            </button>

            <button class="action-card card-blue" onclick="window.location.href='kalan-tatlilar.html'">
                <div class="card-icon">📊</div>
                <div class="card-body">
                    <div class="card-title">Kalan Tatlılar</div>
                    <div class="card-desc">Günün sonunda kalan ürünleri gir</div>
                </div>
                <span class="card-arrow">›</span>
            </button>

            <button class="action-card card-green" onclick="window.location.href='subem.html'">
                <div class="card-icon">🏪</div>
                <div class="card-body">
                    <div class="card-title">Şubem</div>
                    <div class="card-desc">Günlük özet ve istatistikler</div>
                </div>
                <span class="card-arrow">›</span>
            </button>

        </div>
    </div>

    <div id="toastContainer"></div>

    <script src="supabase-client.js"></script>
    <script>
        const branchId    = localStorage.getItem('branchId');
        const branchName  = localStorage.getItem('branchName');
        const managerName = localStorage.getItem('managerName');
        if (!branchId) window.location.href = 'index.html';

        const emojis = {
            'Rumeli İskelesi': '🌊',
            'Yahya Kemal':     '📚',
            'TunaBoyu':        '🏞️',
            'Sahil':           '🏖️',
            'Vagon':           '🚂',
            'Millet Bahçesi':  '🌳',
        };

        document.getElementById('managerNameText').textContent = managerName || branchName;
        document.getElementById('branchNameText').textContent  = branchName + ' Müdürü';
        document.getElementById('branchEmoji').textContent     = emojis[branchName] || '🏪';
        document.getElementById('todayDate').textContent       = '📅 ' + formatDateTurkish(getTodayDate());

        // Saat
        function tick() {
            document.getElementById('clock').textContent =
                new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
        }
        tick();
        setInterval(tick, 1000);

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
