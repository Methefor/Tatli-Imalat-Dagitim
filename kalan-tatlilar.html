<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="theme-color" content="#f59e0b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tatlı Takip">
    <title>Kalan Tatlılar</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --accent:  #3b82f6;
            --acc-dim: rgba(59,130,246,0.12);
            --acc-brd: rgba(59,130,246,0.22);
            --danger:  #ef4444;
            --bg:      #070d1a;
            --glass:   rgba(255,255,255,0.035);
            --border:  rgba(255,255,255,0.07);
            --text:    #f0f4ff;
            --muted:   rgba(255,255,255,0.35);
        }

        html { height: 100%; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex;
            flex-direction: column; overflow-x: hidden;
        }

        /* ── Arka plan ── */
        .bg-grid {
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none; z-index: 0;
        }

        .bg-orb-1 {
            position: fixed; top: -15%; right: -10%;
            width: 480px; height: 480px;
            background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, transparent 70%);
            border-radius: 50%; filter: blur(80px);
            pointer-events: none; z-index: 0;
            animation: drift1 18s ease-in-out infinite alternate;
        }

        .bg-orb-2 {
            position: fixed; bottom: -10%; left: -15%;
            width: 420px; height: 420px;
            background: radial-gradient(circle, rgba(245,158,11,0.08) 0%, transparent 70%);
            border-radius: 50%; filter: blur(80px);
            pointer-events: none; z-index: 0;
            animation: drift2 22s ease-in-out infinite alternate;
        }

        @keyframes drift1 { 0% { transform: translate(0,0); } 100% { transform: translate(-30px,35px); } }
        @keyframes drift2 { 0% { transform: translate(0,0); } 100% { transform: translate(25px,-30px); } }

        /* ── Topbar ── */
        .topbar {
            position: sticky; top: 0; z-index: 50;
            display: flex; align-items: center; gap: 14px;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(16px);
            background: rgba(7,13,26,0.8);
            animation: fadeDown 0.4s ease both;
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .back-btn {
            display: flex; align-items: center; gap: 6px;
            padding: 8px 14px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 10px; color: var(--muted);
            font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
            touch-action: manipulation;
            white-space: nowrap; flex-shrink: 0;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.07);
            color: var(--text); border-color: rgba(255,255,255,0.12);
        }

        .topbar-info { flex: 1; min-width: 0; }

        .topbar-title {
            font-size: 16px; font-weight: 700; letter-spacing: -0.02em;
        }

        .topbar-sub {
            font-size: 11px; color: var(--muted); font-weight: 500; margin-top: 1px;
        }

        .topbar-badge {
            display: flex; align-items: center; gap: 5px;
            padding: 5px 12px;
            background: var(--acc-dim);
            border: 1px solid var(--acc-brd);
            border-radius: 20px;
            font-size: 11px; font-weight: 700; color: var(--accent);
            letter-spacing: 0.04em; white-space: nowrap; flex-shrink: 0;
        }

        /* ── İçerik ── */
        .content {
            flex: 1; position: relative; z-index: 1;
            padding: 20px 18px 140px;
            max-width: 560px; width: 100%; margin: 0 auto;
        }

        /* ── Tarih Navigatörü ── */
        .date-nav {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 14px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px; margin-bottom: 14px;
            opacity: 0; animation: fadeUp 0.5s ease 0.06s both;
        }

        .date-nav-btn {
            flex-shrink: 0;
            width: 38px; height: 38px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 10px; color: var(--text);
            font-size: 20px; font-weight: 700;
            cursor: pointer; transition: all 0.18s;
            touch-action: manipulation; line-height: 1;
        }

        .date-nav-btn:hover:not(:disabled) {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.15);
        }

        .date-nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }

        .date-nav-center {
            flex: 1; position: relative; text-align: center; cursor: pointer;
        }

        .date-display {
            font-size: 14px; font-weight: 700; letter-spacing: -0.01em;
        }

        .date-display-sub {
            font-size: 10px; color: var(--muted);
            font-weight: 500; letter-spacing: 0.05em; margin-top: 2px;
        }

        .date-picker-overlay {
            position: absolute; inset: 0;
            opacity: 0; cursor: pointer;
            width: 100%; height: 100%;
            border: none; background: transparent; font-size: 0;
        }

        /* ── Tatlı listesi ── */
        .dessert-list {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px; overflow: hidden; margin-bottom: 16px;
        }

        .dessert-row {
            display: flex; align-items: center; gap: 14px;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.045);
            opacity: 0;
            animation: rowIn 0.5s cubic-bezier(0.16,1,0.3,1) both;
        }

        .dessert-row:last-child { border-bottom: none; }

        @keyframes rowIn {
            from { opacity: 0; transform: translateX(-12px); filter: blur(4px); }
            to   { opacity: 1; transform: translateX(0);     filter: blur(0);   }
        }

        .dessert-emoji {
            font-size: 26px; flex-shrink: 0;
            width: 44px; height: 44px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
        }

        .dessert-meta { flex: 1; min-width: 0; }

        .dessert-name {
            font-size: 15px; font-weight: 600; letter-spacing: -0.01em;
        }

        .gelen-badge {
            display: inline-flex; align-items: center; gap: 3px;
            margin-top: 4px; padding: 2px 8px;
            background: rgba(245,158,11,0.1);
            border: 1px solid rgba(245,158,11,0.18);
            border-radius: 20px;
            font-size: 11px; font-weight: 700; color: #f59e0b;
        }

        .onceki-badge {
            display: inline-flex; align-items: center; gap: 3px;
            margin-top: 4px; padding: 2px 8px;
            background: rgba(99,102,241,0.1);
            border: 1px solid rgba(99,102,241,0.2);
            border-radius: 20px;
            font-size: 11px; font-weight: 700; color: #818cf8;
        }

        .num-input {
            width: 80px; height: 48px;
            background: var(--acc-dim);
            border: 1.5px solid var(--acc-brd);
            border-radius: 12px; color: var(--text);
            font-size: 20px; font-weight: 700;
            text-align: center; outline: none;
            transition: all 0.2s; flex-shrink: 0;
            font-variant-numeric: tabular-nums;
            -webkit-appearance: none; -moz-appearance: textfield;
        }

        .num-input::-webkit-inner-spin-button,
        .num-input::-webkit-outer-spin-button { -webkit-appearance: none; }

        .num-input:focus {
            background: rgba(59,130,246,0.2);
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(59,130,246,0.1), 0 0 24px rgba(59,130,246,0.15);
            transform: scale(1.04);
        }

        /* ── Toplam ── */
        .total-card {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 22px;
            background: linear-gradient(135deg, rgba(59,130,246,0.1), rgba(59,130,246,0.04));
            border: 1px solid var(--acc-brd);
            border-radius: 16px; margin-bottom: 14px;
            opacity: 0; animation: fadeUp 0.6s ease 0.55s both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); filter: blur(4px); }
            to   { opacity: 1; transform: translateY(0);    filter: blur(0);   }
        }

        .total-label {
            font-size: 12px; font-weight: 700; color: var(--accent);
            letter-spacing: 0.1em; text-transform: uppercase;
        }

        .total-value {
            font-size: 40px; font-weight: 800; color: var(--accent);
            letter-spacing: -0.04em; font-variant-numeric: tabular-nums;
            transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
        }

        .total-value.bump { transform: scale(1.12); }

        /* ── Kaydet (sabit alt) ── */
        .save-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 16px 18px calc(16px + env(safe-area-inset-bottom));
            background: linear-gradient(to top, rgba(7,13,26,0.98) 70%, transparent);
            z-index: 40;
        }

        .save-btn {
            width: 100%; max-width: 560px; display: block; margin: 0 auto;
            padding: 17px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none; border-radius: 16px; color: #fff;
            font-size: 16px; font-weight: 800; cursor: pointer;
            letter-spacing: 0.01em;
            box-shadow: 0 8px 28px rgba(59,130,246,0.35);
            transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
            touch-action: manipulation;
            opacity: 0; animation: fadeUp 0.6s ease 0.7s forwards;
        }

        .save-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 36px rgba(59,130,246,0.48); }
        .save-btn:active { transform: scale(0.98); transition-duration: 0.1s; }

        .skel {
            background: rgba(255,255,255,0.06); border-radius: 8px;
            animation: shimmer 1.5s ease-in-out infinite;
        }

        @keyframes shimmer { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.9; } }

        #loadingOverlay {
            display: none; position: fixed; inset: 0;
            background: rgba(7,13,26,0.75); z-index: 9999;
            align-items: center; justify-content: center;
            backdrop-filter: blur(6px);
        }

        #loadingOverlay.active { display: flex; }

        .spinner {
            width: 42px; height: 42px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent);
            border-radius: 50%; animation: spin 0.75s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #toastContainer {
            position: fixed; bottom: 90px; left: 50%;
            transform: translateX(-50%);
            z-index: 10000; pointer-events: none;
        }

        @media (max-width: 400px) {
            .dessert-row { padding: 13px 14px; gap: 10px; }
            .dessert-emoji { width: 38px; height: 38px; font-size: 22px; }
            .dessert-name { font-size: 14px; }
            .num-input { width: 70px; height: 44px; font-size: 18px; }
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>
    <div class="bg-orb-1"></div>
    <div class="bg-orb-2"></div>

    <nav class="topbar">
        <button class="back-btn" onclick="window.location.href='branch-menu.html'">‹ Geri</button>
        <div class="topbar-info">
            <div class="topbar-title">Kalan Tatlılar</div>
            <div class="topbar-sub" id="branchLabel">Yükleniyor…</div>
        </div>
        <div class="topbar-badge">📊 KALAN</div>
    </nav>

    <div class="content">

        <!-- Tarih Navigatörü -->
        <div class="date-nav">
            <button class="date-nav-btn" id="prevDayBtn" onclick="changeDate(-1)">‹</button>
            <div class="date-nav-center">
                <div class="date-display" id="dateDisplay">—</div>
                <div class="date-display-sub">📅 Tarih seçmek için dokun</div>
                <input type="date" class="date-picker-overlay" id="datePicker"
                       onchange="onDatePick(this.value)">
            </div>
            <button class="date-nav-btn" id="nextDayBtn" onclick="changeDate(1)">›</button>
        </div>

        <div class="dessert-list" id="dessertList">
            <div class="dessert-row" style="opacity:1;animation:none;">
                <div class="skel" style="width:44px;height:44px;border-radius:12px;flex-shrink:0;"></div>
                <div class="skel" style="flex:1;height:18px;"></div>
                <div class="skel" style="width:80px;height:48px;border-radius:12px;flex-shrink:0;"></div>
            </div>
            <div class="dessert-row" style="opacity:1;animation:none;">
                <div class="skel" style="width:44px;height:44px;border-radius:12px;flex-shrink:0;"></div>
                <div class="skel" style="flex:1;height:18px;"></div>
                <div class="skel" style="width:80px;height:48px;border-radius:12px;flex-shrink:0;"></div>
            </div>
            <div class="dessert-row" style="opacity:1;animation:none;">
                <div class="skel" style="width:44px;height:44px;border-radius:12px;flex-shrink:0;"></div>
                <div class="skel" style="flex:1;height:18px;"></div>
                <div class="skel" style="width:80px;height:48px;border-radius:12px;flex-shrink:0;"></div>
            </div>
        </div>

        <div class="total-card">
            <span class="total-label">Toplam Kalan</span>
            <span class="total-value" id="totalValue">0</span>
        </div>
    </div>

    <div class="save-bar">
        <button class="save-btn" onclick="saveKalanData()">Kaydet</button>
    </div>

    <div id="loadingOverlay"><div class="spinner"></div></div>
    <div id="toastContainer"></div>

    <script src="supabase-client.js"></script>
    <script>
        const branchId   = localStorage.getItem('branchId');
        const branchName = localStorage.getItem('branchName');
        let   selectedDate = getTodayDate();

        if (!branchId) window.location.href = 'index.html';

        document.getElementById('branchLabel').textContent = branchName;

        function toDateStr(d) {
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        }

        function updateDateUI() {
            const today = getTodayDate();
            document.getElementById('dateDisplay').textContent = formatDateTurkish(selectedDate);
            document.getElementById('datePicker').value = selectedDate;
            document.getElementById('datePicker').max   = today;
            document.getElementById('nextDayBtn').disabled = (selectedDate >= today);
        }

        function changeDate(delta) {
            const d = new Date(selectedDate + 'T12:00:00');
            d.setDate(d.getDate() + delta);
            const next  = toDateStr(d);
            const today = getTodayDate();
            if (next > today) return;
            selectedDate = next;
            updateDateUI();
            loadDesserts();
        }

        function onDatePick(val) {
            if (!val) return;
            const today = getTodayDate();
            selectedDate = val > today ? today : val;
            updateDateUI();
            loadDesserts();
        }

        function updateTotal() {
            let total = 0;
            document.querySelectorAll('.num-input').forEach(inp => {
                total += parseInt(inp.value) || 0;
            });
            const el = document.getElementById('totalValue');
            el.textContent = total;
            el.classList.add('bump');
            setTimeout(() => el.classList.remove('bump'), 200);
        }

        async function loadDesserts() {
            const [activeDesserts, existing, latestStock] = await Promise.all([
                getActiveDesserts(),
                getDailyEntriesByBranch(branchId, selectedDate),
                getBranchLatestStock(branchId)
            ]);

            const list = document.getElementById('dessertList');
            list.innerHTML = '';

            if (!activeDesserts || activeDesserts.length === 0) {
                list.innerHTML = '<div style="padding:40px;text-align:center;color:rgba(255,255,255,0.3);font-size:14px;">Tatlı bulunamadı.</div>';
                return;
            }

            activeDesserts.forEach((dessert, i) => {
                const entry        = (existing || []).find(e => e.dessert_id === dessert.id);
                const gelenAmt     = entry?.received_amount ?? 0;
                const hasEntryToday = !!entry;

                // Bugün kalan girilmişse onu, yoksa önceki günden kalan stoğu kullan
                const kalanAmt = entry?.remaining_amount != null
                    ? entry.remaining_amount
                    : (latestStock[dessert.id] ?? 0);

                let badge = '';
                if (gelenAmt > 0) {
                    badge = `<div class="gelen-badge">📦 Gelen: ${gelenAmt}</div>`;
                } else if (kalanAmt > 0) {
                    badge = `<div class="onceki-badge">📋 Önceki Kalan: ${kalanAmt}</div>`;
                }

                const row = document.createElement('div');
                row.className = 'dessert-row';
                row.style.animationDelay = `${0.08 + i * 0.06}s`;
                row.innerHTML = `
                    <div class="dessert-emoji">${dessert.emoji || '🍰'}</div>
                    <div class="dessert-meta">
                        <div class="dessert-name">${dessert.name}</div>
                        ${badge}
                    </div>
                    <input type="number" class="num-input"
                           value="${kalanAmt}" min="0"
                           data-id="${dessert.id}"
                           data-received="${gelenAmt}"
                           data-has-entry="${hasEntryToday}"
                           inputmode="numeric"
                           oninput="updateTotal()">
                `;
                list.appendChild(row);
            });

            updateTotal();
        }

        async function saveKalanData() {
            const inputs = document.querySelectorAll('.num-input');
            if (inputs.length === 0) return;

            toggleLoading(true);
            let successCount = 0;

            for (const input of inputs) {
                const remaining = parseInt(input.value) || 0;

                const result = await saveDailyEntry(
                    branchId,
                    input.dataset.id,
                    selectedDate,
                    parseInt(input.dataset.received) || 0,
                    remaining,
                    0, ''
                );
                if (result.success) successCount++;
            }

            toggleLoading(false);

            if (successCount > 0) {
                showToast(`✅ ${successCount} tatlı kaydedildi!`, 'success');
                setTimeout(() => window.location.href = 'branch-menu.html', 1400);
            } else {
                showToast('❌ Kayıt başarısız!', 'error');
            }
        }

        updateDateUI();
        loadDesserts();
    </script>
</body>
</html>
